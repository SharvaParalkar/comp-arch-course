backend:
  name: github
  repo: SharvaParalkar/comp-arch-course
  branch: main
  base_url: https://cms-auth.sharvaparalkar.workers.dev
  auth_endpoint: /auth

site_url: https://calab.net
display_url: https://calab.net

media_folder: "MainPage/static/uploads"
public_folder: "/uploads"
publish_mode: simple

media_library:
  name: cloudinary
  config:
    cloud_name: dbf3aqsxu
    api_key: 251365553116344
    default_transformations:
      - - fetch_format: auto
          quality: auto

collections:
  - name: settings
    label: "1 · Site Settings"
    description: "Global navigation, footer, and default SEO. Edit these rarely."
    files:
      - label: Global Settings
        name: site
        file: MainPage/content/site.yml
        fields:
          - { label: Site Name, name: site_name, widget: string }
          - { label: Tagline, name: tagline, widget: text, required: false }
          - { label: Copyright, name: copyright, widget: string, required: false }
          - label: Navigation
            name: navigation
            widget: list
            summary: "{{label}} → {{url}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string, hint: "e.g. about.html or projects.html" }
          - label: Social Links
            name: social_links
            widget: list
            required: false
            summary: "{{label}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string }
          - label: Footer Links
            name: footer_links
            widget: list
            required: false
            summary: "{{label}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string }
          - label: Default SEO
            name: default_seo
            widget: object
            collapsed: true
            required: false
            hint: "All fields optional — empty values will not block Save."
            fields:
              - { label: Description, name: description, widget: text, required: false }
              - { label: OG Image, name: og_image, widget: image, required: false }

  - name: pages
    label: "2 · Pages"
    label_singular: Page
    description: "Home, About, Projects listing, Publications, Teaching, and other top-level pages."
    folder: MainPage/content/pages
    extension: yml
    format: yaml
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}}  ·  {{permalink}}"
    sortable_fields: ["title", "permalink"]
    preview_path: "{{fields.permalink}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Permalink
        name: permalink
        widget: string
        hint: "e.g. /about.html or /index.html"
      - label: Body Class
        name: body_class
        widget: string
        default: body
        required: false
        hint: "Advanced — usually leave as body"
      - label: Show Projects Grid
        name: show_projects_grid
        widget: boolean
        default: false
        required: false
        hint: "Turn on for the Projects page. Renders all Projects as a card grid automatically."
      - label: Show Publications List
        name: show_publications_list
        widget: boolean
        default: false
        required: false
        hint: "Turn on for the Publications page. Renders all Publications with image, text, and links."
      - label: SEO
        name: seo
        widget: object
        collapsed: true
        required: false
        fields:
          - { label: Description, name: description, widget: text, required: false }
          - { label: OG Title, name: og_title, widget: string, required: false }
          - { label: OG Description, name: og_description, widget: text, required: false }
          - { label: OG Image, name: og_image, widget: image, required: false }
      - label: Body Mode
        name: body_mode
        widget: select
        default: sections
        options:
          - { label: "Structured sections (recommended)", value: sections }
          - { label: "Legacy HTML", value: legacy }
      - label: Page Sections
        name: sections
        widget: list
        required: false
        summary: "{{type}}"
        hint: "Add headlines, images, video, and text. Drag to reorder. Use Image / Image Gallery to add media."
        types:
          - label: Hero with Video
            name: hero_video
            widget: object
            summary: "{{title}}"
            fields:
              - { label: Title, name: title, widget: string, required: false }
              - { label: Video URL, name: video_url, widget: string, hint: "Direct .mp4 URL" }
          - label: Headline
            name: headline
            widget: object
            summary: "{{text}}"
            fields:
              - { label: Text, name: text, widget: text }
          - label: Two Column Text
            name: two_column
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string, required: false }
              - { label: Left Column, name: left, widget: markdown, required: false }
              - { label: Right Column, name: right, widget: markdown, required: false }
          - label: Full-width Video
            name: video
            widget: object
            fields:
              - { label: Video URL, name: video_url, widget: string }
              - { label: Caption, name: caption, widget: string, required: false }
          - label: Full-width Image
            name: image
            widget: object
            summary: "{{alt}}"
            fields:
              - { label: Image, name: image, widget: image, hint: "Upload here or pick from Media / Cloudinary" }
              - { label: Alt Text, name: alt, widget: string, required: false }
              - { label: Caption, name: caption, widget: string, required: false }
          - label: Image Gallery
            name: image_gallery
            widget: object
            fields:
              - label: Images
                name: images
                widget: list
                summary: "{{alt}}"
                fields:
                  - { label: Image, name: image, widget: image }
                  - { label: Alt Text, name: alt, widget: string, required: false }
                  - { label: Caption, name: caption, widget: string, required: false }
          - label: Stat
            name: stat
            widget: object
            summary: "{{label}}: {{value}}"
            fields:
              - { label: Label, name: label, widget: string, required: false }
              - { label: Value, name: value, widget: string }
          - label: Rich Text
            name: rich_text
            widget: object
            fields:
              - { label: Body, name: body, widget: markdown, required: false }
      - label: Legacy HTML
        name: main_html
        widget: code
        default_language: html
        required: false
        hint: "Only used when Body Mode is Legacy HTML."

  - name: projects
    label: "3 · Projects"
    label_singular: Project
    description: "Each project is a card on the Projects grid plus its own detail page. Edit Cover Image + Summary first, then detail sections."
    folder: MainPage/content/projects
    extension: yml
    format: yaml
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{year}} · {{title}}"
    sortable_fields: ["sort_order", "year", "title"]
    preview_path: "projects/{{slug}}.html"
    fields:
      - { label: Title, name: title, widget: string, hint: "Detail page + card title" }
      - label: Permalink
        name: permalink
        widget: string
        required: false
        hint: "e.g. /projects/my-project.html"
      - label: Cover Image
        name: cover_image
        widget: image
        required: false
        hint: "Main image on the Projects grid — upload or choose from Cloudinary"
      - label: Overlay Title
        name: card_title
        widget: string
        required: false
        hint: "Optional white text overlaid on the cover image"
      - label: Year
        name: year
        widget: string
        required: false
        hint: "e.g. 2023"
      - label: Category
        name: category
        widget: string
        required: false
        default: Research
        hint: "e.g. Research or Design/Research"
      - label: Summary
        name: summary
        widget: text
        required: false
        hint: "Short blurb shown under the card on the Projects grid"
      - label: Featured on Home
        name: featured
        widget: boolean
        default: false
        required: false
      - label: Sort Order
        name: sort_order
        widget: number
        required: false
        value_type: int
        hint: "Lower numbers appear first on the grid"
      - label: Body Class
        name: body_class
        widget: string
        default: body
        required: false
      - label: SEO
        name: seo
        widget: object
        collapsed: true
        required: false
        fields:
          - { label: Description, name: description, widget: text, required: false }
          - { label: OG Title, name: og_title, widget: string, required: false }
          - { label: OG Description, name: og_description, widget: text, required: false }
          - { label: OG Image, name: og_image, widget: image, required: false }
      - label: Body Mode
        name: body_mode
        widget: select
        default: sections
        options:
          - { label: "Structured sections (recommended)", value: sections }
          - { label: "Legacy HTML", value: legacy }
      - label: Detail Page Sections
        name: sections
        widget: list
        required: false
        summary: "{{type}}"
        hint: "Content for the project detail page. Add Full-width Image or Image Gallery to place media."
        types:
          - label: Hero with Video
            name: hero_video
            widget: object
            fields:
              - { label: Title, name: title, widget: string, required: false }
              - { label: Video URL, name: video_url, widget: string }
          - label: Headline
            name: headline
            widget: object
            summary: "{{text}}"
            fields:
              - { label: Text, name: text, widget: text }
          - label: Two Column Text
            name: two_column
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string, required: false }
              - { label: Left Column, name: left, widget: markdown, required: false }
              - { label: Right Column, name: right, widget: markdown, required: false }
          - label: Full-width Video
            name: video
            widget: object
            fields:
              - { label: Video URL, name: video_url, widget: string }
              - { label: Caption, name: caption, widget: string, required: false }
          - label: Full-width Image
            name: image
            widget: object
            fields:
              - { label: Image, name: image, widget: image, hint: "Upload or pick from Media / Cloudinary" }
              - { label: Alt Text, name: alt, widget: string, required: false }
              - { label: Caption, name: caption, widget: string, required: false }
          - label: Image Gallery
            name: image_gallery
            widget: object
            fields:
              - label: Images
                name: images
                widget: list
                fields:
                  - { label: Image, name: image, widget: image }
                  - { label: Alt Text, name: alt, widget: string, required: false }
                  - { label: Caption, name: caption, widget: string, required: false }
          - label: Stat
            name: stat
            widget: object
            fields:
              - { label: Label, name: label, widget: string, required: false }
              - { label: Value, name: value, widget: string }
          - label: Rich Text
            name: rich_text
            widget: object
            fields:
              - { label: Body, name: body, widget: markdown, required: false }
      - label: Legacy HTML
        name: main_html
        widget: code
        default_language: html
        required: false
        hint: "Only used when Body Mode is Legacy HTML."

  - name: publications
    label: "4 · Publications"
    label_singular: Publication
    description: "Each entry appears on the Publications page with an image, authors, venue, and PDF / BibTeX links."
    folder: MainPage/content/publications
    extension: yml
    format: yaml
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{year}} · {{title}}"
    sortable_fields: ["sort_order", "year", "title"]
    preview_path: "publications.html"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Authors, name: authors, widget: text, required: false }
      - { label: Venue, name: venue, widget: string, required: false, hint: "e.g. IASS 2023" }
      - { label: Year, name: year, widget: string, required: false }
      - label: Sort Order
        name: sort_order
        widget: number
        required: false
        value_type: int
        hint: "Lower numbers appear first"
      - label: Image
        name: image
        widget: image
        required: false
        hint: "Thumbnail shown beside the publication"
      - label: PDF URL
        name: pdf_url
        widget: string
        required: false
        hint: "Link to PDF (/uploads/... or external URL)"
      - label: BibTeX URL
        name: bibtex_url
        widget: string
        required: false
        hint: "Link to a .bib / .txt file"
      - label: Article URL
        name: article_url
        widget: string
        required: false
        hint: "Optional DOI or publisher page"
      - label: BibTeX
        name: bibtex
        widget: text
        required: false
        hint: "Optional inline BibTeX (used if no BibTeX URL)"
