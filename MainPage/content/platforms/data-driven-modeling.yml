  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
  src="data-driven-modeling.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">Point cloud of the
  moon</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>First, data-driven generative geometric and material modelling methods are implemented to model
  geometry in conjunction with material distributions.</p><p>Data-driven generative geometric modelling refers to the
  ability to describe the generation of a geometric object through a set of generators and operators, and the control of
  this generation through data-sets. This is advantageous because a change in data results in re-evaluation of the
  generation description and a new geometric object according to its specification. Similarly, data-driven generative
  material modelling is the generation of a volumetric region and associated property fields in space through data-sets
  that describe material property variations.</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>The volumetric descriptions can be given in form of a voxel representation describing material
  distributions as a set of material vectors of mixing ratios and additional data organized in a spatial data structure.
  This material vector, associated additional data and the property-to-material lookup tables (described below) are then
  used to compute the final multi-material droplet deposition instruction at the resolution of the printer. Parametric
  geometric and parametric volumetric modelling methods are combined by using geometric properties as parameters in the
  volumetric modelling workflow and vice versa.</p></div></div></div></div></section><section
  data-wf--cards-section--variant="xl-top-padding" class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div
  class="container is-slot"><div data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><div
