  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Computationally-tuned material
  fabrication</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p><strong>Research team (Lazarus, Vespers I &amp; II)</strong>: Christoph Bader, Dominik Kolb, James C.
  Weaver. Prof. Neri Oxman</p><p><strong>Research team (Vespers III):</strong> Rachel Soo Hoo Smith, Christoph Bader,
  Sunanda Sharma, Dominik Kolb, Tzu-Chieh Tang, Ahmed Hosny, Felix Moser, James C. Weaver, Christopher A. Voigt. Prof.
  Neri Oxman</p><p><strong>Research team (Totems):</strong> Sunanda Sharma, Christoph Bader, Rachel Soo Hoo Smith, Felix
  Kraemer, João Costa, Joseph H. Kennedy, Jr. Undergraduate researchers: Joseph Faraguna, Sangita Vasikaran, Sara Laura
  Wilson. Prof. Neri Oxman</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p><strong>Year</strong>: 2015 - present</p><p><strong>Projects</strong>: <a
  href="../projects/lazarus.html">Lazarus</a>, <a href="../projects/vespers-i.html">Vespers I</a>, <a
  href="../projects/vespers-ii.html">Vespers II</a>, <a href="../projects/vespers-iii.html">Vespers III</a>,
  Totems</p></div></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Position</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>Current advancements in additive manufacturing enable the fabrication of geometrically complex and
  materially heterogeneous objects with high spatial resolution in manufacturing. Such advancements challenge designers,
  architects and engineers alike to move beyond shells designed with pre-determined shape, and material composition; and
  to consider an expanded design space encompassing internal material properties. Color and opacity, stiffness,
  softness, shape memory, swellability, expansion, wettability and refractive index can be seamlessly tuned, fabricated
  and leveraged in design applications.</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>We propose that the “anatomy” of objects can be designed through generative methods. However, current
  off-the-shelf software tools do not typically take these recent advancements into consideration, thereby missing out
  on significant design opportunities that lie at the intersection of digital modeling, analysis, and
  fabrication.</p></div></div></div></div></section><section data-wf--img-section--variant="xl-top-padding"
  class="full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6973dc3ad1a046b86b369a19_imgi_2_67d98d002862e807bed9a16f_sphere-aluminum-12-d.avif"
  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">DDMM sphere on aluminum
  block</div></div></section><section data-wf--cards-section--variant="xl-top-padding" class="section
  w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
