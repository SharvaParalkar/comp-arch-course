  src="data-driven-modeling.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">DDMM sphere on aluminum
  block</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium"></h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>DDMM
  (Data-Driven Material Modeling) combines generative modelling methods with high-resolution multi-material 3D printing.
  This generative approach is controlled using existing or dynamic data-sets to drive the simultaneous generation of
  geometry and material information. For the generation of continuous material distributions, the generative methods are
  evaluated during slice generation, thereby enabling the production of voxel-matrices describing material property
  variations at the 3D printer’s native resolution.</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>However, to leverage advantages of synthetic hybrid material systems, designers and engineers alike
  have to think beyond geometry-driven CAD tools and consider implementing hybrid design workflows. Combining parametric
  geometric modeling, parametric volumetric modeling, high resolution material dithering, common design evaluation
  methods and multi-material 3D printing we propose an integrated design workflow and explore associated design space of
  3D printable functionally graded material systems.</p><p>DDMM explores this hybrid approach in a five-part
  framework.</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding"
  class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
