  type="video/mp4" data-resolution="720p" data-format="mp4" class="source"/></video></div></div></div><div
  class="h-x-small">Workflow for modeling and rendering of high resolution data</div></div></div></section><section
  data-wf--cards-section--variant="s-top-padding" class="section"><div class="container is-slot"><div
  data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><div class="bg-video-wrap"><div
  class="video-aspect-box"><video loading="eager" preload="metadata" title="" loop="" playsinline="true" muted=""
  autoplay="true" class="video-element"><source
  src="https://oxman.b-cdn.net/video/work/archive/platforms/data-driven%20material%20modeling/ddmm_geometrydemonstration_720p.mp4"
  type="video/mp4" data-resolution="720p" data-format="mp4" class="source"/></video></div></div></div><div
  class="h-x-small">Demonstration of data-driven evaluation of geometry</div></div><div
  data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><div class="bg-video-wrap"><div
  class="video-aspect-box"><video loading="eager" preload="metadata" title="" loop="" playsinline="true" muted=""
  autoplay="true" class="video-element"><source
  src="https://oxman.b-cdn.net/video/work/archive/platforms/data-driven%20material%20modeling/ddmm_geometryrange_720p.mp4"
  type="video/mp4" data-resolution="720p" data-format="mp4" class="source"/></video></div></div></div><div
  class="h-x-small">A wide range of variations in geometry can be quickly generated</div></div></div></section><section
  data-wf--img-section--variant="xl-top-padding" class="full-media-section
  w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6973dc3a6ae83ba7c8798611_imgi_14_67d98cff8a607fd516d1af35_sphere-13.avif"
  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">Topography and flow
  lines in 3D printed orb</div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium"></h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>In
  computational fabrication, material distributions are mapped to experimentally characterized material properties such
  as opacity, stiffness, or others. This mapping is enabled through two processes. First, the characterization of
  material mixing ratios through which associated property-to-material map can be generated. Secondly, the continuous
  material tunability through high resolution material dithering which allows to use the property-to-material maps to
  translate a desired material behavior to volumetric descriptions of material mixing ratios. The material tunability
  and the volumetric material description allow to perform design evaluation of material behaviors by either rendering
  or simulation. This can be in the form of the simulation of the non-linear dynamics of an actuation system or the
  evaluation of optical properties through volumetric rendering.</p></div></div><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>Significantly, geometry and material representations are kept distinct and are only
  combined if necessary for example in the simulation or slicing process to achieve scalability. Geometry, volumetric
  material descriptions, and property-to-material maps are then processed through a slicing process to generate the
  above described layer-based instructions for the multi-material fabrication system. This slicing process uses the
  given data-sets to perform additional computational processes during slice time to achieve high-resolution composite
  generation. All of these contributing towards a <em>holistic</em> design approach for programmable
  materiality.</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding"
  class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
  data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><div class="bg-video-wrap"><div
  class="video-aspect-box"><video loading="eager" preload="metadata" title="" loop="" playsinline="true" muted=""
  autoplay="true" class="video-element"><source
  src="https://oxman.b-cdn.net/video/work/archive/platforms/data-driven%20material%20modeling/ddmm_prototyp_720p.mp4"
  type="video/mp4" data-resolution="720p" data-format="mp4" class="source"/></video></div></div></div><div
  class="h-x-small">Demonstration of materials produced by DDMM</div></div><div data-wf--card--variant="33-minimum"
  class="d is-card"><div class="card-img-frame"><div class="bg-video-wrap"><div class="video-aspect-box"><video
  loading="eager" preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true"
  class="video-element"><source
  src="https://oxman.b-cdn.net/video/work/archive/platforms/data-driven%20material%20modeling/ddmm_hemisphere_720p.mp4"
  type="video/mp4" data-resolution="720p" data-format="mp4" class="source"/></video></div></div></div><div
  class="h-x-small">A polished hemisphere showing simulated turbulent flow</div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Policy</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>With the DDMM framework, a wide variety of
  hybrid systems found in nature can be directly fabricated to nature-mimetic entities. By utilizing methods described
  here<em>,</em> we show that the barrier between the digital description of material behaviors and their physical
  reality can be obviated more easily and can open a wide<em>r space for</em> design.</p></div></div><div class="d
  is-tab-half"><div class="txt-small w-richtext"><p>Enabled through computational design strategies such as parametric
  geometric, parametric volumetric modeling and design evaluation in combination with high-resolution slicing and
  multi-material 3D printing, we facilitate an integrated workflow providing means to work with geometric and material
  structures efficiently and creatively. Such design workflows, will in the future, enable designers to not only
  precisely mimic systems and mechanics found throughout nature, but also give rise to new mediating systems between
  synthetic and biological entities.</p></div></div></div></div></section><section
