  class="source"/></video></div></div></div><div class="h-x-small">The cells produce pigments across
  surfaces</div></div></div></section><section data-wf--stat-section--variant="xl-top-padding" class="section
  w-variant-41dda5da-37cf-7651-637f-35312d595621"><div class="container"><div class="d"><div class="vert-div"><div
  class="display-eyebrow-div"><div class="h-x-small">Incubation Temperature in Celcius</div></div><div class="display-h
  is-data">37</div></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>The development of bio-signaling resin, though the direct incorporation of bio-signaling molecules into
  UV-curable photopolymer resin, allows for complete automation of signaling at the native resolution of the printer.
  Furthermore, it enables the placement of multiple orthogonal signals in parallel, as well as their tunable mixing, and
  higher levels of bioactivity patterning, complexity, and logic.</p><p>We proved the preservation of inducer
  functionality when solubilized in photopolymer resin and after undergoing curing conditions, as well as minimal
  property changes to viscosity and curing of resin. Furthermore, we confirmed bio-signal orthogonality and the ability
  to incorporate substrates as well as inducers. In noted experiments, resins are loaded directly into the printer. We
  then demonstrated multiple diffusion outputs in one fabricated part with mixing of adjacent diffusion
  gradients.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>This enables chemical
  interaction on the surface in predefined areas. Furthermore, in synthetic biology, cells can be designed to perform
  logical functions similar to those in digital logic or Boolean logic such as an AND gate. Thus, the mixing shown may
  further increase the potential to spatially pattern cells in a desired manner. The combined developments in the
  computational and physical integration of biochemicals into DDMM, as well as experimental data in material gradient
  characterization, may now inform higher level/complex design of
  bioactivity.</p></div></div></div></div></section><section data-wf--img-section--variant="xl-top-padding"
