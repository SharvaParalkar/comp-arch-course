  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Position</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Hybrid Living Materials is an integrated
  framework for data-driven design of geometrically, materially, and biochemically complex objects through the control
  of biosynthetic bacteria in novel resins containing molecular inducers. The objects created through this framework
  demonstrate an iterative approach for computational design of localized cell behavior through material fabrication,
  and also leverage advanced digital fabrication tools that uniquely incorporate techniques from synthetic biology. Our
  framework enables the creation of complex free-standing objects or scaffolds for a variety of applications, including
  point-of-use synthesizers, bioremediation devices, and whole-cell sensing matrices.</p></div></div><div class="d
  is-tab-half"><div class="txt-small w-richtext"><p>To date, the fields of biomaterials and tissue engineering have made
  great advances towards the creation of material gradients in microenvironments and scaffolds that direct cell
  behavior. However, existing fabrication methods for creating materially heterogeneous substrates often focus on a
  single property through which to influence cells – such as surface stiffness, porosity, patterning, roughness,
  hydrophilicity, or chemical concentration. We reasoned that by incorporating multiple material properties, we can
  build more dynamic and complex microenvironments and substrates, leveraging more functionalities of living cells
  within a single integrated object.</p></div></div></div></div></section><section
