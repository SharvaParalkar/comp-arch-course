  class="source"/></video></div></div></div><div class="h-x-small">Chamber illuminated by heat from the furnace
  above</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>G3DP2 uniquely enables the additive manufacturing of optically-transparent glass by restructuring the
  machine’s architecture and process control operations as informed by material properties and behaviors of silicate
  glass to 3D print building components with tunable, predictable mechanical and optical properties.</p></div></div><div
  class="d is-tab-half"><div class="txt-small w-richtext"><p>This enabling technology builds upon our previous efforts
  to 3D print optically transparent glass for product scale applications.</p></div></div></div></div></section><section
  data-wf--stat-section--variant="xl-top-padding" class="section w-variant-41dda5da-37cf-7651-637f-35312d595621"><div
  class="container"><div class="d"><div class="vert-div"><div class="display-eyebrow-div"><div class="h-x-small">Age of
  Glass Manufacturing in Years</div></div><div class="display-h is-data">4500</div></div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium"></h2></div></div><div class="d"><div
  class="d is-tab-half"><div class="txt-small w-richtext"><p>Ancient yet modern, enclosing yet invisible, glass was
  first created in Mesopotamia and Ancient Egypt 4,500 years ago. Glass can be molded, formed, blown, plated or
  sintered; its formal qualities are closely tied to techniques used for its formation.</p></div></div><div class="d
  is-tab-half"><div class="txt-small w-richtext"><p>From the discovery of core-forming process for bead-making in
  ancient Egypt, through the invention of the metal blow pipe during Roman times, to the modern industrial Pilkington
  process for making large-scale flat glass; each new breakthrough in glass technology occurred as a result of prolonged
  experimentation and ingenuity, and has given rise to a new universe of possibilities for uses of the
  material.</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding"
  class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
