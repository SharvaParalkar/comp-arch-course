  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">3D printed glass manufacturing</h2></div></div><div class="d"><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p><strong>Research team (Glass I):</strong> John Klein, Michael Stern, Markus Kayser,
  Chikara Inamura, Giorgia Franchin, Shreya Dave, Daniel Lizardo, Peter Houk. Prof. Neri Oxman</p><p><strong>Research
  team (Glass II):</strong> Chikara Inamura, Michael Stern, Daniel Lizardo, Tal Achituv, Tomer Weller, Owen Trueblood,
  Nassia Inglessis, Giorgia Franchin, Marianna Gonzalez, Yinong Liu, Kelly Egorova, Peter Houk. Prof. Neri
  Oxman</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p><strong>Year</strong>:
  2015-present</p><p><strong>Location</strong>: MIT Media Lab, 2015, Cambridge, MA</p><p><strong>Projects</strong>:
  Glass I, Glass II</p></div></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding"
  class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Position</h2></div></div><div class="d"><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>Glass 3D Printing 2 (G3DP 2) enables an entirely unique means of digital design and
  fabrication with glass. It is a high fidelity, large-scale, additive manufacturing technology for 3D printing
  optically transparent glass structures at architectural dimensions.</p></div></div><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>This novel additive-manufacturing platform includes a digitally integrated thermal
  control system to accompany the various stages of glass forming. It also includes a novel 4-axis motion control system
  permitting flow control, spatial accuracy and precision, and faster production rates with continuous deposition of up
  to 30kg of molten glass.</p></div></div></div></div></section><section data-wf--img-section--variant="xl-top-padding"
  class="full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc"><div class="full-img-frame"><img
