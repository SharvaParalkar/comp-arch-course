  class="source"/></video></div></div></div><div class="h-x-small">SEM image of the interface between 2 layers of
  glass</div></div></div></section><section data-wf--section-1--variant="xl-top-padding" class="section
  w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div class="h-x-large">The
  tunability enabled by geometrical and optical variation driven by form, transparency and color variation can drive,
  limit or control light transmission, reflection and refraction, and therefore carries significant implications for all
  things glass.</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium"></h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The
  computational methodology used by G3DP2 is designed to interact intelligently with the constraints of the
  manufacturing with glass. A wide range of shapes determined by desired mechanical and optical properties can be
  printed through feedback-enabled control systems.</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>Internal temperatures and feed rate are precisely regulated in order to ensure the precise deposition
  and cooling rate of molten glass that enables not only the high-fidelity realization of designed geometries, but the
  preservation of optical transparency and superior strength.</p></div></div></div></div></section><section
  data-wf--img-section--variant="xl-top-padding" class="full-media-section
  w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc"><div class="full-img-frame"><img
