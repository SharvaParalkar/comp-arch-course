  class="full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4"><div class="video-aspect-box"><video
  loading="eager" preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true"
  class="video-element"><source
  src="https://oxman.b-cdn.net/video/work/archive/platforms/co-fabrication%20systems/cfs_simulation_1080p.m4v"
  type="video/mp4" data-resolution="720p" data-format="mp4" class="source"/></video></div><div class="caption-div"><div
  class="h-x-small">Simulation of a machine-guided fabrication process with silkworms</div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Policy</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The system and tool offer a novel form of
  fabricating membranes in a dynamic manner, one that can adapt to different stimuli from the environment or other
  additional agents. They can be seen as a step towards an ideal adaptable approach for fabrication of meshes,
  suggesting that compromises need to be made in the amount of control designers have over the outcome of the process,
  so that we utilize design tools but also reconceive the way we perceive our interference in the process
  itself.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>It is still being explored in a
  larger scale but has yielded promising results so far, not only with silkworms but in projects we have designed
  centered around ants and bees.</p></div></div></div></div></section><section
  data-wf--cards-section--variant="xl-top-padding" class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div
