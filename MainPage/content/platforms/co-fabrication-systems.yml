  type="video/mp4" data-resolution="720p" data-format="mp4" class="source"/></video></div></div></div><div
  class="h-x-small">Computational simulations exploring the impact of static, stepped, and continuous motion over
  silkworm spinning behavior</div></div><div data-wf--card--variant="33-minimum" class="d is-card"><div
  class="card-img-frame"><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
  src="https://oxman.b-cdn.net/video/work/archive/platforms/co-fabrication%20systems/cfs_light_720p.m4v"
  type="video/mp4" data-resolution="720p" data-format="mp4" class="source"/></video></div></div></div><div
  class="h-x-small">Experiment on light guided silkworm behavior</div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium"></h2></div></div><div class="d"><div
  class="d is-tab-half"><div class="txt-small w-richtext"><p>Design templating techniques have proven to be an
  interesting approach to interface with biological organisms. Specifically, our work with silkworms in <a
  href="https://www.oxman.com/projects/silk-pavilion-i" target="_blank"><em>Silk Pavilion</em></a><em> </em>laid the
  foundation for the novel paradigm of a bio-homeomorphism, which describes continuous deformation and alteration of a
  structure, topological space, or geometric object by biological agents, such as silkworms.</p></div></div><div
  class="d is-tab-half"><div class="txt-small w-richtext"><p>For example, the fabrication of thread-based membranes and
  panels is typically constrained by the limitations of the underlying scaffold in which it is constructed. However,
  bio-homeomorphic structures feature various strategies for conditioning the behavior of the ‘agent’ that will, in its
  turn, condition the structure.</p></div></div></div></div></section><section
