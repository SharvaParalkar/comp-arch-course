  II</div></div><div data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><img alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6973e423c20345d559e6d4ed_imgi_4_67d8ba682f3135e53196ea44_h-0001-layer-27.avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
  src="co-fabrication-systems.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">Tilt variation study for Silk Pavilion
  II</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>These projects apply Mediated Matter’s ongoing research into biologically augmented digital fabrication
  with silkworms and eusocial insect communities to product, architectural, and possibly urban, scales. Many insect
  communities present collective behavior known as “swarming,” prioritizing group over individual survival, while
  constantly working to achieve common goals.</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>Often, groups of these eusocial organisms leverage collaborative behavior for relatively large-scale
  construction. For example, ants create extremely complex networks by tunneling, wasps generate intricate paper nests
  with materials sourced from local areas, and bees deposit wax to build intricate hive
  structures.</p></div></div></div></div></section><section data-wf--img-section--variant="xl-top-padding"
  class="full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6973e42374e0033de99abe1e_imgi_5_67d8ba69a893d28dae998319_cofab-combined-cocoons.avif"
  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">Three silkworm cocoons
  sharing one scaffolding</div></div></section><section data-wf--cards-section--variant="s-top-padding"
  class="section"><div class="container is-slot"><div data-wf--card--variant="33-minimum" class="d is-card"><div
  class="card-img-frame"><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
