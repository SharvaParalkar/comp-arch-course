main_html: >-
  <header data-wf--hero-section-project--variant="white-on-black" class="section is-hero
  w-variant-5b1a35bb-2984-1097-93b3-6509355276f9"><div class="container is-hero-60"><div class="d"><div
  class="d100"><div class="display-eyebrow-div"><div class="eyebrow-txt">Platform</div></div><h1
  class="display-h">Co-fabrication Systems</h1></div></div></div></header><section
  data-wf--img-section--variant="no-top-padding" class="full-media-section"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6973e4238e1e0a78510c595f_imgi_1_67d8ba6919d5f4bb176db993_pneuma-web-01.avif"
  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">Collboration between 3D
  printed structural shell and honey bees</div></div></section><section data-wf--section-1-2--variant="xl-top-padding"
  class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Biologically augmented digital fabrication</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p><strong>Research team (Silk I):</strong>
  Markus Kayser, Jared Laucks, Jorge Duro-Royo, Carlos David Gonzalez Uribe, Prof. Neri Oxman</p><p><strong>Research
  team (Silk II):</strong> João Costa, Christoph Bader, Sunanda Sharma, Felix Kraemer, Susan Williams, Jean Disset,
  Nitzan Zilberman. Undergraduate researcher: Sara Wilson. Prof. Neri Oxman</p><p><strong>Research Team</strong>
  <strong>(Synthetic Apiary):</strong> Markus Kayser, Sunanda Sharma, Jorge Duro-Royo, Christoph Bader, Dominik Kolb.
  Prof. Neri Oxman.</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p><strong>Year:</strong> 2013-present</p><p><strong>Projects:</strong> <a
  href="https://www.oxman.com/projects/silk-pavilion-i" target="_blank">Silk I</a>, <a
  href="https://www.oxman.com/projects/silk-pavilion-ii">Silk II</a>, Synthetic
  Apiary</p></div></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Position</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>In Nature―where shape is cheaper than material―one often finds load-resisting structures that combine
  multiple systems to accommodate for constantly shifting forces over time. Contrary to traditional manmade structural
  design, where beams and columns are often composed of homogeneous materials, many natural structures exhibit
  heterogeneity in both shape and material composition.</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>Advances in digital fabrication and robotic manufacturing over the past decade have enabled the rapid
  production of highly customized structural components, yet structural systems in the natural world remain superior in
  their performance.</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding"
  class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
  data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><img alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6973e423760a565cd0fec4fd_imgi_2_67d8ba68b8c73789c2376507_h-0025-layer-3.avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
