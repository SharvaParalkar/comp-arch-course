  w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Nature
  as co-client</h2></div></div><div class="d"><div class="txt-large w-richtext"><p>As activist designers, we call for a
  shift in the conventional definition of partnership—moving from a model of service and delivery to one of
  collaboration among ourselves, our clientele, and Nature.</p><p>We lead our partners within industry and academia in
  implementing Nature-centric values across their design, manufacturing, construction, and operational practices, toward
  the mutual benefit of their businesses and the natural world.</p></div><div class="d"><a data-underline-link="alt"
  href="contact.html" class="txt-large">Collaborate with us</a></div></div></div></section><section
