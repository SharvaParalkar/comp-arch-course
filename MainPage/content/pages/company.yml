  class="oxo-x-line is-90"></div></div><div class="oxo-item"><div class="oxo-word-item"><div
  class="oxo-txt">Wonder<br/></div></div></div></div><div class="oxo-content"><section
  data-wf--section-1-2--variant="s-top-padding" class="section"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium"></h2></div></div><div class="d"><div class="d is-tab-half"><h3
  class="h-small">Wisdom</h3><div class="txt-small w-richtext"><p>We are seekers of knowledge and truth. We pursue an
  intellectual and creative depth that is applied and embodied in the complexity of our work. We are relentlessly
  curious with a hunger to keep learning in search of greater understanding.</p></div></div><div class="d
  is-tab-half"><h3 class="h-small">Wonder</h3><div class="txt-small w-richtext"><p>While we seek deep knowledge, we do
  so with an appreciation for the magical and inexplicable quality of life. We thrive in the unknown, forgoing
  conclusions in favor of questions and bravely pushing past the boundaries of our own
  experience.</p></div></div></div></div></section></div></div><div data-w-id="4f627f59-8604-ab02-989b-893783ca284f"
