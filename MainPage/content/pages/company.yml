  w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div class="container
  w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div class="d"><div class="h-medium-div"><h2 class="h-medium">What we
  do</h2></div></div><div class="d"><div class="txt-large w-richtext"><p>We invent multi-scale products and environments
  through radical ways of thinking and making that flow across hardware, software, and wetware. At this nexus, we unveil
  new knowledge and take on challenges that others consider impossible—allowing design to empower science and science to
  empower design.</p><p>Our interdisciplinary approach physically manifests in our work as well as in our space, which
  integrates a first-of-its kind atelier, workshop, and lab.</p></div><div
  class="d"></div></div></div></section><section data-wf--section-1-1--variant="s-top-padding" class="section"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">How we do it</h2></div></div><div
  class="d"><div class="txt-large w-richtext"><p>Through our research and development arm, we invent platform
  technologies that enable design and production by, for, and with Nature. Our design work, in turn, augments our
  technologies both by informing and validating them throughout the development process.</p><p>Each platform can be
  applied across a range of industries and scales—from consumer goods to urban plans, from pharmaceuticals to apparel,
  from organisms to rockets. This cross-scale hierarchical design allows us to build a library of tools and techniques
  which can be continuously improved upon toward new applications and domains.</p></div><div
  class="d"></div></div></div></section><section class="section is-xl-top"><div class="container"><div class="d"><h2
