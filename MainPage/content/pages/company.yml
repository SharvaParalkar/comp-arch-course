  class="h-medium-div"><h2 class="h-medium"></h2></div></div><div class="d"><div class="d is-tab-half"><h3
  class="h-small">Rigor</h3><div class="txt-small w-richtext"><p>We hold ourselves to a high standard of excellence in
  everything we do. We apply our work with precision, meticulousness, and great attention to detail—always grounding it
  in evidence and reason.</p></div></div><div class="d is-tab-half"><h3 class="h-small">Play</h3><div class="txt-small
  w-richtext"><p>While we strive toward excellence, we do so with playfulness and spontaneity. We believe in magic and
  we seek moments of serendipity, surprise, and awe that inspire new ways of thinking and
  being.</p></div></div></div></div></section></div></div><div data-w-id="62c908e7-d67e-5f71-5e44-b40935e44634"
  class="oxo-section"><div class="oxo-div"><div class="oxo-item"><div class="oxo-word-item"><div
