  data-wf--section-1--variant="xl-top-padding" class="section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div
  class="container"><div class="d"><div class="h-x-large">OXMAN is rethinking design to empower a future of complete
  synergy between Nature and humanity.</div></div></div></section><section
  data-wf--video-player-section--variant="xl-top-padding" class="full-media-section
  w-variant-8b3a5d54-9248-1da5-3e14-cd6d3059771a"><div class="video-aspect-box"><button
