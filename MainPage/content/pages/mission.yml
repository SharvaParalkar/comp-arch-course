  webkitallowfullscreen=" " mozallowfullscreen=" " allowfullscreen=" " data-vimeoplayer-iframe=" " allow="autoplay"
  aria-label="Vimeo Video" data-ready="true" class="video-element"></iframe></div><div class="caption-div"><div
  class="h-x-small">Nature × Humanity documentary</div></div></section><section
  data-wf--section-1-1--variant="xl-top-padding" class="section w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div
  class="container w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Position</h2></div></div><div class="d"><div class="txt-large w-richtext"><p>For the first time in
  our planet’s history, the anthropomass—the mass of human-made goods—now outweighs the biomass—the mass of all living
  things. In pursuit of our own technological advancement, humanity has rapidly unraveled what has taken Nature billions
  of years of evolution to create, resulting in a threat to the continued viability of life on Earth.</p><p>Humanity is
  a part of Nature, yet the world we have designed has created a rift between us. It is now our responsibility to heal
  it.</p></div><div class="d"></div></div></div></section><section data-wf--section-1-1--variant="s-top-padding"
  class="section"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Policy</h2></div></div><div class="d"><div class="txt-large w-richtext"><p>OXMAN proposes the
  creation of design solutions by, for, and with Nature while advancing humanity. This holistic approach demands that we
  design across scales and kingdoms for systems-level impact.</p><p>Categorical delineations between climate change and
  global pandemics, loss of biodiversity and loss of empathy for one another give way to authoring systems that address
  manifold challenges. In doing so, we open ourselves up to moving beyond mere maintenance toward the radical betterment
  of Nature.</p></div><div class="d"></div></div></div></section><section data-wf--section-1--variant="xl-top-padding"
  class="section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div
  class="h-x-large">We call for a shift from human-centric design to Nature-centric
  design.</div></div></div></section><section data-wf--section-1-1--variant="xl-top-padding" class="section
  w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div class="container
  w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Nature-centric design</h2></div></div><div class="d"><div class="txt-large
  w-richtext"><p>Nature-centric design views every design construct as a whole system, intrinsically connected to its
  environment through heterogeneous and complex interrelations that may be mediated through design. It embodies a shift
  from consuming Nature as a geological resource to nurturing her as a biological one.</p><p>Bringing together top-down
  form generation with bottom-up biological growth, designers are empowered to dream up new, dynamic design
  possibilities, where products and structures can grow, heal, and adapt.</p></div><div
  class="d"></div></div></div></section><section data-wf--img-section--variant="xl-top-padding"
  class="full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691f40cb16eaf477afde4db8_a2-2.avif" loading="lazy"
  alt="" sizes="100vw"
