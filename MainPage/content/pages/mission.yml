  <path d="M1 12.7422V1.74219L10 6.98028L1 12.7422Z" stroke="white" stroke-width=".5"/>

  </svg></div></div></div><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6967c4708a4361da1c2cb422_025-architecturalproposal.avif"
  loading="lazy" data-w-id="dca2cf2a-a7fc-317a-e838-13e604164f8a" alt="025 Architecturalproposal"
