  https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691f40cb77ed0281894c7c46_01e-2-p-2000.avif 2000w,
  https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691f40cb77ed0281894c7c46_01e-2-p-2600.avif 2600w,
  https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691f40cb77ed0281894c7c46_01e-2-p-3200.avif 3200w,
  https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691f40cb77ed0281894c7c46_01e-2.avif 8008w"
  class="full-img"/></div><div class="caption-div"><div class="h-x-small">The Krebs Cycles of Creativity replaces the
  carbon compounds of the biological Krebs Cycle with the four modalities of human
  creativity</div></div></section><section data-wf--section-1--variant="xl-top-padding" class="section
  w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div class="h-x-large">What if
  human‑made and Nature‑grown were indistinguishable?</div></div></div></section><section
  data-wf--section-1-1--variant="s-top-padding" class="section"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium"></h2></div></div><div class="d"><div class="txt-large
  w-richtext"><p>‍</p></div><div class="d"></div></div></div></section><section class="section is-t-less"><div
  data-w-id="48ccf6d6-057a-a311-cc37-c45ba1bb1c20" class="container"><div class="oxo-item is-mission"><div
  class="oxo-word-item"><div class="oxo-txt">Nature<br/></div></div></div><div class="oxo-item is-x is-mission"><div
  class="oxo-x-line"></div><div class="oxo-x-line is-90"></div></div><div class="oxo-item is-mission"><div
  class="oxo-word-item"><div class="oxo-txt">HUMANITY<br/></div></div></div></div></section><section
  data-wf--section-1-1--variant="s-top-padding" class="section"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium"></h2></div></div><div class="d"><div class="txt-large w-richtext"><p>By
  placing a multiplicity in the form of an × between Nature and humanity, we call for a radical realignment between
  grown and built environments.</p><p>We transition from the current dichotomy of consumption on the one hand and
  preservation on the other to a relationship that embodies complete synergy, acknowledging that the interconnected
  whole is far more than the sum of its parts.</p></div><div class="d"></div></div></div></section><section
  data-wf--section-1-1--variant="xl-top-padding" class="section w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div
  class="container w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">First principles</h2></div></div><div class="d"><div class="txt-large w-richtext"><p>‍</p></div><div
  class="d"></div></div></div></section><section class="section is-t-less"><div class="container"><div
  class="nb-grid"><div class="nb-grid-row"><div class="nb-item"><div class="nb-txt">I</div><h3 class="h-small">Nature as
  co-client<br/></h3><p class="txt-small">We call for a shift in how we perceive clientele and commercial viability,
  turning Nature into a co-client within the design practice.</p></div><div class="nb-item is-2nd"><div
  class="nb-txt">II</div><h3 class="h-small">Nature-centric design<br/></h3><p class="txt-small">Nature-centric design
  invites the creation of design solutions at the service of Nature while advancing humanity.</p></div></div><div
  data-w-id="05a4bc01-b629-06d0-34b0-b69e11e1c14a" class="nb-grid-row is-2nd"><div class="nb-item"><div
  class="nb-txt">III</div><h3 class="h-small">Activist design<br/></h3><p class="txt-small">Activist design utilizes
  technology stakes in urging commissioning corporations to implement Nature-centric values across the design,
  construction, and manufacturing industries.</p></div><div class="nb-item is-2nd"><div class="nb-txt">IV</div><h3
  class="h-small">Growth over assembly<br/></h3><p class="txt-small">Computational design through self-organization
  enables the generation of vast, diverse forms similar to those that emerge through the biological growth processes
  found in Nature.</p></div></div><div class="nb-grid-row"><div class="nb-item"><div class="nb-txt">V</div><h3
  class="h-small">System over object<br/></h3><p class="txt-small">System-centric design considers any design
  construct—wearable, product, or building—a system of quantified interrelations across natural, biological, and digital
  domains.</p></div><div class="nb-item is-2nd"><div class="nb-txt">VI</div><h3 class="h-small">Technology over
  typology<br/></h3><p class="txt-small">Platform technologies position the scientific method and technological
  innovation as the kernel of the architectural practice, revisiting timeworn typologies.</p></div></div><div
  class="nb-grid-row is-2nd"><div class="nb-item"><div class="nb-txt">VII</div><h3 class="h-small">Difference over
  repetition<br/></h3><p class="txt-small">Perceived repetition in the natural world exists only through underlying
  difference and variation in response to environmental constraints, pointing toward design for behavior over
  form.</p></div><div class="nb-item is-2nd"><div class="nb-txt">VIII</div><h3 class="h-small">Integration over
  segregation<br/></h3><p class="txt-small">Functionality is not embedded in design constructs via discrete material
  components but rather distributed inseparably across a single intelligent system which is greater than the sum of its
  parts.<br/></p></div></div><div class="nb-grid-row"><div class="nb-item"><div class="nb-txt">IX</div><h3
  class="h-small">Decay over disposal<br/></h3><p class="txt-small">Programmed decay may be designed such that matter is
  consumed by the same ecosystem which sprouted it to fuel new growth, thereby empowering resource cycles rather than
  depleting them.<br/></p></div></div></div></div></section><footer data-wf--footer--variant="black-on-white"
