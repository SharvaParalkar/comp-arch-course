main_html: >-
  <header data-w-id="fdf3730b-4f47-a48e-7acb-06ac1f0962e4" class="section is-t-double"><div class="container"><div
  class="d"><h1 class="h-xx-large">Terms and Policies<br/></h1></div></div></header><section class="section is-b-double
  is-t-double"><div class="container"><div class="d is-pad-only"><div class="h-medium">Updated on
  2022.05.16<br/></div></div><div class="d"><div class="pad-bottom is-2-rem"><div id="nobullets" class="txt-small
  w-richtext"><p><strong>TERMS OF USE AND PRIVACY POLICY</strong></p><p><strong>These Terms of Use and Privacy Policy
  apply to the website of OXMAN.</strong></p><p><strong>Acceptance of these Terms and Policies is inferred from your use
  of the site</strong></p><p>By accessing the website, you accept these Terms of Use and Privacy Policy, as may be
  amended from time to time, without limitation or qualification. If you do not wish to be bound by these Terms and
  Policies, please refrain from further use of the website. The Terms and Policy may be modified at any time, without
  notice, and will take effect immediately. OXMAN undertakes no obligation to inform any user of any such
  modification.<em>These terms and policies were last modified on May 16, 2022.</em></p><p><strong>Cookies
  Notification</strong></p><p>This site uses cookies to ensure that you get the best possible experience on our website
  and to statistically analyze traffic on the site, as follows:</p><p><strong>Cookies that are necessary strictly for
  the functioning of the site</strong></p><ul
  role="list"><li><em>A17_fonts_cookie_*</em></li><li>neri_oxman_session</li><li>XSRF-TOKEN</li></ul><p>These cookies
  are used to remember fonts that have been loaded in a previous session and have an expiration time of 24 hours.</p><ul
  role="list"><li><em>A17_gdpr_cookie_popup_seen</em></li></ul><p>This cookie is used to remember that the Cookie notice
  splash has been seen and has an expiration time of 30 days.<br/><br/><strong>Cookies that are used for statistical
  purposes</strong></p><ul role="list"><li><em>_ga </em>(expiration time: 2 years)</li><li><em>_gat_gtag_UA_XXXXXXXXX_1
  </em>(expiration time: 24 hours)</li><li><em>_gid </em>(expiration time: 24 hours)</li></ul><p>These cookies are set
  by Google Analytics (see also<a target="_blank"
  href="https://developers.google.com/analytics/devguides/collection/analyticsjs/cookie-usage">https://developers.google.com/analytics/devguides/collection/analyticsjs/cookie-usage</a>).</p><p><strong>Privacy
  Policy</strong></p><p>OXMAN respects our users’ privacy. We are committed to handling personal data in a safe, secure,
  and lawful manner. We do not share, rent or sell personal information to outside parties. We will protect personal
  information by reasonable security safeguards against loss or theft. OXMAN gathers only the visitor information that
  is needed to administer our business and to enhance and improve our website.</p><p>This Privacy Policy is designed to
  ensure that you receive the information we are required to provide to you regarding our processing of your personal
  data and that is necessary for you to exercise your rights under applicable privacy
  legislation.</p><p><strong>Protection of OXMAN’s Copyright and Other Intellectual Property
  Rights</strong></p><p>Everything on Oxman.com, including all works, text, images, software, documentation, electronic
  text and image files, audio and video files and clips, and other materials are protected by U.S. and international
  laws relating to copyright, trademarks, patents, trade secrets, know-how, and moral rights and may be covered by other
  restrictions as well including, for example, rights of privacy and publicity. OXMAN and/or others retain all rights in
  data, images, sounds, text, and any other information or materials contained on the site. Copyrights and other
  proprietary rights in the material on this website may also subsist in individuals and entities besides
  OXMAN.</p><p>Nothing on Oxman.com may be published, reproduced, copied, modified, used to create derivative works,
  performed, uploaded, transmitted, posted, transferred, or distributed in any way without the express, prior written
  consent of Oxman and any other parties with rights therein, subject only to principles of fair use.</p><p>OXMAN does
  not grant any right to you of any kind with respect to copyrights, patents, trademarks, trade secrets, moral rights,
  or any other similar rights (“Intellectual Property”).</p><p><strong>OXMAN’s Right to Use Whatever You Post; Your
  Obligations with Respect to Anything You Post</strong></p><p>If you submit, send, or post any information or material
  to Oxman.com (collectively “Posting”), such Posting acknowledges the lack of any confidential material and acts as an
  express grant to OXMAN of an unrestricted, irrevocable, worldwide, non-exclusive license to use any Intellectual
  Property contained in any Posting in any way, including to reproduce, display, perform, modify, transmit, and
  distribute such Posting, and you agree that OXMAN is free to use any ideas, concepts, know-how, or techniques that you
  send or post for any purpose, including the creation of derivative works.</p><p>To the extent you wish to post or
  distribute information, or materials to the OXMAN website that you do not own or have a right to post or distribute,
  OXMAN requires you to obtain any necessary permissions from the third-party owners before doing so.</p><p>You
  acknowledge and agree that you will not upload, distribute, or otherwise post any information or materials to this
  website that is libelous, defamatory, threatening, abusive, unlawful, or that encourages a criminal offense; contains
  any viruses or other code, file, or program that is designed to interrupt, destroy, or limit the functionality of any
  computer software, hardware, or telecommunications equipment; infringes the copyright or other proprietary rights of
  any third party; or contains any advertising, promotional, or solicitation material.</p><p><strong>California Privacy
  Rights</strong></p><p>California’s Consumer Privacy Act of 2018, Civil Code section 1798.100 et seq., requires certain
  businesses to respond to requests from California customers asking about the businesses’ practices related to
  disclosing personal information to third parties for the third parties’ direct marketing purposes. Alternately, such
  businesses may have in place a policy not to disclose personal information of customers to third parties for the third
  parties’ direct marketing purposes if the customer has exercised an option to opt out of such information-sharing. We
  do not share, rent or sell share users’ personal information with outside parties.</p><p><strong>Children’s Online
  Privacy Protection Act</strong></p><p>We do not sell products or services to anyone under the age of thirteen (13). In
  accordance with the Children’s Online Privacy Protection Act (“COPPA”), we will never knowingly request or solicit
  personal data from anyone under the age of thirteen (13) without verifiable parental consent. In the event that we
  receive actual knowledge that we have collected such personal data without the requisite and verifiable parental
  consent, we will delete that information from our database as quickly as is practical.</p><p><strong>Disclaimer of
  Accuracy and Warranties</strong></p><p>OXMAN does not make any representation as to the accuracy of any information
  contained, presented or displayed on Oxman.com. OXMAN disclaims any warranty (implied, express or otherwise),
  including warranty of merchantability, fitness for a particular purpose or non-infringement of any other Intellectual
  Property rights therein.</p><p><strong>Commercial Use is Prohibited Except with Express
  Permission</strong></p><p>Unauthorized publication or use of OXMAN’s works or other materials is prohibited. Anyone
  wishing to use any of these works for commercial use, publication, or any other purpose must request and receive prior
  written permission. All requests to reproduce content from the Website should be directed to<a target="_blank"
  href="https://oxman.com/cdn-cgi/l/email-protection#fb9894958f9a988fbb9483969a95d5989496">[email
  protected]</a>.</p><p><strong>Reservation of Rights</strong></p><p>All rights not expressly granted by OXMAN herein
  are specifically and completely reserved. Nothing on the Website grants, expressly or implicitly, by estoppel or
  otherwise, any right or license to use any content or property of OXMAN or any third party, or may be construed to
  mean that OXMAN has authority to grant any right or license on behalf of any third party.</p><p><strong>Links to
  Third-Party Websites</strong></p><p>OXMAN has not reviewed all the websites or services linked to or from this
  website. OXMAN provides these links as a convenience and linking to any third-party websites or services is at the
  user&#x27;s own risk. A link does not imply endorsement or affiliation with the linked website by
  OXMAN.</p><p>‍<strong>Limitation of Liability</strong></p><p>Neither OXMAN, its affiliates, directors, officers,
  employees, agents, consultants or representatives will have any liability for any damages, including, without
  limitation, any direct, indirect, incidental, compensatory, punitive, special, or consequential damages (even if they
  have been advised of the possibility of such damages) arising from or related to your use of the website and/or its
  contents or links.</p><p><strong>Indemnification</strong></p><p>By using this website in any manner, you represent and
  warrant that your use will be consistent with these Terms and Policies. You agree to indemnify, defend, and hold
  OXMAN, its affiliates, directors, officers, employees, agents, consultants and representatives harmless from all
  claims, causes, costs, expenses, fees (including reasonable attorneys’ fees), judgments, liabilities, losses, and
  damages arising from or relating to your use of the website.</p><p><strong>Venue and Choice of
  Law</strong></p><p>These Terms and Privacy Policy and any counterparts, amendments, or revisions thereto will be
  governed and construed in accordance with the laws of the State of New York, without regard to principles of conflicts
  of laws. Any case, controversy, suit, action, or proceeding arising out of, in connection with, or related to the
  Terms or the Policy will be brought solely in Federal or State court located in New York County and the State of New
  York, and you hereby waive any objection that you may have to personal jurisdiction in these courts. To the fullest
  extent permitted by law, all parties to any such lawsuit waive any right to a jury.</p><p><strong>Entire Agreement;
  Severance; Waiver</strong></p><p>These Terms and Policy incorporate by reference any notices on the website and
  constitute the entire agreement regarding user access to the website. If any provision is deemed unlawful, void, or
  unenforceable, that provision will be interpreted to as to achieve its underlying purpose in a way that is not
  unlawful, void or unenforceable; if that is not possible, then any such provision shall be severable from the
  remaining provisions and will not affect their validity and enforceability. OXMAN’s failure to enforce a provision on
  any occasion will not be construed as a waiver of such provision.<br/></p><p><br/><br/>All images and videos courtesy
  Neri Oxman and NEOX Public Benefit, LLC.</p></div></div></div></div></section><footer
