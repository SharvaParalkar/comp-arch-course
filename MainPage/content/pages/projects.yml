      <p><a href="projects/shellular-funicular-materials.html">Shellular Funicular Materials</a></p>

      <p>This research introduces an alternative design strategy based on the static equilibrium of forces, equilibrium
      of polyhedral frames, and reciprocity of form and force. This novel approach reveals a geometric relationship
      among the truss system architecture, topological dual, and equilibrium of forces on the basis of 3D graphic
      statics. [...]</p>
