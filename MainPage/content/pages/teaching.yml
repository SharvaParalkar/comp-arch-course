      <p>Structures Instructors: Richard Farley, Masoud Akbarzadeh, Mostafa Akbari (TA)</p>

      <p>This seminar covers the study of static and hyperstatic systems and design of their elements. Flexural theory,
      elastic and plastic. Design for combined stresses; prestressing. The study of graphic statics and the design of
      trusses. The course comprises both lectures and a weekly laboratory in which various structural elements, systems,
      materials and technical principles are explored., [...]</p>
