  data-wf--section-1-1--variant="s-top-padding" class="section"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Past and Present</h2></div></div><div class="d"><div class="txt-large
  w-richtext"><p>Building upon previous work and research in the field of Material Ecology, we connect with the past to
  invent the future. Our academic work has been recognized in publications and exhibitions including two monograph
  exhibitions at the Museum of Modern Art (MoMA) in NYC, and the San Francisco Museum of Modern Art
  (SFMOMA).</p><p>While the tenor of our academic work focused on “what if” explorations, our current work focuses on
  “how to” applications. Still, it is possible to trace an aesthetic language running through and across our work: past,
  present and future. To learn more, please see a list of projects below:</p></div><div
  class="d"></div></div></div></section><section class="section is-on-top"><div class="container"><div
