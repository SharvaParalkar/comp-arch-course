  is-exclusion"><div class="d"><h1 class="display-h">Work</h1></div></div></header><section
  data-wf--section-1--variant="xl-top-padding" class="section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div
  class="container"><div class="d"><div class="h-x-large">We design nature-machine interfaces in the form of products
  and environments across scales, sites, and species.</div></div></div></section><section
  data-wf--section-1-1--variant="xl-top-padding" class="section w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div
  class="container w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Who are we</h2></div></div><div class="d"><div class="txt-large w-richtext"><p>We are a design
  company advancing the unification of top-down design engineering with bottom-up biological growth toward the mutual
  empowerment of Nature and Humanity. We operate at the intersection of computational design, biology, robotics, green
  chemistry, and ecological engineering. We envision a world where Nature and humans coproduce, cohabitate, and
  communicate as one.</p></div><div class="d"></div></div></div></section><section
  data-wf--section-1-1--variant="s-top-padding" class="section"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Our model</h2></div></div><div class="d"><div class="txt-large
  w-richtext"><p>Through the creation of products and platforms, we explore three dimensions of collaborating with
  Nature: coproduction, cohabitation, and communication. They include a new product typology, a novel building typology,
  and a novel interface typology. We demonstrate these typologies through three projects and the platforms invented to
  create them: a wearable designed entirely out of a microorganism, a computationally emergent urban environment
  designed to rewild its site, and a ‘smell computer’ designed to concoct a functionalized fragrance with no harm to the
  environment. Enter our project pages to learn more.</p></div><div class="d"></div></div></div></section><section
  class="section is-t-double"><div class="container"><div class="work-wrap w-dyn-list"><div role="list" class="work-list
