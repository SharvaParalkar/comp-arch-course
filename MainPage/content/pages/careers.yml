  class="h-medium">Join OXMAN</h2></div></div><div class="d"><div class="txt-large w-richtext"><p>We are growing a
  world-class team of designers, engineers, scientists, and makers committed to healing the rift between Nature and
  humanity. Guided by our bold vision for the future, we lead with brilliance and empathy, unafraid to take risks and
  never letting the ‘impossible’ get in the way of the scale of impact we wish to create. With interconnectedness at the
  core of who we are, we welcome individuals with diverse perspectives, experiences, and backgrounds to join our team in
  New York as we work together to discover and design more magic in the world. Hear from our team on what it&#x27;s like
  to work here.</p><p>‍</p></div><div class="d"></div></div></div></section><section class="position-title-sec"><div
