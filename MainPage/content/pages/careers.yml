  3D printed death mask. Photo: Yoram Reshef</div></div><div data-wf--card--variant="33-minimum" class="d is-card"><div
  class="card-img-frame"><img alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6920b2358abee60b6449f7b9_67aa52a4a7aca49ff1f78a15_cofab-bee-cube.avif"
  loading="lazy" class="full-img"/></div><div class="h-x-small">Synthetic Apiary II. Freeform honeycomb built by bees on
  a single rotating axis</div></div></div></section><section data-wf--section-1-1--variant="xl-top-padding"
  class="section w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div class="container
  w-variant-79ffc6fb-7854-dd3e-4f9d-a5ed3f400804"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Open
  positions</h2></div></div><div class="d"><div class="txt-large w-richtext"><p>OXMAN is seeking individuals operating
  across scales and domains. Successful applicants embody stellar technical skills in their respective field(s), can
  self-direct, and demonstrate a unique “language” of computing (software) / fabricating (hardware) / growing (wetware),
  or a combination thereof.</p><p>They have produced and can present a prolific corpus of digital and/or physical
  expressions rooted in process-driven design; exemplify a passion for systems-based thinking with a wide range of
  potential applications for their work; personify an appreciation for science; and seek synergy between biology and
  technology in research, practice, or their unity.</p><p>Successful candidates embody a “taste in being” combining the
  ability to take initiative with an aptitude for nurturing collaborative teamwork across disciplines. Industry
  experience combined with the ability to lead research, produce striking work, and maintain intellectual and aesthetic
  “freshness” is desirable.</p><p>‍</p></div><div class="d"></div></div></div></section><section class="section
