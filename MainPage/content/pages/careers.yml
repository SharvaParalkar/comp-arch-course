  href="job/senior-software-engineer-970a81b8-9eb3-4269-866f-e17b30f780f9.html" class="job-redirect
  w-inline-block"></a></div></div></div></div><div data-hover="false" data-delay="0" fs-list-position="100"
  fs-list-element="item" data-w-id="efe7021d-e188-ef78-8b3c-6507b060f8d0" class="carrier_item dropdown w-dropdown"><div
  class="dropdown-toggle w-dropdown-toggle"><div class="txt-large">Future Talent</div><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a0f1378b8dc05458df44785_Group%208.svg"
  loading="lazy" alt="" class="accordion-icon"/></div><nav class="dropdown-list w-dropdown-list"><div
  class="w-layout-grid job-info-grid mb---2px"><div class="div-block-8"></div><div><div class="div-block-6 _1-col"><div
  class="txt-small _2-col w-richtext"><p>We are always looking for pioneers. Our teams, including EDEN and Operations in
  NYC, operate at the intersection of design, technology, biology, ecology, and engineering. Currently, we are actively
  bringing on Computational Designers, Computational Ecologists, Machine Learning Research Engineers, and Product &amp;
  Project Development Leads.</p><p>True innovation rarely fits neatly into a standard job title. If you are an
  interdisciplinary thinker who bridges computational logic with ecological systems, or machine learning with generative
  design, we want to know you. Even if you do not see an open role that matches your exact background right now, this is
  the place to raise your hand.<br/></p></div></div><div class="mt-20"><a href="future-talent.html" class="h-small
  underlined">Submit Your Profile</a></div></div></div></nav></div></div></section><div class="code-embed w-embed"><div
  id="ashby_embed"></div></div><section class="new-our-principles-section"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Our principles</h2></div></div><div class="d grid-view"><div class="d
  is-tab-half"><h3 class="h-small">We pursue the profound</h3><div class="txt-small w-richtext"><p>We are explorers of
  profound questions. We work with energy, enthusiasm, and passion, unafraid to take risks and never letting the
  ‘impossible’ get in the way of the scale of the impact we wish to create. We actively share our vision with others
  through our work and its activation, revealing both new knowledge and hidden magic, and becoming a source of
  inspiration accessible to all.</p></div></div><div class="d is-tab-half"><h3 class="h-small">We mediate
  dichotomies</h3><div class="txt-small w-richtext"><p>Entanglement yields more than segregation. Design and R&amp;D,
  made and grown, Nature and humanity—our work not only demands this interdisciplinarity but also is made more
  meaningful through the mediation of these tensions. By seeing in gradients instead of absolutes, we allow each domain
  to augment the other, believing that the whole is greater than the sum of its parts.</p></div></div><div class="d
  is-tab-half"><h3 class="h-small">We pursue the profound</h3><div class="txt-small w-richtext"><p>We are explorers of
  profound questions. We work with energy, enthusiasm, and passion, unafraid <em>to take risks</em> and never letting
  the ‘impossible’ get in the way of the scale of the impact we wish to create. We actively share our vision with others
  through our work and its activation, revealing both new knowledge and hidden magic, and becoming a source of
  inspiration accessible to all.</p></div></div><div class="d is-tab-half"><h3 class="h-small">We mediate
  dichotomies</h3><div class="txt-small w-richtext"><p>Entanglement yields more than segregation. Design and R&amp;D,
  made and grown, Nature and humanity—our work not only demands this interdisciplinarity but also is made more
  meaningful through the mediation of these tensions. By seeing in gradients instead of absolutes, we allow each domain
  to augment the other, believing that the whole is greater than the sum of its parts.</p></div></div><div class="d
  is-tab-half"><h3 class="h-small">We balance the timely and the timeless</h3><div class="txt-small w-richtext"><p>We
  consider and leverage the past and future in design. We meet timeless challenges with timely tools, employing the
  cutting-edge technologies and techniques of the modern world to address age-old questions. We meet timely challenges
  with timeless tools, integrating Indigenous traditions in our approach and inviting billion-year-old evolutionary
  processes into our work as our co-designers.</p></div></div><div class="d is-tab-half"><h3 class="h-small">We nurture
  integrity</h3><div class="txt-small w-richtext"><p>We have a powerful internal compass that we listen to and nurture.
  It points us to honesty, virtue, and empathy. We consider the impact of our work on humanity, the natural world, and
  the future of both at every step, understanding that we are accountable for our
  actions.</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding" class="section
