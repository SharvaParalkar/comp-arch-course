  w-dropdown"><div class="dropdown-toggle w-dropdown-toggle"><div class="text-block-11">II.</div><div
  class="accordion-h-div center-aligned ml-30"><div class="accordion-h-txt">Application</div></div><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a0f1378b8dc05458df44785_Group%208.svg"
  loading="lazy" alt="" class="accordion-icon"/></div><nav class="dropdown-list w-dropdown-list"></nav></div><div
  class="job-bar"><div class="dropdown-toggle"><div class="text-block-11">I.</div><div class="accordion-h-div
  center-aligned ml-20"><div class="accordion-h-txt">Role Description</div></div><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a0f1378b8dc05458df44785_Group%208.svg"
  loading="lazy" alt="" class="accordion-icon"/></div><div class="dropdown-list"><div><div class="w-layout-grid
  job-info-grid"><div></div><div class="padding-top-2rem"><div class="txt-small job-template w-richtext">We are seeking
  an enthusiastic and innovation-driven Senior Software Engineer to support our Eden Technologies—comprising design
  optimization, generative tools, environmental simulation, and ecosystem behavior models—into an integrated software
  platform. This role offers a unique opportunity to develop innovative technologies and visually compelling software
  that supports the digital design of architectural and urban projects optimized for ecosystem services.


  Join us to redefine how design and technology can coexist with and enhance the natural world.


  Please provide a cover letter and portfolio if available.</div></div></div><div class="w-layout-grid
  job-info-grid"><div><div class="txt-small w-richtext"><p>Key Requirements</p></div></div><div class="padding-top"><div
  class="txt-small job-template w-richtext">* 5+ years building production web applications using React or Vue.

  * Expert proficiency in JavaScript, TypeScript, and Python, lower level languages like C++ or .NET is a plus.

  Ability to communicate design concepts through diagrams or wireframes.

  * Experience with web-based 3D rendering (e.g., Three.js) or real-time graphics tools (Unity/Unreal).

  * Ability to build Object-Orientated class structure in code-base.

  Familiarity with 3D applications such as Rhino, Blender or Houdini.

  * Ability to work collaboratively in multidisciplinary teams.

  * Strong problem-solving skills, enthusiasm, and creativity to approach complex software development
  challenges.</div></div></div><div class="w-layout-grid job-info-grid"><div><div class="txt-small w-richtext"><p>Key
  Goals and Outcomes</p></div></div><div class="padding-top"><div class="txt-small job-template w-richtext">* Develop
  and scale Eden Technologies into an integrated software platform supporting architectural and urban design projects

  * Build visually compelling full-stack applications that combine generative design, environmental simulation, and
  spatial visualization

  * Create interactive 3D and geospatial tools that help designers evaluate ecosystem services and ecological outcomes

  * Translate computational ecology research, environmental models, and design methods into usable production software

  * Support the digital design of Nature-centric built environments through optimization, simulation, and data-driven
  workflows

  * Improve platform maintainability, scalability, and extensibility through modular architecture and clear
  documentation

  * Establish and uphold engineering best practices across testing, CI/CD, code review, and collaborative development

  * Enable multidisciplinary collaboration between software engineers, computational ecologists, designers, architects,
  and researchers

  * Help advance OXMAN’s vision of integrating human-made and Nature-grown systems through design technology

  * Deliver software that supports complex decision-making for architectural, urban, and ecological design
  contexts</div></div></div><div class="w-layout-grid job-info-grid"><div><div class="txt-small w-richtext"><p>Preferred
  Experience</p></div></div><div class="padding-top"><div class="txt-small job-template w-richtext">* Background in
  architecture or urban planning with expertise in computational methods (generative design, simulation, optimization,
  and environmental modeling).

  * Experience analyzing scientific and spatial datasets, specifically utilizing GIS and remote sensing data.

  * Strong communication skills with a proven ability to convey complex technical concepts to non-technical
  stakeholders.</div></div></div><div class="w-layout-grid job-info-grid"><div><div class="txt-small
  w-richtext"><p>Required Certifications</p></div></div><div class="padding-top"><div class="txt-small job-template
  w-dyn-bind-empty w-richtext"></div></div></div><div class="w-layout-grid job-info-grid"><div><div class="txt-small
  w-richtext"><p>Technical Skills</p></div></div><div class="padding-top"><div class="txt-small job-template
  w-richtext">* Full-stack web application development with React or Vue

  * Expert proficiency in JavaScript, TypeScript, and Python

  * Experience with lower-level languages such as C++ or .NET preferred

  * Web-based 3D rendering and real-time graphics experience, including tools such as Three.js, Unity, or Unreal

  * Interactive spatial and 3D visualization development

  * Generative design, design optimization, environmental simulation, and ecosystem behavior modeling

  * Integration of geospatial datasets, GIS data, remote sensing data, and environmental models into scalable software
  systems

  * Object-oriented programming and class-based code architecture

  Familiarity with 3D design and modeling applications such as Rhino, Blender, or Houdini

  * Ability to create diagrams, wireframes, and other visual tools to communicate design concepts

  * Platform architecture and modular system design

  * Software engineering best practices, including testing, CI/CD pipelines, code reviews, and technical documentation

  * Experience translating research models, computational methods, and visualizations into production-ready software

  * IMPORTANT NOTE: Applications that do not include uploads or active/working links to portfolios of work will not be
  considered.

  * Compensation: $120K - $150K</div></div></div><div class="w-layout-grid job-info-grid brdr-0"><div><div
