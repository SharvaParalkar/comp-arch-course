  w-richtext"><p>Technical Skills</p></div></div><div class="padding-top"><div class="txt-small job-template
  w-richtext">* Proficiency in Rhino, Grasshopper, V-Ray, and Adobe Creative Suite.

  * IMPORTANT NOTE: Applications that do not include uploads or active/working links to portfolios of work will not be
  considered.

  * Compensation: $110k - $137K</div></div></div><div class="w-layout-grid job-info-grid brdr-0"><div><div
