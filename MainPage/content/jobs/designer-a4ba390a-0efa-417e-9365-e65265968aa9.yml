  <div class="job-page-div"><section class="job-page-hero-sec"><div class="w-layout-blockcontainer job-posting-container
  w-container"><div class="eyebrow-txt"><span department="EDEN" class="department-text">EDEN</span> Roles</div><h1
  class="job-title">Designer</h1></div></section><section class="overview-job-sec"><div class="w-layout-blockcontainer
  job-posting-container w-container"><div class="w-layout-grid job-grid"><div><div
  class="h-medium">Overview</div></div><div><div class="txt-small job-template w-richtext">OXMAN is a nature-based
  research and design company based in Manhattan. We incubate ventures and technologies that reimagine the relationship
  between humanity and the natural world. Working across disciplines—from architecture and ecology to materials science
  and computation—we develop nature-centric solutions to critical environmental
  challenges.</div></div></div></div></section><section class="team-sec job-info-grid"><div
  class="w-layout-blockcontainer job-posting-container w-container"><div class="w-layout-grid job-grid"><div><div
  class="h-medium"><span team="EDEN" class="team-name">EDEN</span> Team</div></div><div><div class="txt-small _2-col
  job-template w-richtext">Nature provides humanity with services that are critical for survival: the sequestration of
  carbon, the filtration of water, and the production of the air we breathe. EDEN works to strengthen and regenerate
  these natural processes by cultivating biodiverse, resilient ecosystems that sustain life for all species—human and
  non-human alike.

  EDEN is a digital design environment for the engineering and design of ecosystems, modeling the flows, relationships,
  and processes that sustain them. We build tools that quantify how landscapes can be engineered toward specific
  performance goals—cooling cities, filtering water, sequestering carbon, and protecting key species—and use those tools
  to guide the design of ecologically active sites.

  One hectare of well-designed landscape can sequester up to four times the annual emissions of an average home, filter
  enough water to support thirteen neighborhoods, and reduce ambient temperatures by more than ten degrees. EDEN enables
  designers to plan intentionally for these outcomes through analysis, simulation, and optimization, turning ecological
  function into an actionable design parameter.

  Our design team works directly with clients to apply these tools toward site-specific goals, from logistics campuses
  and residential communities to rewilding and climate-resilient developments. Together with our clients, we are
  designing biodiverse, productive environments that serve both humanity and
  nature.</div></div></div></div></section><section class="job-media_sec"><div class="w-layout-blockcontainer
  job-posting-container w-container"><div class="w-dyn-list"><div class="empty-state w-dyn-empty"><div>Graphics are
