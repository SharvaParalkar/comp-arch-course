  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a0f1378b8dc05458df44785_Group%208.svg"
  loading="lazy" alt="" class="accordion-icon"/></div><div class="dropdown-list"><div><div class="w-layout-grid
  job-info-grid"><div></div><div class="padding-top-2rem"><div class="txt-small job-template w-richtext">OXMAN is
  seeking an architect or landscape architect with exceptional design sensibilities and outstanding representation
  skills to join the EDEN design team. This role is for a designer who moves fluidly between rigorous spatial thinking
  and expressive visual communication, and who can rapidly translate complex ideas into clear, compelling visuals that
  drive projects forward.

  A successful candidate does not simply document a project, but actively constructs its narrative and spatial logic
  through drawing, diagramming, and visualization. They are comfortable working iteratively and at speed, producing
  sketches, diagrams, and renderings that distill core ideas and give form to new environments.

  The ideal candidate thrives in non-linear, research-driven design processes and is excited to work at a range of
  scales and project types from urban parks to  large-scale industrial and residential developments. Each project
  demands both conceptual clarity and precise design articulation, with an emphasis on integrating ecological
  performance into spatial design.</div></div></div><div class="w-layout-grid job-info-grid"><div><div class="txt-small
  w-richtext"><p>Key Requirements</p></div></div><div class="padding-top"><div class="txt-small job-template
  w-richtext">* A minimum of 5 years of professional experience in an architecture or landscape architecture practice.

  * Advanced degree or equivalent professional experience in Architecture, Landscape Architecture, or a related field.

  * A portfolio demonstrating strong conceptual design thinking and exceptional representation skills across multiple
  media (sketching, drawing, rendering, diagramming).

  * Proven ability to work quickly and iteratively, producing clear and compelling visuals under tight timelines.

  * Strong planning skills across multiple scales.

  * Ability to synthesize complex environmental, technical, and spatial data into clear design logic and visual
  communication.

  * Interest in or experience with ecological design, systems thinking, or performance-driven design processes.

  * Strong collaborative mindset and comfort working in interdisciplinary teams.</div></div></div><div
  class="w-layout-grid job-info-grid"><div><div class="txt-small w-richtext"><p>Key Goals and
  Outcomes</p></div></div><div class="padding-top"><div class="txt-small job-template w-richtext">* Shape the design of
  large-scale developments to be measurably more ecological, resilient, and regenerative.

  * Help define and evolve EDEN’s design and representation language—how ecological systems are visualized and
  communicated.

  * Contribute to a new model of practice that integrates design, science, and technology into a unified workflow.

  * Deliver impactful, visually compelling work that communicates complex ideas to clients, collaborators, and broader
  audiences.

  * Contribute to projects that directly affect climate resilience, biodiversity, and the future of human–nature
  relationships.</div></div></div><div class="w-layout-grid job-info-grid"><div><div class="txt-small
  w-richtext"><p>Preferred Experience</p></div></div><div class="padding-top"><div class="txt-small job-template
  w-richtext">* Interest in or experience with ecological design, systems thinking, or performance-driven design
  processes.</div></div></div><div class="w-layout-grid job-info-grid"><div><div class="txt-small
  w-richtext"><p>Required Certifications</p></div></div><div class="padding-top"><div class="txt-small job-template
