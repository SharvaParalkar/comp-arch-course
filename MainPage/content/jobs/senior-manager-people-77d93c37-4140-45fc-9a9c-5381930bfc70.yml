  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a0f1378b8dc05458df44785_Group%208.svg"
  loading="lazy" alt="" class="accordion-icon"/></div><div class="dropdown-list"><div><div class="w-layout-grid
  job-info-grid"><div></div><div class="padding-top-2rem"><div class="txt-small job-template w-richtext">OXMAN is
  seeking a Senior Manager, People to lead our People function as a one-person team, reporting directly to the CFO. This
  is a rare opportunity for a seasoned People leader with strong recruiting instincts to own the full employee lifecycle
  at a visionary, fast-moving design and science company.


  The ideal candidate is equally comfortable advising the CFO on workforce planning strategy and rolling up their
  sleeves to post a job, run an interview process, or process payroll. They will have built or managed the People
  infrastructure in startup or incubator environments and thrive in organizations where no two days look alike. They
  understand that at 22 people and growing, culture is lived in the day-to-day and that the policies, programs, and
  hiring decisions they make will shape OXMAN for years to come.</div></div></div><div class="w-layout-grid
  job-info-grid"><div><div class="txt-small w-richtext"><p>Key Requirements</p></div></div><div class="padding-top"><div
  class="txt-small job-template w-richtext">* 5+ years of progressive HR/People experience, including hands-on
  generalist work across recruiting, employee relations, compliance, and operations

  * Demonstrated experience as a sole People leader or in a small HR team, ideally in a startup, incubator, or
  high-growth organization

  * Full-cycle recruiting experience, including direct sourcing and management of external search partners

  * Working knowledge of HRIS/ATS systems, payroll platforms, and New York State and federal labor regulations

  * Proven ability to advise and influence senior leadership including C-suite stakeholders

  * Experience establishing People operations from scratch or in a lightly resourced environment

  * Bachelor's degree in Human Resources, Business, or a related field</div></div></div><div class="w-layout-grid
  job-info-grid"><div><div class="txt-small w-richtext"><p>Key Goals and Outcomes</p></div></div><div
  class="padding-top"><div class="txt-small job-template w-richtext">* Design and execute People strategies aligned with
  company objectives, including policy development, compliance, and culture initiatives

  * Own the full talent acquisition cycle: sourcing, screening, interviewing, offers, and onboarding for all roles
  across all areas including research, design, engineering, and operations

  * Manage external recruiting partnerships and ensure alignment with OXMAN's unique talent profile

  * Build and administer performance management, employee engagement, recognition, and succession planning programs

  * Advise the CFO and senior leadership on People matters including workforce planning, organizational design, and
  scaling strategy

  * Ensure all workplace policies reflect current legal, ethical, and industry best practices across federal and New
  York State employment law

  * Oversee compensation benchmarking, benefits administration, and payroll operations

  * Support managers on employee relations, conflict resolution, and organizational change

  * Design programs to support rapid growth, potential spin-offs, and role definition in a high-change environment

  * Own and optimize the People technology stack (HRIS, ATS, payroll systems) and generate data-driven People metrics
  and reporting</div></div></div><div class="w-layout-grid job-info-grid"><div><div class="txt-small
  w-richtext"><p>Preferred Experience</p></div></div><div class="padding-top"><div class="txt-small job-template
  w-richtext">* Prior experience in VC-backed, design-driven, science-oriented, or architecture/AEC organizations

  * Experience supporting organizational spin-offs, entity formation, or rapid headcount scaling

  * Exposure to international employment considerations, visa processing, or multi-entity People operations

  * Strategic project management experience tied to organizational transformation

  * Certifications such as SHRM-CP, SHRM-SCP, or PHR are preferred</div></div></div><div class="w-layout-grid
  job-info-grid"><div><div class="txt-small w-richtext"><p>Required Certifications</p></div></div><div
  class="padding-top"><div class="txt-small job-template w-richtext">NA</div></div></div><div class="w-layout-grid
  job-info-grid"><div><div class="txt-small w-richtext"><p>Technical Skills</p></div></div><div class="padding-top"><div
  class="txt-small job-template w-richtext">* Proficiency with HRIS platforms (e.g., ChartHop)

  * Familiarity with ATS tools (Ashby) and structured interviewing frameworks

  * Experience managing strategic relationship with PEO (TriNet)

  * Ability to manage payroll administration and benefits enrollment independently

  * Comfort with data analysis and People metrics reporting

  * Working knowledge of compensation benchmarking tools and methodologies

  * Compensation: $142K - $178K</div></div></div><div class="w-layout-grid job-info-grid brdr-0"><div><div
