main_html: >-
  <div class="job-page-div"><section class="job-page-hero-sec"><div class="w-layout-blockcontainer job-posting-container
  w-container"><div class="eyebrow-txt"><span department="EDEN" class="department-text">EDEN</span> Roles</div><h1
  class="job-title">Project Lead</h1></div></section><section class="overview-job-sec"><div
  class="w-layout-blockcontainer job-posting-container w-container"><div class="w-layout-grid job-grid"><div><div
  class="h-medium">Overview</div></div><div><div class="txt-small job-template w-richtext">OXMAN is a nature-based
  research and design company based in Manhattan. We incubate ventures and technologies that reimagine the relationship
  between humanity and the natural world. Working across disciplines—from architecture and ecology to computation and
  materials science—we develop nature-centric solutions to critical environmental
  challenges.</div></div></div></div></section><section class="team-sec job-info-grid"><div
  class="w-layout-blockcontainer job-posting-container w-container"><div class="w-layout-grid job-grid"><div><div
  class="h-medium"><span team="EDEN" class="team-name">EDEN</span> Team</div></div><div><div class="txt-small _2-col
  job-template w-richtext">EDEN is a digital design environment for the engineering and design of ecosystems—modeling
  the flows, relationships, and processes that sustain ecosystems, while bridging ecology and technology to enable the
  creation of resilient landscapes. We develop tools that quantify how landscapes can be engineered toward specific
  performance goals—cooling cities, filtering water, sequestering carbon, protecting key species—then use those tools to
  guide the design of ecologically active sites.

  EDEN operates as both a design and innovation practice and an emerging software product. Today, our work spans
  strategic partnerships with developers, project-based design and analytics engagements, and the development of a
  software platform that packages our internal tools for broader use across the architecture, landscape architecture,
  and development industries.

  As EDEN grows, we are seeking a Project Lead to own and develop dedicated client partnerships, lead the delivery of
  partner-specific projects, and ensure that project work is clearly scoped, technically grounded, commercially aligned,
  and executed with discipline.

  </div></div></div></div></section><section class="job-media_sec"><div class="w-layout-blockcontainer
  job-posting-container w-container"><div class="w-dyn-list"><div class="empty-state w-dyn-empty"><div>Graphics are
