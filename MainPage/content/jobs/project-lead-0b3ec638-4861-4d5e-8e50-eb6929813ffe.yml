  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a0f1378b8dc05458df44785_Group%208.svg"
  loading="lazy" alt="" class="accordion-icon"/></div><nav class="dropdown-list w-dropdown-list"></nav></div><div
  data-hover="false" data-delay="0" data-w-id="5dc3c655-6abe-0269-5939-a06cacd3fe10" class="application-dropdown hidden
  w-dropdown"><div class="dropdown-toggle w-dropdown-toggle"><div class="text-block-11">II.</div><div
  class="accordion-h-div center-aligned ml-30"><div class="accordion-h-txt">Application</div></div><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a0f1378b8dc05458df44785_Group%208.svg"
  loading="lazy" alt="" class="accordion-icon"/></div><nav class="dropdown-list w-dropdown-list"></nav></div><div
  class="job-bar"><div class="dropdown-toggle"><div class="text-block-11">I.</div><div class="accordion-h-div
  center-aligned ml-20"><div class="accordion-h-txt">Role Description</div></div><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a0f1378b8dc05458df44785_Group%208.svg"
  loading="lazy" alt="" class="accordion-icon"/></div><div class="dropdown-list"><div><div class="w-layout-grid
  job-info-grid"><div></div><div class="padding-top-2rem"><div class="txt-small job-template w-richtext">OXMAN is
  seeking a Project Lead to lead the successful delivery of EDEN projects from proposal through closeout, while
  supporting the management of strategic client relationships.

  This role sits at the intersection of project management, scoping, design coordination, technical alignment, delivery
  accountability, and client communication. The Project Lead is responsible for translating partner needs into
  executable project plans, coordinating interdisciplinary teams, maintaining project discipline, and ensuring that
  EDEN’s work is delivered on time, within scope, and to a high standard.

  The Project Lead will work closely with dedicated partners and internal teams to understand project context, define
  clear scopes of work, manage communication, track decisions and dependencies, and ensure that deliverables are aligned
  with both client expectations and EDEN’s technical and strategic goals.

  The Project Lead is not expected to personally own every technical, ecological, or design decision. However, they are
  responsible for ensuring that the right technical, scientific, design, and leadership stakeholders are engaged at the
  right moments; that project scope is documented and protected; that client expectations are accurately reflected in
  internal work plans; and that final deliverables meet the needs of both the partner and EDEN.

  This role is project-delivery focused and partner-aware. A successful Project Lead is accountable for the structure,
  coordination, and execution of individual projects, while also contributing to the health of the broader partner
  relationship through disciplined delivery, clear communication, and thoughtful identification of future opportunities.
  The ideal candidate is highly organized, commercially aware, design-literate, and technically fluent enough to
  coordinate interdisciplinary work across ecology, computation, design, research, and product. They should be
  comfortable operating in ambiguity while building the structure required to move projects from open-ended opportunity
  to executable scope, successful delivery, and future portfolio development.

  </div></div></div><div class="w-layout-grid job-info-grid"><div><div class="txt-small w-richtext"><p>Key
  Requirements</p></div></div><div class="padding-top"><div class="txt-small job-template w-richtext">* Bachelor’s
  degree or equivalent experience in architecture, landscape architecture, urban planning, ecology, environmental
  design, engineering, business, project management, or a related field.

  * 5+ years of experience leading complex projects, interdisciplinary delivery teams, client-facing engagements, design
  projects, strategic initiatives, or project-based consulting work.

  * Demonstrated experience managing project delivery with accountability for scope, timelines, communication, delivery
  quality, expectation management, and internal coordination.

  * Strong project scoping and documentation skills, including the ability to define deliverables, timelines,
  assumptions, exclusions, workstreams, dependencies, review points, decision records, and closeout criteria.

  * Experience managing project risks, scope changes, handoffs, timelines, internal dependencies, client feedback, and
  issue escalation.

  * Ability to work effectively across technical and non-technical teams, including designers, computational designers,
  researchers, scientists, product teams, and executive stakeholders.

  * Technical fluency sufficient to understand computational design workflows, analytical methods, design optimization,
  data-driven deliverables, and the constraints of technical production.

  * Strong communication and presentation skills, with the ability to explain complex ecological, design, and technical
  concepts to external partners.

  * Excellent organizational judgment, with the ability to convert ambiguous opportunities into structured project plans
  and executable scopes.

  * Demonstrated ability to maintain clear project operating systems, including meetings, trackers, documentation,
  milestones, review processes, and accountability structures.

  * Ability to operate in a small, fast-moving, interdisciplinary team where processes are still being built and roles
  may evolve.

  * Strong sense of ownership and accountability for project delivery, internal coordination, and client
  trust.</div></div></div><div class="w-layout-grid job-info-grid"><div><div class="txt-small w-richtext"><p>Key Goals
  and Outcomes</p></div></div><div class="padding-top"><div class="txt-small job-template w-richtext">* Maintain a
  strong, trusted working relationship with dedicated partners through consistent communication, reliable execution, and
  clear expectation management.

  * Develop a working understanding of each partner’s business priorities, site portfolio, internal decision-making
  structure, constraints, and near-term project opportunities.

  * Ensure partner projects are translated from open-ended needs or opportunities into clearly scoped, executable
  project plans with defined deliverables, timelines, responsibilities, assumptions, exclusions, and review points.

  * Own the coordination and delivery rhythm for partner projects, ensuring that internal teams, technical leads, design
  stakeholders, and leadership are aligned at each major project gate.

  * Maintain project discipline across the partnership by actively managing scope, decisions, risks, dependencies,
  changes, feedback, and issue escalation.

  * Ensure project work is delivered on time, within agreed scope, and to a standard that strengthens the broader
  partner relationship.

  * Build repeatable project operating systems for the partnership, including meeting cadences, action trackers,
  decision logs, documentation structures, review workflows, and closeout processes.

  * Protect internal team capacity and delivery quality by identifying misalignment, scope creep, unclear ownership, or
  unresolved dependencies early.

  * Capture lessons learned, reusable project assets, process improvements, and technical translation opportunities from
  each partner engagement.

  * Support the development of future project opportunities by identifying partner needs, communicating EDEN’s value
  clearly, and connecting successful delivery to future portfolio growth.</div></div></div><div class="w-layout-grid
  job-info-grid"><div><div class="txt-small w-richtext"><p>Preferred Experience</p></div></div><div
  class="padding-top"><div class="txt-small job-template w-richtext">* Experience in architecture, landscape
  architecture, real estate development, environmental planning, ecological design, climate technology, design
  technology, or adjacent AEC industries.

  * Experience working with developers, municipalities, design firms, landowners, or institutional partners on
  site-based design or planning projects.

  * Familiarity with computational design, geospatial analysis, ecological modeling, environmental analytics, simulation
  workflows, or design optimization.

  * Experience developing proposals, scopes of work, client presentations, project briefs, schedules, project trackers,
  and project management systems.

  * Experience managing recurring client work, account-based project portfolios, or long-term partnerships where
  individual projects contribute to a broader relationship.

  * Experience working in hybrid organizations that combine consulting, design services, research, and product
  development.

  * Interest in ecology, regenerative design, environmental performance, resilient landscapes, and the role of
  technology in shaping the built environment.</div></div></div><div class="w-layout-grid job-info-grid"><div><div
  class="txt-small w-richtext"><p>Required Certifications</p></div></div><div class="padding-top"><div class="txt-small
  job-template w-dyn-bind-empty w-richtext"></div></div></div><div class="w-layout-grid job-info-grid"><div><div
  class="txt-small w-richtext"><p>Technical Skills</p></div></div><div class="padding-top"><div class="txt-small
  job-template w-richtext">* Technical fluency with computational design workflows used in architecture, landscape
  architecture, urban planning, environmental planning, or adjacent AEC contexts.

  * Familiarity with data-driven design processes, including site analysis, scenario testing, spatial optimization,
  performance modeling, simulation workflows, and analytical deliverables.

  * Working knowledge of GIS workflows, including spatial data organization, geospatial analysis, map-based
  communication, site constraints mapping, and interpretation of publicly available planning or environmental datasets.

  * Ability to coordinate technical work across computational designers, GIS specialists, ecologists, landscape
  architects, architects, product teams, and external project stakeholders.

  * Comfort translating technical, ecological, and design analysis into project scopes, client-facing deliverables,
  internal workplans, schedules, assumptions, and review processes.

  * Familiarity with planning, environmental, zoning, entitlement, permitting, or compliance workflows that shape
  site-based design and development projects.

  * Ability to understand and manage technical dependencies, data requirements, review gates, model limitations,
  analytical assumptions, and production constraints.

  * Familiarity with compliance-oriented project documentation, including assumptions, exclusions, decision records,
  risk logs, approval pathways, and closeout criteria.

  * Ability to evaluate whether proposed technical approaches are appropriately scoped, resourced, documented, and
  aligned with client expectations.

  * Working understanding of how computational design, GIS, ecological analysis, environmental performance metrics, and
  regulatory constraints can inform master planning, preliminary site design, and partner decision-making.

  * Compensation: $135K - $170K</div></div></div><div class="w-layout-grid job-info-grid brdr-0"><div><div
