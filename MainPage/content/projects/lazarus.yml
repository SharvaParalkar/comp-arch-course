main_html: "<div><header data-wf--hero-section-project--variant=\"black-on-white\" class=\"section is-hero\"><div class=\"container is-hero-60\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><div class=\"eyebrow-txt\">Project<br/></div></div><h1 class=\"display-h\">Lazarus</h1></div></div></div></header><section data-wf--video-player-section--variant=\"no-top-padding\" class=\"full-media-section\"><div class=\"video-aspect-box\"><button data-w-id=\"b4c9e4c5-2cea-d36c-b0e8-28a78bfe27f5\" class=\"player-thumbnail-button\"><div class=\"play-div\"><div class=\"cursor-play is-mobile\"><div class=\"arrow-icon w-embed\"><svg width=\"100%\" height=\"100%\" viewBox=\"0 0 11 15\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n<path d=\"M1 12.7422V1.74219L10 6.98028L1 12.7422Z\" stroke=\"white\" stroke-width=\".5\"/>\n</svg></div></div></div><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6967c4708a4361da1c2cb422_025-architecturalproposal.avif\" loading=\"lazy\" data-w-id=\"dca2cf2a-a7fc-317a-e838-13e604164f8a\" alt=\"025 Architecturalproposal\" class=\"player-thumbnail\"/></button><iframe src=\"https://player.vimeo.com/video/192040946\" frameborder=\"0\" webkitallowfullscreen=\" \" mozallowfullscreen=\" \" allowfullscreen=\" \" data-vimeoplayer-iframe=\" \" allow=\"autoplay\" aria-label=\"Vimeo Video\" data-ready=\"true\" class=\"video-element\"></iframe></div><div class=\"caption-div\"><div class=\"h-x-small\">MRI-like representation of material distribution inside of the mask</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Hybrid living mask prototypes</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Research Team</strong>: Christoph Bader, Dominik Kolb, James C. Weaver. Prof. Neri Oxman.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Year</strong>: 2016</p><p><strong>Location</strong>: London Design Museum, 2016, London, United Kingdom</p><p><strong>Platform</strong>: <a href=\"https://oxman.com/projects/data-driven-material-modeling\">Data-Driven Material Modeling</a></p></div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">With every breath, we inhale the story of our ancestors.</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Position</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>They say that in every breath of fresh air we take, there are molecules exhaled by Jesus, Cleopatra, or Julius Caesar in their dying breath. In a very physical way, we live amongst the spirits, and they live amongst us.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Lazarus is a mask designed to contain the wearer’s last breath. This was the precursor—a kernel—for a larger collection of masks, entitled Vespers, speculating on, and offering a new interpretation of, the ancient death mask.</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">A litre of air represents 0.000000000000000000001% (1e-23) of all the air on Earth.</div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">A single breath contains around 25 sextillion (2.5e22) air molecules, spreading around the globe within a couple of years.</div></div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697396b7d6ccedeb82220d22_imgi_2_67d85737d7b56f195fb71f1a_lazarus-web-05.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lazarus.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">3D printed death mask. Photo: Yoram Reshef</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697396b737cfb6cac5268fbb_imgi_3_67d8573893d46c558a51ed29_lazarus-web-06.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lazarus.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Printed from rigid white and transparent materials. Photo: Yoram Reshef</div></div></div></section><section data-wf--img-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697396b70274c6f279c6c811_imgi_4_67d8576293d46c558a522001_lazarus-diagram.avif\" loading=\"lazy\" alt=\"\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">Visualization of the design approach for Lazarus</div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">The project points towards an imminent future where wearable interfaces and building skins are customized not only to fit a particular shape, but also a specific material, chemical and even genetic make-up.</div></div></div></section><section data-wf--masonry-section--variant=\"xl-top-padding\" class=\"section w-variant-584906de-c7ca-afdd-d670-1b987ffda7c0\"><div class=\"container is-slot\"><div class=\"d is-masonry\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697396b7d6ccedeb82220d22_imgi_2_67d85737d7b56f195fb71f1a_lazarus-web-05.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lazarus.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Child with Lazarus mask. Photo: Danielle van Zadelhoff</div></div><div data-wf--card--variant=\"masonry-format\" class=\"d is-card\"><div class=\"card-img-frame w-variant-54ad2288-c5d4-9381-afdd-78c942f52362\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697396b7e29fb5faf0ad5fb2_imgi_6_67d857aa8c6b4b6cf684e200_04-lazarus.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lazarus.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Child with Lazarus mask. Photo: Danielle van Zadelhoff</div></div></div><div class=\"d is-masonry\"><div data-wf--card--variant=\"masonry-format\" class=\"d is-card\"><div class=\"card-img-frame w-variant-54ad2288-c5d4-9381-afdd-78c942f52362\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697396b7503cc1d342bed805_imgi_7_67d857aa1e9a64010f8b2cd9_01-lazarus.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lazarus.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">\_Child with Lazarus mask. Photo: Danielle van Zadelhoff 01 Lazarus Child with Lazarus mask. Photo: Danielle van Zadelhoff</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697396b7434616f1a5b3e513_imgi_8_67d857aa4e2f0e4003ff7b1d_lazarus-neri-art-yoram-reshef-photo-04-bw-body.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lazarus.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Surface area is modeled after the face of the dying. Photo: Danielle van Zadelhoff</div></div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Credits</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Collaborations</strong>: Gal Begun, Boris Belocon, Naomi Kaempfer, Danielle van Zadelhoff</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>All images and videos courtesy Neri Oxman and The Mediated Matter Group, unless indicated otherwise</p></div></div></div></div></section><footer class=\"next-project-section\"><div class=\"section is-next-project-heading\"><div class=\"container\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><h2 class=\"eyebrow-txt\">Next Project<br/></h2></div><div class=\"display-h\">Glass II</div></div></div></div></div><a data-w-id=\"e1127ab3-d257-ec54-b547-677dcc014cb2\" href=\"glass-ii.html\" class=\"next-project-link w-inline-block\"><div class=\"cursor-arrow is-mobile\"><div class=\"arrow-icon w-embed\"><svg width=\"100%\" height=\"100%\" viewBox=\"0 0 48 48\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n<path d=\"M4.70703 1L46.707 1L46.707 43\" stroke=\"white\" stroke-width=\"2\"/>\n<path d=\"M0.707031 47.2498L46.707 1.24977\" stroke=\"white\" stroke-width=\"2\"/>\n</svg></div></div><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697396b720ba4c09b4d572fe_imgi_9_67d8580cd700c44be816d6a4_glassii-web-03.avif\" loading=\"lazy\" alt=\"Glass II\" class=\"abs-img\"/><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lazarus.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></a></footer></div>"
