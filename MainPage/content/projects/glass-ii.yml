  class="source"/></video></div></div></div><div class="h-x-small">Disassembled
  column</div></div></div></section><section data-wf--stat-section--variant="xl-top-padding" class="section
  w-variant-41dda5da-37cf-7651-637f-35312d595621"><div class="container"><div class="d"><div class="vert-div"><div
  class="display-eyebrow-div"><div class="h-x-small">Extrusion Temperature in Celsius</div></div><div class="display-h
  is-data">1400</div></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>The computational framework used to generate each column’s form is directly influenced by the
  constraints of the manufacturing platform and structural system, demonstrating the ability to 3D print a wide range of
  shapes determined by desired mechanical and optical properties. By example, the higher the load, the greater the
  surface area of a column in plan view, the greater the number of lobes desired, the tighter the turning radius
  required for their 3D printing, and hence contributing to the geometric expression of the
  caustics.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Each column is fitted with a
  dynamic internal lighting system—<em>una stellina</em>—programed to travel up and down the column, generating a large
  caustic footprint with kaleidoscope-like patterns. The caustics are the sums of light rays reflected and/or refracted
  dynamically by the curved surface of the printed column over the surrounding walls of the Triennale. Over space, each
  successive column introduces a more complex caustic envelope with accompanied—and subtle—shifts in sound frequencies.
  Over time, each column’s light position and intensity varies, resulting in changes to the surface area, sharpness, and
  intensity of the caustic patterns. Combined, the overall experience challenges the perceived boundaries between time
  and space.</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding"
  class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
