  Printing</a></p></div></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding"
  class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Position</h2></div></div><div class="d"><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>To demonstrate <em>Glass II</em>’s capabilities, we presented an installation for
  Milan Design Week debuting at the Milan Triennale on April 4th, 2017.</p></div></div><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>The installation is comprised of a series of 3m-tall glass columns fully manufactured
  with the Glass 3D Printing platform.</p></div></div></div></div></section><section
