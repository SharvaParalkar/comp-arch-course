  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p><strong>Research team:</strong> Chikara
  Inamura, Michael Stern, Daniel Lizardo, Tal Achituv, Tomer Weller, Owen Trueblood, Nassia Inglessis, Giorgia Franchin,
