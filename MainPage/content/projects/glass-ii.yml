  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
  src="glass-ii.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">3D printed glass column installation at La Triennale
  di Milano</div></div><div data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><img
  alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697399ec1fdfb0437ea69977_imgi_6_67d859dc99e90e39404a5c09_glassii-web-02.avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
  src="glass-ii.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">Integrated lighting systems filled the exhibition
  with an immersive field of caustics</div></div></div></section><section data-wf--section-1--variant="xl-top-padding"
  class="section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div
  class="h-x-large">Two dark-mirrored surfaces create the illusion of an infinite array of ‘light totems’ fading into
  darkness… a starry night of ‘cosmic caustics.’</div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Project</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Each column’s unique and constantly changing
  surface is the result of continuous branching into multiple lobes to support its load: for each, a unique network of
  radial arrays made of arcs; to each, a unique caustic footprint corresponding with its mechanical
  properties.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Given their geometric
  complexity and dynamic optical properties, the columns act as architecturally scaled lenses that can concentrate or
  disperse light from within and/or outside the glass surface.</p></div></div></div></div></section><section
  data-wf--img-section--variant="xl-top-padding" class="full-media-section
