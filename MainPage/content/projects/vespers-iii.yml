  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Hybrid living
  masks</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p><strong>Research
  team:</strong> Christoph Bader, Rachel Soo Hoo Smith, Dominik Kolb, Sunanda Sharma, João Costa, James C. Weaver. Prof.
  Neri Oxman</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p><strong>Year</strong>:
  2018</p><p><strong>Location</strong>: Design Museum, 2016, London, United Kingdom. National Gallery of Victoria, 2018,
  Melbourne, Australia</p><p><strong>Platform</strong>: <a
  href="https://oxman.com/projects/hybrid-living-material">Hybrid Living Materials</a> &amp; <a
  href="https://oxman.com/projects/data-driven-material-modeling">Data Driven Material
  Modeling</a></p></div></div></div></div></section><section data-wf--section-1--variant="s-top-padding"
  class="section"><div class="container"><div class="d"><div class="h-x-large">What remains once life has been lived?
  Can the death mask drive the formation of new life?</div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Position</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The masks in Vespers III are habitats for
  microorganisms and sites for the creation of new life. The third series revolves around death and rebirth, denoting
  both spiritual incarnation and biological recapitulation.</p></div></div><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>Devoid of cultural expressions and initially nearly colorless, these masks are
  paradoxically the most ‘alive’ of the three series. They literally ‘re-engineer’ life by guiding living microorganisms
  using spatial features from the artifacts of the dead. The microorganisms&#x27; protein expressions are distributed
  according to the spatial logic provided by the second series.</p></div></div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Process</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>To create the Vespers III masks, novel tools
  and techniques were developed that enable tight integration between, and control of, designed and biologically derived
  properties. Through this process, we have demonstrated a platform to create an entirely new class of materials, termed
  Hybrid Living Materials.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Computational
  design is integrated with additive manufacturing and synthetic biology to digitally fabricate objects that direct
  living microorganisms to produce pigments that emulate the colors of the first series of the
  collection.</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding"
  class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
