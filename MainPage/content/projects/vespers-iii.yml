  is-data">37</div></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium"></h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>We
  leverage 3D printable bioactive materials to spatially template the biological response of living microorganisms.
  Thus, computational and digital fabrication tools are customized to direct the growth and expression of microorganisms
  contained within the mask.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Our research
  enables the computational design and digital fabrication of consumer products and freestanding structural materials.
  From customized cosmeceutical and antibiotic production in wearable devices, to smart packaging and surface coatings
  that can detect contamination, to environmentally responsive architectural skins, this research offers a new space for
  biological augmentation across a wide breadth of application domains, by leveraging both resolution and
  scale.</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding" class="section
  w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
