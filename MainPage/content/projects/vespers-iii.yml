  class="source"/></video></div></div></div><div class="h-x-small">Vespers III Mask 02 after incubation. Photo: Yoram
  Reshef</div></div></div></section><section data-wf--section-1--variant="xl-top-padding" class="section
  w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div class="h-x-large">The masks
  transition from vessels representative of neuro-vasculature to actual biological urns marking a new cycle of
  life.</div></div></div></section><header data-wf--hero-section-project--variant="black-on-white" class="section
  is-hero"><div class="container is-hero-60"><div class="d"><div class="d100"><div class="display-eyebrow-div"><div
  class="eyebrow-txt">Project<br/></div></div><h1 class="display-h">Vespers III</h1></div></div></div></header><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium"></h2></div></div><div class="d"><div
  class="d is-tab-half"><div class="txt-small w-richtext"><p>These masks—now living things unto themselves—feature
  patterns generated by genetic regulatory signals distributed according to the spatial logic provided by the second
  series. The microorganisms and their byproducts, which animate the mask with properties greater than the sum of its
  parts, reinterpret the color palette of the first series and thereby biologically recreate their cultural
  precursors.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Transitioning from vessels
  of representative neuro-vasculature to actual biological urns, the masks in this series mark a new cycle of life and
  the notion of continuation. The martyr’s faces are no longer preserved but have transformed into sites of and for new
  life.</p></div></div></div></div></section><section data-wf--masonry-section--variant="s-top-padding"
