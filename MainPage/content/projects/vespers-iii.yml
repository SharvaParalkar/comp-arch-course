  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Policy</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>The project points towards an imminent future where wearable interfaces and building skins are
  customized not only to fit a particular shape, but also a specific material, chemical and even genetic make-up,
  tailoring the wearable to both the body and the environment which it inhabits.</p><p>‍</p><p>Research at the core of
  this project offers a new design space for biological augmentation across a wide breadth of application domains,
  leveraging resolution and scale.</p><p>‍</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>Imagine, for example, a wearable interface designed to guide ad-hoc antibiotic formation customized to
  fit the genetic makeup of its user; or, consider smart packaging or surface coatings devices that can detect
  contamination; finally, consider environmentally responsive architectural skins that can respond to, and adapt—in real
  time—to environmental cues.</p></div></div></div></div></section><section data-wf--section-1--variant="xl-top-padding"
  class="section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div
  class="h-x-large">A future is imminent where wearable interfaces and building skins are customized to chemical and
  genetic make-up, tailored to the body and environment.</div></div></div></section><section
  data-wf--video-section--variant="xl-top-padding" class="full-media-section
