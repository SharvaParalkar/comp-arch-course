  class="h-x-small">Closeup of Vespers III mask 04</div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Project</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Vespers is a collection of masks exploring
  what it means to design (with) life. Vespers III features a living mask as an enabling technology. Combined, the three
  series of the Vespers collection represent the transition from death to life, or from life to death, depending on
  one’s reading of the collection.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The
  living masks embody habitats that guide, inform and ‘template’ gene expression of living microorganisms. Such
  microorganisms have been synthetically engineered to produce pigments and/or otherwise useful chemical substances for
  human augmentation such as vitamins, antibodies or antimicrobial drugs.</p></div></div></div></div></section><section
  data-wf--cards-section--variant="xl-top-padding" class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div
  class="container is-slot"><div data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><img
