  dome</div></div><div data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><img alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69726205a0a1d5cffcf7099f_imgi_4_67bdac4d68bd93178365f61e_silk-web-02%20(1).avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
  src="silk-pavillion-i.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">Biologically-spun silk over robotically-spun
  silk</div></div></div></section><section data-wf--section-1--variant="xl-top-padding" class="section
  w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div
  class="h-x-large">Traditionally, silk is harvested by boiling the larvae alive in their cocoons to extract silk
  thread. In stark contrast, this process allows the silkworms to live and metamorphosize in relative
  peace.</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>The base structure of the pavilion was created of 26 polygonal panels made of silk threads laid down by
  a Computer-Numerically Controlled (CNC) machine. Once established, a swarm of 6,500 silkworms was positioned at the
  bottom rim of the scaffold, where they began their work, spinning flat non-woven silk patches, locally reinforcing the
  gaps across the CNC-deposited silk fibers.</p><p>The geometry of the pavilion was created using an algorithm that
  places a single continuous thread across patches providing various degrees of density. The overall density variation
  of the silk sheets was informed by the silkworm itself, deployed as a biological “printer” in the creation of this
  secondary structure.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Due to their
  sensitivity to environmental conditions —geometrical density as well as variation in natural light and heat—the
  silkworms were found to migrate to darker and denser areas. With this in mind, we were able to calibrate variations in
  the thickness of the silk sheets to desired specifications.</p><p>A sun-path diagram—registering the location of the
  sun at any point of time during the duration of the installation—was used to determine the placement of apertures on
  the panels to modulate the distribution of light and heat on the surface, thus influencing the position of silkworms
  and the density of their silk across the structure.</p></div></div></div></div></section><section
