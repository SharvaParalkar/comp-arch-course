  data-wf--section-1--variant="xl-top-padding" class="section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div
  class="container"><div class="d"><div class="h-x-large">What are sustainable and humane methods for harvesting,
  spinning and weaving silk-based products and structures? How can humans collaborate with other species to create new
  materials and structures without depleting natural resources?</div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Silkworm-spun
  pavilion</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p><strong>Research team:</strong> Markus Kayser, Jared Laucks, Jorge Duro-Royo, Carlos David Gonzalez
  Uribe, Prof. Neri Oxman</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p><strong>Year:</strong> 2013</p><p><strong>Location:</strong> Media Lab. 2013. Cambridge,
  MA<br/></p><p><strong>Platform</strong>: <a
  href="https://oxman.com/projects/co-fabrication-systems">Co-fabrication</a>‍</p></div></div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Position</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The Silk Pavilion, a precursor to Silk
  Pavilion II, explores relationships between digital and biological construction, proposing methods that unite the
  biologically spun and the robotically woven. Inspired by the silkworm’s ability to generate a three-dimensional cocoon
  out of a single silk thread, Silk Pavilion I was developed in 2013 and took form as a three-meter wide dome,
  constructed over three weeks with a flock of 6,500 live silkworms assisted by a robotic arm. Each silkworm spun a
  single silk thread filament that is about 1km long. Combined, the silkworms produced a dome-shaped thread as long as
  the Silk Road.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>By studying how the
  silkworm’s spinning behavior is informed by spatial and environmental conditions, we were able to guide the silkworm’s
  movement to spin two-dimensional sheets rather than three-dimensional
  cocoons.</p></div></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Project</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>According to the United Nations Environmental Program (UNEP), over 300 million tons of plastic are
  produced globally each year, leaving harmful imprints on the environment. Less than 10% of this material is recycled,
  while the rest becomes waste, dumped into landfills and oceans; all the while, plastic-based materials utilize raw
  ingredients that are extracted from the earth faster than they can be replenished, and are processed through
  environmentally destructive means. There is another way. Organic structures embody more efficient and adaptable
  material properties compared with human-made ones, and leave no environmental marks. From a limited palette of
  molecular components, including cellulose, chitin, and pectin―the very same materials found in trees, crustaceans and
  apple skins―natural systems construct an extensive array of functional materials with no synthetic
  parallels.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Chitin, for instance,
  manifests in the form of thin, transparent dragonfly wings, as well as in the soft tissue of fungi. Cellulose makes up
  more than half of plant matter planet-wide. These materials, and the living systems they inhabit, outperform human
  engineering not only through their diversity of functions but also through their resilience, sustainability, and
  adaptability. The Aguahoja collection (pronounced: agua-hocha) offers a material alternative to plastic subverting the
  toxic waste cycle through the creation of biopolymer composites that exhibit tunable properties with varied
  mechanical, optical, olfactory and even gustatory properties. These renewable and biocompatible polymers leverage the
  power of natural resource cycles and can be materially ‘programed’ to decay as they return to the earth, for purposes
  of fueling new growth.</p></div></div></div></div></section><section data-wf--cards-section--variant="s-top-padding"
  class="section"><div class="container is-slot"><div data-wf--card--variant="33-minimum" class="d is-card"><div
