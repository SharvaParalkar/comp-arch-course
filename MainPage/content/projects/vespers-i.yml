  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69739551d7e1acd98b7135b7_imgi_4_67d84d7e6f8e48c42651d9de_vespersi-diagram-1-2-materials-gray.avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
