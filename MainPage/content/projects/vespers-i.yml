  src="vespers-i.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">Mask 02 Vepsers uses 5 color combinations found in
  religious practices across regions and eras. Photo: Yoram Reshef</div></div><div data-wf--card--variant="33-minimum"
  class="d is-card"><div class="card-img-frame"><img alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697395511c2637dbd645e9e6_imgi_9_67d84facaa9853c02db844a0_vespersi-web-07.avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
  src="vespers-i.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">Mask 01 Embedded with natural minerals, such as
  bismuth, silver, and gold. Photo: Yoram Reshef</div></div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Project</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The most iconic death masks—like those of
  Agamemnon and King Tutankhamun—were made entirely of, or inlaid with, precious stones and minerals. The use of color
  often expressed the cultural attributes of the deceased associated with their spiritual powers, or religious
  affiliation.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The first series explores
  life through the lens of death. Inspired by ancient masks, it uses five color combinations commonly found in religious
  practices across regions and eras, and is embedded with natural minerals, such as bismuth, silver, and
  gold.</p></div></div></div></div></section><section data-wf--img-section--variant="xl-top-padding"
  class="full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69739551ca71b0f39dbd5812_imgi_10_67d84fed87a3514f02972d0b_vespersi-web-04.avif"
  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">Mask 03 An algorithm
  emulated cellular subdivision, like the formation of life itself. Photo: Yoram Reshef</div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
