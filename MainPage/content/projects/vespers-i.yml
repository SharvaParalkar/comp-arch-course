seo:
  description: >-
    Vespers I is a series of death masks produced using an innovative data-driven material modeling approach, combined
    with high-resolution bitmap 3D printing.
  og_title: Vespers I | OXMAN
  og_description: >-
    Vespers I is a series of death masks produced using an innovative data-driven material modeling approach, combined
    with high-resolution bitmap 3D printing.
