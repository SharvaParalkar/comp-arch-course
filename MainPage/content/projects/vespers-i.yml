main_html: >-
  <div><header data-wf--hero-section-project--variant="black-on-white" class="section is-hero"><div class="container
  is-hero-60"><div class="d"><div class="d100"><div class="display-eyebrow-div"><div
  class="eyebrow-txt">Project<br/></div></div><h1 class="display-h">Vespers I</h1></div></div></div></header><section
  data-wf--img-section--variant="no-top-padding" class="full-media-section"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6973925c792aaa925e03677a_imgi_17_67d4b29c238d82d4ce20e953_vespersi-web-1as1.avif"
  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">3D printed death masks,
  series 1</div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Hybrid living mask prototypes</h2></div></div><div class="d"><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p><strong>Research team:</strong> Christoph Bader, Dominik Kolb, James C. Weaver. Prof.
  Neri Oxman.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p><strong>Year</strong>:
  2016</p><p><strong>Location</strong>: Design Museum, 2016, London, United Kingdom</p><p><strong>Platform</strong>: <a
  href="https://oxman.com/projects/data-driven-material-modeling">Data Driven Material
  Modeling</a></p></div></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding"
  class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Position</h2></div></div><div class="d"><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>Vespers is a collection of masks exploring what it means to design (with) life. From
  the relic of the death mask to the death mask as a contemporary living device, the collection embarks on a journey
  that begins with an ancient typology and culminates with a novel technology for the design and digital fabrication of
  adaptive and responsive interfaces.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p><a
  href="https://oxman.com/projects/vespers-i">Vespers I</a> features the death mask as a cultural artifact; <a
  href="https://oxman.com/projects/vespers-ii">Vespers III</a> features a living mask as an enabling technology; <a
  href="https://oxman.com/projects/vespers-ii">Vespers II</a> mediates between the two, marking the process of
  ‘metamorphosis’ between the ancient relic and its contemporaneous manifestation. Thus, we begin with a conceptual
  piece and end with a tangible set of tools, techniques and technologies combining programmable matter and programmable
  life.</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding" class="section
  w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
