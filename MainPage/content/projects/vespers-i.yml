  materials</div></div><div data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><img
  alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69739551bdaa5b6b82e7eb5f_imgi_5_67d84d9623ae827f313d9277_vespersi-diagram-3-4-materials-gray.avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
  src="vespers-i.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">Vespers variations with three and four
  materials</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>The masks’ colors are correlated with underlying geometries, which are, in combination, driven by a
  parametric grammar. In this series, polyhedral meshes are ‘evolved’ into subdivided surfaces using an algorithm,
  which—like the formation of life itself—emulates cellular subdivision.</p></div></div><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>Using a minimal set of rules, the series generates a plethora of color/shape schemes.
  The implementation of the Stratasys full color multi-material 3D printing technology enables the creation of
  objects—for the first time in the history of additive manufacturing—that match the variety and nuance of ancient
  crafts.</p></div></div></div></div></section><section data-wf--stat-section--variant="xl-top-padding" class="section
  w-variant-41dda5da-37cf-7651-637f-35312d595621"><div class="container"><div class="d"><div class="vert-div"><div
  class="display-eyebrow-div"><div class="h-x-small">Smallest printed feature size in micrometers</div></div><div
  class="display-h is-data">16</div></div></div></div></section><section data-wf--stat-section--variant="xl-top-padding"
