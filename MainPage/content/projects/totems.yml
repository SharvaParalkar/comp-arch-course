main_html: "<div><header data-wf--hero-section-project--variant=\"black-on-white\" class=\"section is-hero\"><div class=\"container is-hero-60\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><div class=\"eyebrow-txt\">Project<br/></div></div><h1 class=\"display-h\">Totems</h1></div></div></div></header><section data-wf--video-player-section--variant=\"no-top-padding\" class=\"full-media-section\"><div class=\"video-aspect-box\"><button data-w-id=\"b4c9e4c5-2cea-d36c-b0e8-28a78bfe27f5\" class=\"player-thumbnail-button\"><div class=\"play-div\"><div class=\"cursor-play is-mobile\"><div class=\"arrow-icon w-embed\"><svg width=\"100%\" height=\"100%\" viewBox=\"0 0 11 15\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n<path d=\"M1 12.7422V1.74219L10 6.98028L1 12.7422Z\" stroke=\"white\" stroke-width=\".5\"/>\n</svg></div></div></div><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697384d66f5007e0a287dc82_imgi_19_67d49dfd98372692ae708d1a_totems-web-00-p-1080.jpg\" loading=\"lazy\" data-w-id=\"dca2cf2a-a7fc-317a-e838-13e604164f8a\" alt=\"\" sizes=\"(max-width: 479px) 97vw, (max-width: 767px) 98vw, (max-width: 1938px) 99vw, 1919px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697384d66f5007e0a287dc82_imgi_19_67d49dfd98372692ae708d1a_totems-web-00-p-1080-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697384d66f5007e0a287dc82_imgi_19_67d49dfd98372692ae708d1a_totems-web-00-p-1080-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697384d66f5007e0a287dc82_imgi_19_67d49dfd98372692ae708d1a_totems-web-00-p-1080.jpg 1080w\" class=\"player-thumbnail\"/></button><iframe src=\"https://player.vimeo.com/video/327838154?title=0&amp;amp;byline=0&amp;amp;portrait=0&amp;amp;badge=0&amp;amp;autopause=0&amp;amp;player_id=0&amp;amp;app_id=58479\" frameborder=\"0\" webkitallowfullscreen=\" \" mozallowfullscreen=\" \" allowfullscreen=\" \" data-vimeoplayer-iframe=\" \" allow=\"autoplay\" aria-label=\"Vimeo Video\" data-ready=\"true\" class=\"video-element\"></iframe></div><div class=\"caption-div\"><div class=\"h-x-small\">TOTEMS video</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Melanin-infused columns</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Research team:</strong> Sunanda Sharma, Christoph Bader, Rachel Soo Hoo Smith, Felix Kraemer, João Costa, Joseph H. Kennedy Jr, Nitzan Zilberman (curation). Undergraduate researchers: Joseph Faraguna, Sangita Vasikaran, Sara Laura Wilson. Prof. Neri Oxman.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Year</strong>: 2019</p><p><strong>Location</strong>: MoMA. 2020. New York, NY</p><p><strong>Platform</strong>: <a href=\"https://oxman.com/projects/hybrid-living-material\">Hybrid Living Materials</a> &amp; <a href=\"https://oxman.com/projects/data-driven-material-modeling\">Data Driven Material Modeling</a></p></div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">This project addresses and speculates upon designers’ ability to chemically synthesize the ‘pigment of life’—as a functional material—and program its interaction across scales and species for the betterment of biodiversity.</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Position</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Biodiversity on planet Earth is under momentous threat, with extinction rates estimated at between 100 and 1,000 times their pre-human levels. The Mediated Matter Group has been in search of materials and chemical substances that can sustain and enhance biodiversity across living systems and have so far endured the perils of climate change.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Melanin—a naturally occurring chemical chain that gives all living things their pigmentation—is one such substance that can sustain and enhance biodiversity at the genetic, species and ecosystem levels.</p></div></div></div></div></section><section data-wf--stat-section--variant=\"xl-top-padding\" class=\"section w-variant-41dda5da-37cf-7651-637f-35312d595621\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">Melanin&#x27;s Age in Millions of Years</div></div><div class=\"display-h is-data\">307</div></div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>A biomarker of evolution, melanin is the color of life. The substance that defines the color of skin, hair and eyes is at once ancient and modern: melanin is found in fossils dating from the Mesozoic Era, and today can be chemically synthesized with modern techniques. It is one of the most resistant, heterogeneous, and pervasive pigments found across the kingdoms of life. In addition to its critical role in providing protection from ultraviolet radiation, it serves a wide variety of functions: mechanical protection, energy harvesting, cell growth, metal binding, thermal regulation, and protection from oxidative stress.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>An identifying feature of all living organisms, melanin represents unity in the diversity of life on earth and is clearly linked to biological survival throughout the ages. Its value for human health and culture across regions and environments is priceless. Today, it is considered by some to be more valuable than gold, and its impact—in the age of climate change—is key to human survival on Earth.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddafbca67a84260e2f_imgi_2_67d49fc7ff773f00ece0a803_totems-04.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddafbca67a84260e2f_imgi_2_67d49fc7ff773f00ece0a803_totems-04-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddafbca67a84260e2f_imgi_2_67d49fc7ff773f00ece0a803_totems-04-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddafbca67a84260e2f_imgi_2_67d49fc7ff773f00ece0a803_totems-04.jpg 989w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Melanin infused 3D printed prototype</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd6ee1d2d150d9cbf7_imgi_3_67d49fec28f61f28bed8ec27_totems-05.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd6ee1d2d150d9cbf7_imgi_3_67d49fec28f61f28bed8ec27_totems-05-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd6ee1d2d150d9cbf7_imgi_3_67d49fec28f61f28bed8ec27_totems-05-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd6ee1d2d150d9cbf7_imgi_3_67d49fec28f61f28bed8ec27_totems-05.jpg 989w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Microbial melanin synthesis</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Process</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Melanin can be synthesized through a reaction between an enzyme from a mushroom, called tyrosinase, and the protein building block L-tyrosine. The pigment can be extracted from bird feathers and cuttlefish ink amongst other sources, then purified and filtered in a series of steps.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The genes for melanin production can also be engineered into bacterial species, such as Escherichia coli, and thereby controlled over space and time in response to changes in the environment. For instance, its coloration could deepen as the sun reaches its peak, providing protection from solar radiation.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/archive/projects/totems/totems_materiatunability_720p.m4v\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Totems Material Tunability 720p Frame Material-based induction and tunability of melanin synthesis</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/archive/projects/totems/totems_chemicaltunability_720p.m4v\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Chemistry-based induction and tunability of melanin synthesis</div></div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/archive/projects/totems/totems_reactiondiffusionadvection_720p.m4v\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Tunability of advection diffusion of melanin</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/archive/projects/totems/totems_advectiontunability_720p.m4v\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Chemistry-based induction and tunability of melanin synthesis</div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/archive/projects/totems/totems_melanogenesis_1080p.m4v\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">\_Totems Melanogenesis 720p Frame Modeled chemical synthesis of melanin</div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/archive/projects/totems/totems_templatedmelaninsynthesis_1080p.m4v\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">Templated melanin synthesis reaction in dynamic 3D printed vessels</div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">The technical goal is to explain, predict and demonstrate how melanin can be generated on-demand for the purpose of biological and environmental augmentation.</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Platform</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Over the past year we developed methods for the design of structures that can contain biological substances across scales (from micro to macro) and phases (solids and liquids). As part of the basic research behind <em>Totems</em>, we created a series of spherical objects featuring a single connected channel filled with liquid melanin. These spheres display a wide range of colors and absorption spectra, from light yellow to dark brown.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The channels within these spheres have been computationally ‘grown,’ 3D printed and biologically augmented to create pockets for the liquid melanin to reside, with channel diameters ranging from millimeters to centimeters.</p></div></div></div></div></section><section data-wf--img-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3f0dad6762faa35b_imgi_4_67d4a17a605dc9d7cc8ccfed_totem-08-gray3.jpg\" loading=\"lazy\" alt=\"\" sizes=\"100vw\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3f0dad6762faa35b_imgi_4_67d4a17a605dc9d7cc8ccfed_totem-08-gray3-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3f0dad6762faa35b_imgi_4_67d4a17a605dc9d7cc8ccfed_totem-08-gray3-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3f0dad6762faa35b_imgi_4_67d4a17a605dc9d7cc8ccfed_totem-08-gray3-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3f0dad6762faa35b_imgi_4_67d4a17a605dc9d7cc8ccfed_totem-08-gray3-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3f0dad6762faa35b_imgi_4_67d4a17a605dc9d7cc8ccfed_totem-08-gray3-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3f0dad6762faa35b_imgi_4_67d4a17a605dc9d7cc8ccfed_totem-08-gray3.jpg 2352w\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">Channels of melanin extracted from six terrestrial species</div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dda56b06364fe7cdba_imgi_5_67d4a2bb61a07e2516893653_totems-mm-07-gray3.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dda56b06364fe7cdba_imgi_5_67d4a2bb61a07e2516893653_totems-mm-07-gray3-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dda56b06364fe7cdba_imgi_5_67d4a2bb61a07e2516893653_totems-mm-07-gray3-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dda56b06364fe7cdba_imgi_5_67d4a2bb61a07e2516893653_totems-mm-07-gray3.jpg 989w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Liquid eumelanin (dark) infusion into computationally grown and 3D printed channels</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd31c52948883a55bd_imgi_6_67d4a2e37e1e76391b9940d2_totems-mm-06-gray3.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd31c52948883a55bd_imgi_6_67d4a2e37e1e76391b9940d2_totems-mm-06-gray3-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd31c52948883a55bd_imgi_6_67d4a2e37e1e76391b9940d2_totems-mm-06-gray3-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd31c52948883a55bd_imgi_6_67d4a2e37e1e76391b9940d2_totems-mm-06-gray3.jpg 989w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Liquid pheomelanin (light) infusion into computationally grown and 3D printed channels</div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">These melanin-infused columns contain age-old organisms activating them as ‘windows’ designed to provide protection from, connection to, and transformation of sunlight.</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The installation designed for the exhibition, <em>Broken Nature: Design Takes on Human Survival</em> as part of the XXII Triennale di Milano exhibition (2019), features a column-based demonstration of melanin production on an architectural scale for deployment in specific environmental contexts. It is comprised of a <em>totem</em>—a spirit being, sacred object, or symbol that serves as an emblem of the Tree of Life.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The research at the core of this work fuses digital fabrication, design computation and chemical reaction dynamics, resulting in a ‘chemical totem’ that illustrates how the process for melanin formation can be embodied inside a product.</p><p>Within each structure, ‘a biological totem’ is initiated with the introduction of tyrosinase, an enzyme that is light-sensitive, leading to color formation that continues over the span of a day, deepening as the sun reaches its zenith and easing into lighter hues as the sun sets.</p></div></div></div></div></section><section data-wf--img-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dde092a310ec8af45c_imgi_7_67d4a3a6432050339db2f37f_in2444-018-cccr.jpg\" loading=\"lazy\" alt=\"\" sizes=\"100vw\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dde092a310ec8af45c_imgi_7_67d4a3a6432050339db2f37f_in2444-018-cccr-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dde092a310ec8af45c_imgi_7_67d4a3a6432050339db2f37f_in2444-018-cccr-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dde092a310ec8af45c_imgi_7_67d4a3a6432050339db2f37f_in2444-018-cccr-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dde092a310ec8af45c_imgi_7_67d4a3a6432050339db2f37f_in2444-018-cccr.jpg 1299w\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">Liquid pheomelanin (light) infusion into computationally grown and 3-D printed channels. Photo: Denis Doorly. Courtesy of the Museum of Modern Art, New York</div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddb6d892f17a2acc83_imgi_8_67d4a4149ae249b5342e9f5c_totems-06.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddb6d892f17a2acc83_imgi_8_67d4a4149ae249b5342e9f5c_totems-06-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddb6d892f17a2acc83_imgi_8_67d4a4149ae249b5342e9f5c_totems-06.jpg 649w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Channels and spatial pockets for melanin infusion range from mm to cm scale</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd350524085217f3fa_imgi_9_67d4a44868f485f85fc21b06_totems-07.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd350524085217f3fa_imgi_9_67d4a44868f485f85fc21b06_totems-07-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd350524085217f3fa_imgi_9_67d4a44868f485f85fc21b06_totems-07.jpg 649w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Active proteins are included for light sensitive dynamic pigmentation</div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">A first-of-its-kind biologically augmented façade, the structure is designed to protect endangered species on site and to enhance the diversity of life on our planet.</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>In parallel, we have developed an architectural proposal for an environmentally responsive, melanin-infused glass structure.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>It is designed to contain multiple types of melanin, naturally obtained on site and biologically synthesized at the Lab. It provides UV protection during the day while enabling stargazing at sunset.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd70c473278e043457_imgi_10_67d4a4c028f61f28bedd3aeb_totems-topographic-study.jpg\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Topographical studies for placement of Totems</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd31c52948883a55cd_imgi_11_67d4a4e1ace971145323ee3c_totems-architectural-pavilion.jpg\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Proposal for an architectural pavilion</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dda05ebd9662e90db1_imgi_12_67d4a4fea6d9dae6ce894b49_totems-mandela-study.jpg\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Chemical, geometric, thermal, material components</div></div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dda5235758e7551acc_imgi_13_67d4a52c502077815e3d759c_totems-08.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dda5235758e7551acc_imgi_13_67d4a52c502077815e3d759c_totems-08-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dda5235758e7551acc_imgi_13_67d4a52c502077815e3d759c_totems-08.jpg 649w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Architectural proposal for an environmentally responsive melanin-infused structure. Image: Luxigon</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd08846756d8a19816_imgi_14_67d4a54aa8952d765f3aebc8_totems-web-09.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd08846756d8a19816_imgi_14_67d4a54aa8952d765f3aebc8_totems-web-09-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd08846756d8a19816_imgi_14_67d4a54aa8952d765f3aebc8_totems-web-09.jpg 649w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Architectural proposal for an environmentally responsive melanin-infused structure. Image: Luxigon</div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">What are the biological and cultural implications of these new capabilities?</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Policy</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The installation investigates the long and crucial intersection between culture and nature by questioning the dichotomy between the societal and biological roles associated with designers’ abilities to engineer melanin’s expressions within and across species. Through this investigation, we question our ongoing relationship with biology and natural history.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The architectural proposal is part of a long-term project initiated by Ravi Naidoo of Interactive Africa and was first introduced by Neri Oxman and The Mediated Matter Group at Design Indaba, 2018.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddb08ad293767c2190_imgi_15_67d4a5d728f61f28bede10bb_totems-02.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddb08ad293767c2190_imgi_15_67d4a5d728f61f28bede10bb_totems-02-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddb08ad293767c2190_imgi_15_67d4a5d728f61f28bede10bb_totems-02.jpg 649w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Color range indicates property combinations such as absorption spectra</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Extracted melanin vial display</div></div></div></section><section data-wf--img-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3288927d4a307734_imgi_17_67d4a62490d45621f02dc9bb_025-architecturalproposal.jpg\" loading=\"lazy\" alt=\"\" sizes=\"100vw\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3288927d4a307734_imgi_17_67d4a62490d45621f02dc9bb_025-architecturalproposal-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3288927d4a307734_imgi_17_67d4a62490d45621f02dc9bb_025-architecturalproposal-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3288927d4a307734_imgi_17_67d4a62490d45621f02dc9bb_025-architecturalproposal-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388dd3288927d4a307734_imgi_17_67d4a62490d45621f02dc9bb_025-architecturalproposal.jpg 1299w\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">Architectural proposal for an environmentally responsive melanin-infused structure. Image: Luxigon. Credits</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Credits</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Collaborators &amp; Contributors:</strong> Natalia Casa, Eric de Broche des Combes (Luxigon), Kelly Egorova, Osvaldo Golijov, Gianluca di Ioia, Dechuan Meng, Hans Martin Pech; Prof. Christopher Voigt; Susan Williams; Stratasys, Ltd; Front Inc; Bodino; MIT Media Lab</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Acknowledgments:</strong> NOE, LLC.; Design Indaba; The Robert Wood Johnson Foundation; Estée Lauder; GETTYLAB; The XXII Triennale di Milano; MIT Media Lab</p><p>Designed for Broken Nature: Design Takes On Human Survival, XXII Triennale di Milano, 2019, organized by Paola Antonelli 3D printed by Stratasys Ltd.</p><p>All images and videos courtesy Neri Oxman and The Mediated Matter Group, unless indicated otherwise</p></div></div></div></div></section><footer class=\"next-project-section\"><div class=\"section is-next-project-heading\"><div class=\"container\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><h2 class=\"eyebrow-txt\">Next Project<br/></h2></div><div class=\"display-h\">VESPERS III</div></div></div></div></div><a data-w-id=\"e1127ab3-d257-ec54-b547-677dcc014cb2\" href=\"vespers-iii.html\" class=\"next-project-link w-inline-block\"><div class=\"cursor-arrow is-mobile\"><div class=\"arrow-icon w-embed\"><svg width=\"100%\" height=\"100%\" viewBox=\"0 0 48 48\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n<path d=\"M4.70703 1L46.707 1L46.707 43\" stroke=\"white\" stroke-width=\"2\"/>\n<path d=\"M0.707031 47.2498L46.707 1.24977\" stroke=\"white\" stroke-width=\"2\"/>\n</svg></div></div><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddcfde2674b750804d_imgi_25_67d4a677fa4575aabe2f73de_vespersiii-web-17-p-1080.jpg\" loading=\"lazy\" alt=\"VESPERS III\" sizes=\"(max-width: 3038px) 100vw, 3038px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddcfde2674b750804d_imgi_25_67d4a677fa4575aabe2f73de_vespersiii-web-17-p-1080-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddcfde2674b750804d_imgi_25_67d4a677fa4575aabe2f73de_vespersiii-web-17-p-1080-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697388ddcfde2674b750804d_imgi_25_67d4a677fa4575aabe2f73de_vespersiii-web-17-p-1080.jpg 1080w\" class=\"abs-img\"/><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"totems.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></a></footer></div>"
