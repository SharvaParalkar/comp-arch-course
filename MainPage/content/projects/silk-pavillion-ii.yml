  w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div class="h-x-large">Is the
  [Silk] Lab more sustainable than the [Silk] Road?<br/></div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Policy</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Sericulture has been criticized by animal
  welfare and animal rights activists due to the fact that the process of harvesting silk from the cocoon kills the
  larva. In the textile and silk industry today, silkworms are exterminated while in their cocoons, dissolving the
  adhesive that glues one strand of silk to the layers below. This process allows a single silk filament to be unrolled
  from the cocoon but disrupts the life cycle and development of the organism.</p></div></div><div class="d
  is-tab-half"><div class="txt-small w-richtext"><p>As the Silk Pavilion demonstrates, structures can influence
  silkworms to spin in sheets instead of cocoons, thereby producing the same quantity of silk without boiling cocoons.
  The project illustrates how these compact and unique insects can act not only as living looms but as co-designers
  collaborating with humans to design and construct architectural-scale structures embodying co-fabrication for
  cohabitation. While it is a well-known fact that even the harvesting of Eri or Ahimsa silk (processed without killing
  silkworms through hand-spinning) is problematic due to the domestication, breeding, and exploitation of animals; our
  hope is that the research underlying this work will inspire many to question 7,000 years of sericulture policy at
  large.</p></div></div></div></div></section><section data-wf--img-section--variant="s-top-padding"
