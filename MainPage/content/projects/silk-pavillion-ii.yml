  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">Silk II at
  MoMA</div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Product</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>The Pavilion is made of three interrelated layers. Its innermost primary structure is comprised of
  one-dimensional, braided steel-wire ropes. Its secondary structure is a two-dimensional fabric on which silkworms are
  positioned.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The tertiary,
  three-dimensional structure is biologically spun with the output of 17,532 silkworms sourced from Teolo, Italy, one of
  the most extensive silkworm-rearing facilities in Europe. In this region of Veneto, the tradition of sericulture and
  silk manufacturing blossomed during the 12th century Renaissance.</p></div></div></div></div></section><section
  data-wf--cards-section--variant="s-top-padding" class="section"><div class="container is-slot"><div
