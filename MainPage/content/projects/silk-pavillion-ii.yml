  w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div class="h-x-large">How can
  we extract silk without boiling cocoons? What are the implications for sericulture, manufacturing and bio-digital
  design?</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Position</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>What are radically sustainable methods for spinning, weaving, making and building in the age of the
  Anthropocene? How can humankind and members of other species such as silkworms collaborate in the construction of
  objects, products, and buildings? Can we extract silk without boiling cocoons?</p></div></div><div class="d
  is-tab-half"><div class="txt-small w-richtext"><p>Commissioned for the <a
  href="https://www.moma.org/calendar/exhibitions/5090" target="_blank"><em>Material Ecology</em></a> exhibition at the
  Museum of Modern Art, New York, Silk Pavilion II stands six meters tall and five meters wide. Building upon research
  developed for Silk Pavilion I, this successor project tackles challenges associated with scale and sericulture. The
  project utilizes an integrated kinetic mandrel designed to guide the natural spinning motion of the silkworms through
  clockwise rotation, fusing technology and biology to unite the woven and the
  spun.</p></div></div></div></div></section><section data-wf--img-section--variant="s-top-padding"
