  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Process</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The Pavilion was constructed in horizontal
  orientation, with mechanical top-down kinetic manipulation enabling constant clockwise rotation of the mandrel that
  facilitates the silkworms’ upward spinning motion. Fiber density across the surface area of the structure varies as a
  function of local environmental factors such as the direction, duration and intensity of heat and light, as well as
  the topology of the kinetic hyperboloid that is designed to guide the movement of the silkworms. These factors can
  affect the silkworms’ movement and spinning, and thereby the resulting thickness of the silk layer
  produced.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The Pavilion’s primary
  structure and the soluble knit scaffold are stretched with a cable system; given its physical properties, the
  intermediate knit yarn layer acts as support for the silkworms. The holes, which release some of the tensile stress in
  the structure, result from chemical reactions between the silkworms’ excretions and the underlying yarn. These
  structural forces are influenced biochemically, expressing a ‘metabolic footprint’ of the silkworms’ fluxes and
  flows.</p></div></div></div></div></section><section data-wf--video-section--variant="s-top-padding"
