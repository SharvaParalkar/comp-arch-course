  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69723d6bc33fb06c4db66d3d_imgi_10_67d842c03fa7f69df3293c87_220228-diagrams-spellchecked-03.avif"
  loading="lazy" alt="" class="full-img"/></div></section><section data-wf--img-section--variant="s-top-padding"
  class="full-media-section w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69723d6dc701218f8c271c5b_imgi_11_67d842c1753f64671224e0e3_220228-diagrams-spellchecked-04.avif"
  loading="lazy" alt="" class="full-img"/></div></section><section data-wf--section-1-2--variant="s-top-padding"
  class="section"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Product</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>In a series of urban studies, OXMAN proposes synergy between Manhattan’s cultural diversity and
  Mannahatta’s biotic livelihood: grid and garden. Informed by climate projections and inspired by urban habitats such
  as stone circles and megaliths, the series of models transitions from a human-centric biosphere to a distributed
  Nature-centric landscape, evolving harmony between the built and the grown. Across four centuries, Man-Nahāta—an
  imagined urban future—experiences emergence, growth, decay, and rebirth as a built-grown singularity. </p><p>In 2100,
  climate intensifies, conditioning a re-balancing of landscape and inhabitants. Four essential seeds—shelter,
  nutrients, energy, society—self-organize into a layered circular system. The emerging city is designed by and informed
  by its dynamic environment. Sunlight and airflow shape its morphology, the water line defines its boundaries, and the
  hilly landscape underlies its grid. </p><p>Through growth, the city produces enough resources by 2200 to be infinitely
  flexible, reconfiguring to meet the changing needs of its occupants. The working relationships between different life
  forms have taken an active turn and evolved into kinship.</p></div></div><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>These interconnections are expressed literally, in the form of an underground web of
  synthetic optical fibers and natural root systems. Plants play a major role in this era; through intelligent mediation
  of the environment, they allow the city to breathe. </p><p>As global temperatures and sea levels rise by 2300, the
  city undergoes time-based decomposition, its organic substances breaking down into megalithic architectural elements:
  carbon dioxide, water, sugars, and mineral salts. Economic, social, and environmental links are untied and the city as
  an idea begins to disassemble from its material structures. Communication and belief systems hold the decaying city
  together, physically manifest as mycorrhizal networks woven through the Earth. </p><p>In 2400, the urban cityscape of
  Manhattan persists as a memory captured in the hills and valleys of the landscape. The wetlands, salt marshes, and
  biodiversity of ancient Mannahatta are almost completely reborn in a new form, merging native history and urban
  history into one. The old city becomes a fossil, on top of which a new cycle of humanity is
  built.</p></div></div></div></div></section><section data-wf--cards-section--variant="s-top-padding"
