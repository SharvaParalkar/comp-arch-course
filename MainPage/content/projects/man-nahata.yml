  SCALES</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Position</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>Taking the long view of habitat loss and species extinction, OXMAN revisits Manhattan’s pre-1600s
  landscapes, when the Island was home to the Lenape people and known as Mannahatta (‘land of many hills’). Before the
  Dutch arrived, the center of Manhattan was once a diverse, natural landscape of hills, valleys, forests, fields,
  wetlands, salt marshes, and streams. Mannahatta had over 55 different ecological communities on a territory of 20
  square miles.</p><p>What is now a human-centered cultural hub was once a nature-centric econiche, home to mammals,
  birds, fish, plants, fungi, and bacteria. It supported more ecological communities per acre than Yellowstone, more
  native plant species per acre than Yosemite, and more birds than the great Smoky Mountains.</p></div></div><div
  class="d is-tab-half"><div class="txt-small w-richtext"><p>Today, Manhattan is a precarious habitat threatened by
  extreme forces of rapid climate change, with future projections reported by the 2021 Intergovernmental Panel on
  Climate Change (IPCC) including higher temperatures, increasingly frequent heavy downpours, and a rising sea level
  that will further increase storm surges and coastal flooding. If humanity is to survive and thrive, we must rethink
  our relationship with Nature.</p></div></div></div></div></section><section
  data-wf--stat-section--variant="xl-top-padding" class="section w-variant-41dda5da-37cf-7651-637f-35312d595621"><div
  class="container"><div class="d"><div class="vert-div"><div class="display-eyebrow-div"><div
  class="h-x-small">Ecological communities thriving in 1609 Mannahatta</div></div><div class="display-h
  is-data">55</div></div></div></div></section><section data-wf--img-section--variant="s-top-padding"
  class="full-media-section w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69723d6baffd6868d898b401_imgi_6_67d84239c5a449b22aecf9cb_cycles-diagram-megalopolis%20(1).avif"
  loading="lazy" alt="" class="full-img"/></div></section><section data-wf--img-section--variant="s-top-padding"
  class="full-media-section w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69723d6b6194422c8bfab94e_imgi_7_67d8423a0c1a4d0913733605_cycles-diagram-megalopolis.avif"
  loading="lazy" alt="" class="full-img"/></div></section><section data-wf--section-1--variant="xl-top-padding"
  class="section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div
  class="h-x-large">Instead of a linear timeline, we offer a circular one, where the past is re-embodied in the
  future.<br/></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>Computational growth across material and urban scales offers a framework for design through
  self-organization, enabling the generation of vast, diverse forms exhibiting characteristics like those that emerge
  through the biological growth processes found in Nature. In this project, we construct an oriented volume spanned by
  surface normals of the shape at every point. The value of the oriented volume drives the iterative deformation of the
  shape. Depending on the parameterization of this process, we can obtain distinctly different growing forms.
  Importantly, the emergence of these forms is driven only by the time evolution of a geometric operator acting on the
  shapes iteratively, thereby connecting geometry and growth through an algorithm.</p></div></div><div class="d
  is-tab-half"><div class="txt-small w-richtext"><p>To form the Man-Nahata landscape, the buildings of the urban
  landscape are transformed through repeated morphological closing operations, where the field of influence follows a
  gradient from the center to the outskirts of a circular region. Simulated erosion and soil deposition are applied to
  the modified cityscape according to site-specific environmental conditions. This results in a topography in which
  hills are the remains of skyscrapers and valleys follow the streets of the city
  grid.</p></div></div></div></div></section><section data-wf--stat-section--variant="xl-top-padding" class="section
  w-variant-41dda5da-37cf-7651-637f-35312d595621"><div class="container"><div class="d"><div class="vert-div"><div
  class="display-eyebrow-div"><div class="h-x-small">Species of plants and animals in Mannahatta</div></div><div
  class="display-h is-data">1,001</div></div></div></div></section><section data-wf--section-1--variant="s-top-padding"
  class="section"><div class="container"><div class="d"><div class="h-x-large">The emerging city is shaped by sunlight
  and airflow, a water line defines its boundaries, and a hilly landscape underlies its
  grid.</div></div></div></section><section data-wf--cards-section--variant="s-top-padding" class="section"><div
