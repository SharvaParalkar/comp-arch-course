main_html: "<div><header data-wf--hero-section-project--variant=\"black-on-white\" class=\"section is-hero\"><div class=\"container is-hero-60\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><div class=\"eyebrow-txt\">Project<br/></div></div><h1 class=\"display-h\">Alef</h1></div></div></div></header><section data-wf--video-section--variant=\"no-top-padding\" class=\"full-media-section\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_bioreactorgfp_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">Smells as co-cultures</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Signaling with, for, and by Nature</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Can smells encode signals of biodiversity and resilience? Can we simulate, revive, restore and rewild ancient ecosystems, while designing novel ones? On the molecular scale, we study chemical compounds and design compilers for expressing, augmenting, and connecting with Nature, unlocking a deeper level of symbiotic intimacy.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Research team: </strong>Sarabeth Buckley, Idan Frumin, Nadav Hendel, Nic Lee, Zane Lindstrom, Neri Oxman, Michael Sedbon, Marcus Walker, Leila Wallisser, Nitzan Zilberman</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_diagram_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">OXMAN WORK ACROSS SCALES</div></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b3c2ae484345491fe44e6_group-1212.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b3c2ae484345491fe44e6_group-1212.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">ALEF IN RELATION TO OTHER SCALES</div></button></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Can we simulate, revive, restore and rewild ancient ecosystems, while designing novel ones?</div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_capsule04zooom_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">capsule 04: restoration and monitoring of an ancient Oak-Tulip Tree Forest</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_capsule03zooom_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">capsule 03: synthetic biology tools for bVOC research</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>ALEF explores a wide breadth of ecological research at the molecular and ecosystem scales with the long-term goal of deepening our understanding of interspecies communication and overall ecosystem health.</p><p>The project is rooted in decoding the dynamic chemical signals released by plants, bacteria, and entire ecosystems to communicate with other organisms in their vicinity. Each signal comprises the emission of biogenic volatile organic compounds (bVOCs). The ‘molecular fingerprint’ of each organism is a unique composition of bVOCs at a given time, often carrying an associated smell.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Through two main pathways—the restoration and monitoring of an ancient ecosystem and the development of synthetic biology tools for bVOC research—we collect and recreate smells from real-world, simulated, and designed ecologies. This allows us to access a rich data set that provides valuable information about species composition and the state of various ecological systems.</p><p>Using a network of tools and technologies in both laboratory and forest environments, we generate insights into “Whole Ecologies,” with the potential to inform molecular design across domains, including horticulture and companion planting, agriculture, scent and flavor design, aromatherapy, and cosmeceuticals, prioritizing symbiotic polycultures over monocultures.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4bf0f9945873cd1eb8dd_biovoxel-topaz-sharpen-edit-2.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">BIOVOXEL IN THE LAB</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_biovoxel_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">\_BIOVOXEL IN NATURE</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Position</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The molecular design of scents, foods, and medicines often relies upon source ingredients produced by modern practices of continuous monocropping. Growing the same species in the same field, year after year, yields unstable ecologies vulnerable to soil degradation, water contamination, and rampant pests and disease. The negative impact on native plant life, soil fertility, and bacterial composition, combined with high water consumption and low genetic diversity, drives the loss of wilderness and a disconnect from ancient ecosystems.</p><p>Rather than producing and consuming monocultures, we pursue the study of ancient ecosystems—as well as the exploration of novel ones—that sustain diverse, internally regulated, and highly networked life-forms.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>In contrast to monocultures, polycultures reflect natural ecosystems, where multiple species occupy the same region and interact in mutually beneficial ways. A greater number of species coexisting in the same ecosystem leads to greater stability, increased energy cycling, and an improved capacity to withstand climate impacts; plant distribution patterns show less randomness due to the formation of specific symbiotic relationships.</p><p>Natural ecosystems are some of the world’s biggest carbon sinks, sequestering 16 billion metric tons of carbon dioxide annually (Harris et al. 2021)—roughly 40% of global CO₂ emissions. As an ecosystem’s carbon sequestration capacity is tightly linked to its biodiversity and overall health, restoring the functionality of degraded ecosystems, while protecting the well-being of their many inhabitants, may hold the key to tackling the climate crisis.</p></div></div></div></div></section><section data-wf--stat-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">ACRES OF LAND USED FOR MONO-CULTURE FARMING IN U.S</div></div><div class=\"display-h is-data\">440M</div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">A network of tools deployed in both lab and forest enables the study of ancient ecosystems as well as the creation of novel ones to advance the engineering of polycultures over monocultures.<br/></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4bf0f9945873cd1eb8dd_biovoxel-topaz-sharpen-edit-2.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_capsulebeacon_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Beacon in a controlled lab environment</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_thainbeacon_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">beacon in the wild</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Platform</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The ALEF platform is a combination of techniques, tools, and technologies for polyculture engineering of past and future ecologies. It offers a mechanistic approach to programming, analyzing, and functionalizing large-scale, complex growth and interactions at the ecosystem scale.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Aiming to cultivate a better understanding of what constitutes a healthy ecosystem, we deploy novel sensors in laboratory and field environments to help decode, contextualize, and harness the dynamic molecular signatures of living organisms and environments.</p></div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Capsules, Beacons, and Bioreactors for universal functionalization, collection, and analysis of biogenic volatile organic compounds.</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Capsules are controlled environments at the architectural scale, enabling growth, evaluation, and mediation of entire ecosystems. Simulated growth conditions may be programmed based on ecosystems spanning vastly different spatial scales, time zones, and climates. They may be networked with Bioreactors and Beacons.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Bioreactors are controlled environments for synthetic biology experiments at the product scale, designed to develop whole-cell biosensors in portable liquid chambers. Beacons are point-source sensor arrays that provide real-time monitoring of environmental parameters in natural and designed ecosystems. When units are located in both the lab and the forest, they serve as a conduit between wild and simulated ecologies.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4dbf94ce6e30eb429336_2024-014-01-0064.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Capsule</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4dbfbec1124310c53589_bioreactor-4-no-cables.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">BIOREACTOR</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4dbfc3fda4244d8f8e72_2024-014-03-v-0069-enhanced.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">BEACON</div></div></div></section><section data-wf--accordion-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><h2 class=\"h-medium\">Platform Details</h2><div class=\"accordion-wrap\"><div class=\"accordion-list\"><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">I.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Capsules</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>The Capsule is a data-driven grow room that can accommodate multiple organisms at a wide range of physical dimensions and spatial configurations, akin to a “breadboard” that allows researchers to plug in and run species-specific experiments with precisely tunable environmental parameters. Temperature control is engineered to comfortably span from 15°C to 45°C, with the capacity for extended temperatures (10°C to 60°C) for purposes of extreme tests and decontamination. Several modes of humidity control are provided, such as mist and/or coil dehumidifiers to maintain a range of 40–80% RH. Lighting is provided by LED fixtures with eight individually tunable color bands. Wavelength and intensity can be controlled programmatically and/or in response to environmental sensors. Airflow (max. 773 CFM) is regulated through tubing and perforations in the Capsule walls, connected to a central airflow system.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4f7270dbf15c122274d9_67d1df29507fcc79231398a4_capsule-render%20(1).avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">capsule pre-customization</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4f728088ff8096ab3536_67d1cca17f5449586021bb22_capsule-photo-edit-2.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">capsule configured to grow a whole ecology</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4f72e0cfc0e1e2753491_67d1deeeba4b6cdb5676e59b_2024-014-02-0416.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">LED fixtures with eight individually tunable color bands</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4f738558a789790369f5_67d1deee4160d66143d74561_2024-014-05-0566.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Programmed watering system to simulate rain</div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">II.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Bioreactor</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>The Bioreactor is an instrument for developing whole-cell biosensors that can sense and produce specific bVOCs, resulting in living engineered communication systems. Each Bioreactor contains the engineered biosensors in a temperature-controlled liquid chamber, which is designed to be easily removed for transport or sterilization in an autoclave. A septum port on top of this chamber allows us to introduce bVOCs into the headspace, to test the response of the biosensors to gas molecules of interest. Five motors on the instrument are used to pump in nutrients, pump out waste, circulate air, circulate liquid, and pump the liquid through flow-cells for analysis. With a custom, highly integrated z-channel design, the flow-cells are used to monitor the fluorescent protein produced by the biosensors, as well as their population density. This platform allows us to control every aspect of the environment in which the biosensors live, enabling directed evolution campaigns and biosensor benchmarking.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4fe7ce5f4495870f6816_bioreactor.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">front and side view of bioreactor</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_bioreactorliquid_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">zoomed in view of bacterial liquid culture</div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">IlI.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Beacon</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>The Beacon is a multi-modal point sensor that collects data on the temperature, humidity, light, and air pressure of a specific point in space in lab and field environments. They are integrated into the Capsule via Wi-Fi to collect measurements in the canopy and sub-canopy, sampling from plants that are not visible to overhead cameras. Multiple Beacons can be deployed in a broad network in the field, via a solar-powered LoRa network, to gather real-time information on an entire ecosystem. Transmitted through the cloud, the accumulated data on the physical and simulated environments further our understanding of what constitutes a thriving or stressed ecological state. Ultimately, a Beacon twin infrastructure aims to extend beyond parallel monitoring to entangled connectivity, empowering communication between ecologies separated by time and space.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5079d7bcfdd2a96d6452_2024-014-05-0399-4-enhanced.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">beacon version 1.0</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5079a193214e9a5ca99d_2024-027-0379.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">beacon version 1.0 in an exterior environment</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5079a193214e9a5ca985_beacon-no-reflection-grey-2.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">beacon version 2.0</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5079f716dae84b91acda_2024-014-07-0022.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">beacon version 2.0 in an interior environment</div></div></div><div class=\"_4-rem-pad\"></div></div></div></div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Product</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Fueled by our growing curiosity about what constitutes a long-term and resilient ecology, we look to environments that resemble their pre-mass-human-intervention state. Among these environments, the Oak-Tulip Tree Forest holds particular significance. This mesophytic hardwood forest community once sprawled across 37% of Manhattan Island, including the location of our Hell’s Kitchen-based lab.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Extensive human activities such as logging and agriculture and the proliferation of invasive species and pests have dramatically reduced its coverage, Today, it is recorded by the Department of Environmental Conservation as occupying only 0.5% of all natural areas in New York.</p></div></div></div></div></section><section data-wf--stat-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">oak-tulip tree forest coverage in manhattan, 1609</div></div><div class=\"display-h is-data\">37%</div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">From companion planting to programmable rewilding.</div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_capsule04timelapse_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">planting of the oak-tulip tree forest in capsule 04</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Despite the precarious state of this ecosystem as a whole, individual plant species persist, with 22 of them growing in Capsule 04 in our lab—a canopy of oaks, tulip trees, American beech, black birch, and red maple; subcanopy of flowering dogwood; and understory associates of witch hazel, sassafras, and lowbush blueberries, among others. While growth in the Capsule is young, the species and conditions are designed to mirror old-growth systems, moving toward the resurrection of an ancient ecology.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The one endangered species on our list is the American Chestnut, once a dominant tree in the Northeastern US, where it made up 25% of the forest canopy. The arrival of Chestnut Blight from Japan decimated these populations, reshaping entire ecosystems. We have three saplings of the original American Chestnut preserved in their native location, where they would not survive outside.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b51f722fdb499d198dfc1_-capsule-plants.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">May 18th, 2024</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b51f751fefb89c95f1ff3_2024-014-05-0474.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">June 27TH, 2024</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b51f740490344ef89a05e_2024-014-07-0016.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">SEPTEMBER 13TH, 2024</div></div></div></section><section data-wf--stat-section--variant=\"xl-top-padding\" class=\"section w-variant-41dda5da-37cf-7651-637f-35312d595621\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">American Chestnut in ancient Northeast forests</div></div><div class=\"display-h is-data\">25%</div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">From monoculture consumption to polyculture engineering.</div></div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b527f5599ad8379e3f0d5_bluberries-2.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">blueberries cultivated, may 28th, 2024</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b527fc3587194eea08b8e_capsule-plants-3.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">white aster full bloom, august 20th, 2024</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b527f69e4823606b5e4fd_ox108510.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Red Edge Brittle Stem Mushrooms emerge, july 30th, 2024</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Working with a controlled reconstruction of an ancient ecology provides an opportunity to research what factors made this collection of species thrive and remain dominant for so long. By cross-referencing data from various sensors integrated within the Capsule—including thermal and hyperspectral images and temperature and moisture levels in the air and soil—we can generate insights into how signals co-vary at the ecosystem level.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_ecologycapsulediagram_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">Thermal and Soil data overlayed on a 3d-scan of the ecology across 6 days</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>bVOCs are also collected and cross-correlated with other quantitative metrics of ecosystem health and performance such as respiration and transpiration rates, energy dissipation, and the accumulation of biomass. Taken together, these signals can not only indicate when an ecosystem may benefit from positive interventions, but may allow us to understand new ways that we can ‘resurrect’ ancient ecosystems and promote biodiversity.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b53276cb9881760d74627_67bc3bf05ee5c26ecd3b3bab_2024-027-0245.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">HEADSPACE ANALYSIS OF A TULIP TREE</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5328cc4b2e64f50ddd7a_67bc3bf03456df81ff10e419_2024-027-0209-2.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Sampling of the tulip tree in the spring</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The Thain Family Forest, situated within the New York Botanical Gardens (NYBG), contains an Oak-Tulip Tree Forest and stands as one of the oldest undisturbed forests close to the city. It serves as a valuable resource for sampling in a real-world environment, across seasons and year-round.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Courtesy of NYBG, we collected on-site molecular samples throughout the past four seasons, recreated them as smells in our lab, and are actively studying their influences on the environment.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b53276cb9881760d74627_67bc3bf05ee5c26ecd3b3bab_2024-027-0245.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">fallen tulip tree flowers</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b53a995ae53301193f675_pellets.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">bvoc collection</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b53a9d9408000dfc20f82_2024-014-07-0740.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">smell recreations of tulip tree, white oak and spice bush</div></div></div></section><section data-wf--accordion-section--variant=\"xl-top-padding\" class=\"section w-variant-37804a64-5844-0f60-d16f-de83fce15a8f\"><div class=\"container\"><h2 class=\"h-medium\">Project Details</h2><div class=\"accordion-wrap\"><div class=\"accordion-list\"><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">I.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Recreating an ancient ecology</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Capsule 04 is programmed to restore an ancient natural ecosystem at a given point in time. The “surrogate ecology” mimics past environmental conditions in Manhattan, including weather and soil composition.</p><p>Located in Belvedere Castle, the Central Park weather station is Manhattan’s oldest continuous monitoring station, dating back to 1869. To represent one year of historical conditions, we averaged weather data spanning one decade, from 1869 to 1879, and programmed these averages into the Capsule’s weather system.</p><p>Soil conditions were designed to emulate the ancient soil composition and microbiome of Oak-Tulip Tree Forests across the city. With over 10,000 distinct soil series possible, categorized by their unique physical and chemical properties, we mapped the locations of these forests to the list of likely soil types at that time and constructed an average for the texture of our own designed soil. The sandy-loam result is layered with compost sourced directly from the New York Botanical Gardens and is topped with leaf litter from an old-growth Oak-Tulip Tree Forest in New York. If we are successful, a genuine Oak-Tulip Tree Forest microbiome will reinoculate our soil.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b544bccfc340e6e74325d_group-1196.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">past and current weather patterns</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b544b6a1e9bc02ef4c7a0_group-1202.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">emulating light</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b544b503d79800864c75c_group-1195.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">soil recreation</div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">II.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Species Distribution</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Species distribution was computationally designed using generative optimization tools in an effort to ensure optimal conditions for all while creating a layout with the highest possible biodiversity rates. The resultant layout, comprising 53 individual plants, produced a Shannon index of 2.9, a common measure of biodiversity. The Shannon Index of other Northeastern US forests range from 1.2-1.8 compared to in the Amazon where they range from 3 to 5. Our optimization tool placed our local forest much closer to some of the most biodiverse areas in the world.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_speciesdistribution_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">species distribution and the generated optimized layout</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5c8cc97486d921440236_frame-16.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Plant Species List</div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">IlI.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Sampling in The Thain Family Forest</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>To collect and analyze the molecular fingerprints of the individual plants, soil, and air, we use headspace sampling chambers and solid-phase micro-extraction fibers. Gas chromatography–mass spectroscopy is applied to analyze molecular compositions which are later correlated with data outlining ecosystem performance, seeking patterns in the health-state of an ecological community and its smell. In addition to air sampling, an on-site Beacon continuously gathers environmental data, recording synchronized measurements from both the Capsule and the forest.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5d1dd660af40ec996ed6_sampling-3.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">SMELL SAMPLING USING A GCMS</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5079a193214e9a5ca99d_2024-027-0379.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://preprod.oxman.com/storage/uploads/1fbc50ed-80a4-4471-a24d-429cbab8821a/Alef-032.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">SAMPLING IN THE FALL, 2023</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5d1d97f05dfda73ab303_sampling-2.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">SOIL SAMPLING USING THE GCMS PROBE</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5d1d5952b75613bf9767_thain-maps-2.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Atmospheric (left), Plant Species (center), and Soil (right) Sampling Locations</div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">IV.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Ancient Smell</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>The smell of citrus, created by the emissions of limonene from the tulip tree, has antimicrobial and antifungal effects, safeguarding the tree and its neighboring flora from nearby pathogens. The aroma of wintergreen, released from the sweet birch, is intricately linked to the plant&#x27;s defense against herbivores. When threatened, the sweet birch produces methyl salicylate as a signal to attract other agents in the ecosystem capable of repelling the imminent threat. As a social intermediary and a key indicator of ecological activity, a smellscape thus holds the potential to reveal cultural behaviors ranging from consumption and production to birth and death.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5e40fa5ccb03597deb77_67d462f17a03d5e773054c64_2024-014-07-0721.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">RECREATED SMELL OF A TULIP TREE IN THE LAB</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5e403d84c7a9675b124a_67d462f1fa4575aabef736e6_frame-4.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">tulip tree chromatogram across 4 samplings between the lab and the forest</div></div></div><div class=\"_4-rem-pad\"></div></div></div></div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Praxis</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Looking to the past to inform the future, Capsule 03 is dedicated to bVOC- based communication and continuous in vivo directed evolution. This platform comprises an array of custom bioreactors specifically designed to interact with bVOCs and engineered bacteria.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>At the core of the system is a gantry setup equipped with a mechanical lung, which samples the air from each bioreactor. This allows us to transfer bVOCs between producer and sensor bacterial strains, enabling the creation and testing of biochemical communication networks.</p></div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">An ancient ecology reincarnated. A future ecology—designed.</div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_capsule03zoom_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">A mechanical lung, moved by a gantry system, transports the gaseous headspace between bioreactors</div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5f1607214c8df18fa6c4_67bc3e0896fbb6181b3a5ed2_ox-03204.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">back side of gantry system</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5f16460b403b8638f97a_67bc3e084bf79cfd6985c436_ox-03164.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">array of bioreactors specifically designed for gas-phase induction of synthetic constructs</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b5f1621b1e37d974fb41f_67bc3e08e21d2202014b1a1b_colour.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">genetically engineered bacteria</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>This system is designed as a modular living computer where information would take the shape of volatile molecules in the air, instead of electrons in wire, and computations will run in engineered DNA, instead of silicon chips.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>By leveraging this setup, we can explore how biochemical signals, such as those emitted by stressed plants, are captured by engineered bacteria and translated into actionable responses, both as a reporting system and as a bioremediation tool.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b60930883910699a0021a_group-1184.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">BIOREACTOR ARRAY AND DETAILS</div></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b6093a2bbc2f98f908880_group-1185.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b6093a2bbc2f98f908880_group-1185.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\"></div></button></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b609314156c57765751b6_group-1215.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b609314156c57765751b6_group-1215.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">Engineered E. coli (orange) producing gas phase signal to control the cells at the periphery (green)</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b6093581c21a3833213f9_group-1213.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b6093581c21a3833213f9_group-1213.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">Control of gene expression pattern of the peripheral bioreactors (green) using concentrated VOCs (blue)</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b60935de7b6b55f08f38c_group-1214.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b60935de7b6b55f08f38c_group-1214.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"alef.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">Multi-step communication system: a message is relayed in the form of multiple bVOCs</div></button></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>We are actively building bio-interactive systems where machines can control patterns of gene expression through gas-phase induction. Using gasses to regulate biological systems offers a non-invasive and transient form of communication. Unlike liquid chemicals, which often require injections that can cause physical damage and take longer to dissipate, gasses provide a quick, reversible signal.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Additionally, gas-phase induction allows for long-range signaling, making it a powerful tool for connecting distant biological systems and enabling complex interactions. Our modular computational platform represents a radical departure from existing systems that prototype bVOC interactions. As the first of its kind, it holds the promise and potential to evolve future ecologies to air-based interactions.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_bioreactorlab_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Bioreactor in the wet lab</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_bioreactorcloseup_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">zoomed in view of the bioreactor</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>From the simulation of ecologies to the design of electronic devices, we see smell as a tool to decode natural processes in ecosystems, as well as shape them. We seek to first listen, and then speak, developing novel ways to sense when Nature is thriving or struggling.</p><p>Importantly, our goal is not to prescribe or force a result but to share information through rapid technological development. We recognize the agency of other living organisms and aim only to provide insights that empower them to take their own actions, grounded in their own wisdom, which may be beyond our own.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Our case studies are the first of many. As we grow our collection of molecules and smells, we aim to partner with organizations that align with our values across the fields of agriculture, health, food, and fragrance, and have an interest in utilizing our tools across various scales to interpret Nature’s language for the betterment of humans and non-humans alike.</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">We seek a future where co-cultures can be designed online, simulated in a Lab and deployed in the wild.</div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/alef/alef_capsulepan_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">Capsule 04 and Capsule 03 in the wet lab</div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Credits</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>New York Botanical Garden:</strong> Data sampling of the Thain Family Forest, combined with archival data on the ecology pre-mass human intervention, directly supported the reconstruction of the Oak-Tulip Tree Forest in our lab. We express our gratitude for the New York Botanical Garden’s present stewardship of this land and support of this research project.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Consultants: </strong>Che-Wei Wang, Madeline Gannon, Greenery NYC</p><p><strong>Acknowledgments: </strong>Photography: Nicholas Calcott; Videography: Brennan Freed, Daniel Kouba</p><p>All images and videos courtesy of OXMAN</p></div></div></div></div></section><footer class=\"next-project-section\"><div class=\"section is-next-project-heading\"><div class=\"container\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><h2 class=\"eyebrow-txt\">Next Project<br/></h2></div><div class=\"display-h\">LAB</div></div></div></div></div><a data-w-id=\"e1127ab3-d257-ec54-b547-677dcc014cb2\" href=\"lab.html\" class=\"next-project-link w-inline-block\"><div class=\"cursor-arrow is-mobile\"><div class=\"arrow-icon w-embed\"><svg width=\"100%\" height=\"100%\" viewBox=\"0 0 48 48\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n<path d=\"M4.70703 1L46.707 1L46.707 43\" stroke=\"white\" stroke-width=\"2\"/>\n<path d=\"M0.707031 47.2498L46.707 1.24977\" stroke=\"white\" stroke-width=\"2\"/>\n</svg></div></div><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/lab/lab_pan_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></a></footer></div>"
