  class="source"/></video></div></div></div><div class="h-x-small">Molten glass 3D printed object using the
  G3DP</div></div><div data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><img alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69739c925e16aa27127af0ec_imgi_3_67d85b71ff700159807bd2b2_glassi-web-07.avif"
