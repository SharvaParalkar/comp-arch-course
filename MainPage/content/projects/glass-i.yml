  src="glass-i.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">When illuminated, the glass objects generated a
  complex pattern of caustics</div></div></div></section><section data-wf--stat-section--variant="xl-top-padding"
  class="section w-variant-41dda5da-37cf-7651-637f-35312d595621"><div class="container"><div class="d"><div
  class="vert-div"><div class="display-eyebrow-div"><div class="h-x-small">Extrusion Temperature in
  Celsius</div></div><div class="display-h is-data">1400</div></div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium"></h2></div></div><div class="d"><div
  class="d is-tab-half"><div class="txt-small w-richtext"><p>The platform is based on a dual heated chamber (fn-6)
  concept. The upper chamber acts as a Kiln Cartridge while the lower chamber serves to anneal the
  structures.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The Kiln Cartridge operates
  at approximately 1900°F and can (fn-6) contain sufficient material to build a single architectural component. The
  molten material gets funneled through an alumina-zirconia-silica nozzle.</p></div></div></div></div></section><section
  data-wf--cards-section--variant="xl-top-padding" class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div
