  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Glass column
  prototypes</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p><strong>Research team:</strong> John Klein, Michael Stern, Markus Kayser, Chikara Inamura, Giorgia
  Franchin, Shreya Dave, Daniel Lizardo, Peter Houk. Prof. Neri Oxman</p></div></div><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p><strong>Year</strong>: 2015</p><p><strong>Location</strong>: MIT Media Lab, 2015,
  Cambridge, MA</p><p><strong>Platform</strong>: <a href="https://oxman.com/projects/glass-3d-printing">Glass 3D
  Printing</a></p></div></div></div></div></section><section data-wf--section-1--variant="xl-top-padding" class="section
  w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div class="h-x-large">Optically
  transparent and structurally sound, glass has played a significant role in the evolution of product and architectural
  design across scales, disciplines, and ages.</div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Position</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Ancient yet modern, enclosing yet invisible,
  glass was first created in Mesopotamia and Ancient Egypt 4,500 years ago. Precise recipes for its production - the
  chemistry and techniques - often remain closely guarded secrets. Glass can be molded, formed, blown, plated or
  sintered; its formal qualities are closely tied to techniques used for its formation.</p></div></div><div class="d
  is-tab-half"><div class="txt-small w-richtext"><p>From the discovery of core-forming process for bead-making in
  ancient Egypt, through the invention of the metal blow pipe during Roman times, to the modern industrial Pilkington
  process for making large-scale flat glass; each new breakthrough in glass technology occurred as a result of prolonged
  experimentation and ingenuity, and has given rise to a new universe of possibilities for uses of the
  material..</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding"
  class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
  data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><img alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69739c9219cdc1a501a90e59_imgi_2_67d85b71907e4dcc0f6ed1ad_glassi-web-05.avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
