  class="source"/></video></div></div></div><div class="h-x-small">Explores effects of curvature</div></div><div
  data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><img alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69739c92b6d4d5bf31af379e_imgi_4_67d85b71d8e2dfa4460e315d_glassi-web-02.avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
  src="glass-i.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">Explores changes in
  concavity/convexity</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>G3DP is an additive manufacturing platform designed to print optically transparent glass. The
  tunability enabled by geometrical and optical variation driven by form, transparency and color variation can drive,
  limit or control light transmission, reflection and refraction, and therefore carries significant implications for all
  things glass. </p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The project synthesizes
  modern technologies with age-old established glass tools and technologies to produce novel glass structures with
  numerous potential applications. We unveil a first of its kind optically transparent glass printing process called
  G3DP.</p></div></div></div></div></section><section data-wf--cards-section--variant="xl-top-padding" class="section
  w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div class="container is-slot"><div
  data-wf--card--variant="33-minimum" class="d is-card"><div class="card-img-frame"><img alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69739c929c3cdf28e174a08d_imgi_5_67d85bbc0cabe039ec899666_glassi-web-15.avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
  preload="metadata" title="" loop="" playsinline="true" muted="" autoplay="true" class="video-element"><source
  src="glass-i.html" type="video/mp4" data-resolution="720p" data-format="mp4"
  class="source"/></video></div></div></div><div class="h-x-small">Installation of 3D printed glass objects on display
  at the MIT Media Lab</div></div><div data-wf--card--variant="33-minimum" class="d is-card"><div
  class="card-img-frame"><img alt=""
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69739c929daa2050f7cbe63f_imgi_6_67d85bbc22c8de0daf535efd_glassi-web-30.avif"
  loading="lazy" class="full-img"/><div class="bg-video-wrap"><div class="video-aspect-box"><video loading="eager"
