2b.jpg\" sizes=\"(max-width: 1000px) 100vw, 1000px, 70vw\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a18237008d4d7fcbd368_lightbox%202b-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a18237008d4d7fcbd368_lightbox%202b-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a18237008d4d7fcbd368_lightbox%202b-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a18237008d4d7fcbd368_lightbox%202b-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a18237008d4d7fcbd368_lightbox%202b-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a18237008d4d7fcbd368_lightbox%202b.jpg 2516w\" class=\"lens-img\"/></div></div></div></div><div class=\"h-x-small\">Velum II</div></div><div data-wf--lens-card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a02866275912bf0600d1_lightbox%203a.jpg\" loading=\"lazy\" sizes=\"100vw\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a02866275912bf0600d1_lightbox%203a-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a02866275912bf0600d1_lightbox%203a-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a02866275912bf0600d1_lightbox%203a-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a02866275912bf0600d1_lightbox%203a-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a02866275912bf0600d1_lightbox%203a-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a02866275912bf0600d1_lightbox%203a-p-2600.jpg 2600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a02866275912bf0600d1_lightbox%203a-p-3200.jpg 3200w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a02866275912bf0600d1_lightbox%203a.jpg 3750w\" class=\"full-img\"/><div data-w-id=\"b133eb1b-eda9-2cd2-db98-e04db18b7024\" class=\"lens-div\"><div class=\"lens-frame\"><div class=\"plus-div is-lens\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div><div class=\"plus-circle\"></div></div><div style=\"clip-path:circle(50% at 50% 50%)\" class=\"lens\"><img alt=\"\" loading=\"lazy\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a183a7dddb1dc82ab15f_lightbox%203b.jpg\" sizes=\"(max-width: 1000px) 100vw, 1000px, 70vw\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a183a7dddb1dc82ab15f_lightbox%203b-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a183a7dddb1dc82ab15f_lightbox%203b-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a183a7dddb1dc82ab15f_lightbox%203b-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a183a7dddb1dc82ab15f_lightbox%203b-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a183a7dddb1dc82ab15f_lightbox%203b-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a183a7dddb1dc82ab15f_lightbox%203b.jpg 2516w\" class=\"lens-img\"/></div></div></div></div><div class=\"h-x-small\">Velum III</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Fashion has always been expression; of identity, culture, transformation. Vigils proposes that this human expression can now begin at gene expression; that the language of biology and the language of design can be co-written. We empower the microorganism in shaping visual outcomes.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The process is neither the staid fixity of traditional textile methods, nor sheer abandonment to biological chance, but a negotiated design space, where the biological process is scaffolded, directed, and released. While the living process is long completed before the garment is worn, the object exists as an irreducible biological record of the lifeforce that moved through it.</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Form, function, phenotype.</div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d5d4e4d1152e5840c785_VIGILS%20Temporary.png\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d5d4e4d1152e5840c785_VIGILS%20Temporary-p-500.png 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d5d4e4d1152e5840c785_VIGILS%20Temporary-p-800.png 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d5d4e4d1152e5840c785_VIGILS%20Temporary-p-1080.png 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d5d4e4d1152e5840c785_VIGILS%20Temporary-p-1600.png 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d5d4e4d1152e5840c785_VIGILS%20Temporary-p-2000.png 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d5d4e4d1152e5840c785_VIGILS%20Temporary.png 2106w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"vigils.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Visual expression from gene expression</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d60df2febe56b04f9aca_VIGILS%20Temporary%202.png\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d60df2febe56b04f9aca_VIGILS%20Temporary%202-p-500.png 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d60df2febe56b04f9aca_VIGILS%20Temporary%202-p-800.png 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d60df2febe56b04f9aca_VIGILS%20Temporary%202-p-1080.png 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d60df2febe56b04f9aca_VIGILS%20Temporary%202.png 1404w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"vigils.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Biologically programmed color gradients</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Praxis</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Industrial production is hostile to the complexity of living organisms, to their boundless complexity of growth, reproduction, evolution, metabolism, and sensation. Product development entails design, engineering, and assembly, whose logic is structured solely on predictable materials, reduced to mere input and output. Deviation is a defect to be rooted out. Living systems are domesticated into inertness, in sterilized substrates and fermentation tanks, until eliminated entirely.</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">In Vigils, variance is a feature. Our designs emerge through the complex logic of living systems and illuminate that which can only be expressed by biology.</div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a521e947f165ea570e09_CAPE%203%20MODEL.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a521e947f165ea570e09_CAPE%203%20MODEL-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a521e947f165ea570e09_CAPE%203%20MODEL-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a521e947f165ea570e09_CAPE%203%20MODEL-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a521e947f165ea570e09_CAPE%203%20MODEL-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a521e947f165ea570e09_CAPE%203%20MODEL-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a521e947f165ea570e09_CAPE%203%20MODEL.jpg 2516w\" class=\"full-img\"/></div><div class=\"h-x-small\">Velum III &amp; Velum IV </div></div><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d80622783810044ff235_Temporary%20new%207.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d80622783810044ff235_Temporary%20new%207-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d80622783810044ff235_Temporary%20new%207-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d80622783810044ff235_Temporary%20new%207-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a32d80622783810044ff235_Temporary%20new%207.jpg 1296w\" class=\"full-img\"/></div><div class=\"h-x-small\">MICROBIAL PIGMENTATION INFORMED BY TEXTILE TOPOGRAPHY AND STRUCTURE</div></div><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd68fb06e5085e9cb445_Velum%20I%20paired%20with%20biopigmented%20collar.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd68fb06e5085e9cb445_Velum%20I%20paired%20with%20biopigmented%20collar-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd68fb06e5085e9cb445_Velum%20I%20paired%20with%20biopigmented%20collar-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd68fb06e5085e9cb445_Velum%20I%20paired%20with%20biopigmented%20collar-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd68fb06e5085e9cb445_Velum%20I%20paired%20with%20biopigmented%20collar-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd68fb06e5085e9cb445_Velum%20I%20paired%20with%20biopigmented%20collar-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd68fb06e5085e9cb445_Velum%20I%20paired%20with%20biopigmented%20collar-p-2600.jpg 2600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd68fb06e5085e9cb445_Velum%20I%20paired%20with%20biopigmented%20collar-p-3200.jpg 3200w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd68fb06e5085e9cb445_Velum%20I%20paired%20with%20biopigmented%20collar.jpg 3750w\" class=\"full-img\"/></div><div class=\"h-x-small\">Velum I paired with biopigmented collar</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Synthetic biology is a platform for creating living interventions in the making of objects and interfaces, for which bacterial pigmentation is a first step. Can enzyme-secreting bacteria modulate the softness and rigidity of textiles through selective degradation or cross-linking? If the world shifts from a paradigm of manufacturing to one of growing, the emergence of a new material behavior is inevitable.</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Aliveness is our obligation.</div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45de3daf505d2e03874c9f_Velum%20III%20Closing%20Image.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45de3daf505d2e03874c9f_Velum%20III%20Closing%20Image-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45de3daf505d2e03874c9f_Velum%20III%20Closing%20Image-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45de3daf505d2e03874c9f_Velum%20III%20Closing%20Image-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45de3daf505d2e03874c9f_Velum%20III%20Closing%20Image-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45de3daf505d2e03874c9f_Velum%20III%20Closing%20Image-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45de3daf505d2e03874c9f_Velum%20III%20Closing%20Image.jpg 2250w\" class=\"full-img\"/></div><div class=\"h-x-small\">Velum III </div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Credits</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Acknowledgements: </strong>Photography: Nicholas Calcott, Kristina Sumfleth; Model: Gray Harris; Make up: Daniel Pazos; Tailoring for Velum I and collar: Joel Diaz.</p><p>All images and videos courtesy of OXMAN</p></div></div></div></div></section><footer class=\"next-project-section\"><div class=\"section is-next-project-heading\"><div class=\"container\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><h2 class=\"eyebrow-txt\">Next Project<br/></h2></div><div class=\"display-h\">0°</div></div></div></div><