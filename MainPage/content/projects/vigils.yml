title: VIGILS
permalink: /projects/vigils.html
body_class: body
seo:
  description: >-
    At the body scale, Vigils is a second skin, grown rather than cut and sewn. The ridges catch light and gesture, the
    sinuous lines flow with the body, the fabric weight shrouds shoulder and spine. The same biological tools that
    govern the iridescence of a butterfly wing, or the patterning of a jaguar&#x27;s coat, we express in the design of
    garment and cloth.
