files.com/690e0b6e2e2a0cbc45ab116e/6a45dd4d92f72c3f2b10c235_Velum%20IV%20Full%20Screen-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd4d92f72c3f2b10c235_Velum%20IV%20Full%20Screen-p-2600.jpg 2600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd4d92f72c3f2b10c235_Velum%20IV%20Full%20Screen.jpg 3000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"vigils.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Velum IV  </div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>This series of capes resolve color, structure, and form in a single biological act. Born of collaboration between humans and bacteria, the garments are pigmented by a strain of <em>E. coli</em> engineered to produce two pigment classes, indigos and melanins. Vitality embedded in every thread.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Knitted seamlessly into conical form, the local ridges and valleys that emerge from the textile structure carry the programmed placement of microbial-inducer-coated fiber, positioned precisely at the apex and nadir of textile topology.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"xl-top-padding\" class=\"section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a\"><div class=\"container is-slot\"><div data-wf--lens-card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a0291c5aeb65f2b15b21_lightbox%201a.jpg\" loading=\"lazy\" sizes=\"100vw\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a0291c5aeb65f2b15b21_lightbox%201a-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a0291c5aeb65f2b15b21_lightbox%201a-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a0291c5aeb65f2b15b21_lightbox%201a-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a0291c5aeb65f2b15b21_lightbox%201a-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a0291c5aeb65f2b15b21_lightbox%201a-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a0291c5aeb65f2b15b21_lightbox%201a-p-2600.jpg 2600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a0291c5aeb65f2b15b21_lightbox%201a-p-3200.jpg 3200w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a0291c5aeb65f2b15b21_lightbox%201a.jpg 3750w\" class=\"full-img\"/><div data-w-id=\"b133eb1b-eda9-2cd2-db98-e04db18b7024\" class=\"lens-div\"><div class=\"lens-frame\"><div class=\"plus-div is-lens\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div><div class=\"plus-circle\"></div></div><div style=\"clip-path:circle(50% at 50% 50%)\" class=\"lens\"><img alt=\"\" loading=\"lazy\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a03cee23973f26f2d28b_lightbox%201b.jpg\" sizes=\"(max-width: 1000px) 100vw, 1000px, 70vw\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a03cee23973f26f2d28b_lightbox%201b-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a03cee23973f26f2d28b_lightbox%201b-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a03cee23973f26f2d28b_lightbox%201b-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a03cee23973f26f2