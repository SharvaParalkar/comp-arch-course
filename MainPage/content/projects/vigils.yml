main_html: "<div><header data-wf--hero-section-project--variant=\"black-on-white\" class=\"section is-hero\"><div class=\"container is-hero-60\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><div class=\"eyebrow-txt\">Project<br/></div></div><h1 class=\"display-h\">VIGILS</h1></div></div></div></header><section data-wf--video-section--variant=\"no-top-padding\" class=\"full-media-section\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/VIGILS/hero_small_zoom_v3_small.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">BIOPIGMENTATION PROCESS IN THE WET LAB</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Color, from applied to grown</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Humans manufacture pigment from petroleum; nature grows color from life itself. Color patterning in nature is orchestrated at the cellular level, where instructions encoded in DNA drive gene expression, governing cellular identity and structure, alongside pigment production. The cell reads a chemical coordinate and acts out what its position calls for: the stripe of a tiger&#x27;s flank, the spiral of a sunflower head, the swirl of a fingerprint. This logic, operating from the molecular to the macro scale, underlies exquisite spatial control, complexity, and beauty.</p><p>‍</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Research team: Olivia Depies, Kaylen Hunte, Ben Light, Xavier Lopez, Jessy Lu, Julia Martinez, Neri Oxman, Marcus Walker.</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Pattern is the first act of biological architecture.</div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc4172b0a689a9a18f22c_meristem_gus_small.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc4172b0a689a9a18f22c_meristem_gus_small-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc4172b0a689a9a18f22c_meristem_gus_small-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc4172b0a689a9a18f22c_meristem_gus_small-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc4172b0a689a9a18f22c_meristem_gus_small.jpg 1500w\" class=\"full-img\"/></div><div class=\"h-x-small\">Patterned GUS stained GL2 promoter activity in Arabidopsis thaliana root meristem</div></div><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/VIGILS/Cape_side_shot_lr_clean_meristem_pair_short.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">engineered biopigmentation pattern on textile</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Speck, mottle and bloom. Pigment is our first intervention, but it is not the last. Our framework for designing spatial color is written, like all biological processes, in genetic code and therefore extensible. This very same architecture can be applied to direct biomineralization, enzymatic crosslinking, or the secretion of functional proteins – transforming textiles and garments from sterile objects into programmable sites of biological engineering and design.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Phenotype over prototype. Where industrial uniformity demands repetition, microbial engineering offers variation. Every textile becomes a singular expression of a genetic program expressing unique material landscapes.</p><p>‍</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">A textile cultured, not dyed.</div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/VIGILS/scales_of_10_v5_long_t_trim.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">Bacterial pigmentation timelapse. from centimeters to micrometers - Image scale: 20 cm, 1 cm, 1.5 mm, 100 MICRONS</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Position</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Petrochemical products have shaped a century of garment and textile. The sheen of polyester, the compressive shape of spandex and lycra, the hue of synthetic dye. The instability of the current coloring paradigm is self-evident; pigments derived from petrochemical feedstocks pollute the environment through their synthesis, their application, and their discardment. Meanwhile, biological systems demonstrate exquisite molecular control in the creation of material. They assemble complex molecules from simple building blocks, generating hierarchical spatial properties and functional diversity, at ambient temperature, without toxicity, without waste.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Nature&#x27;s capability does not immediately equal human utility; products of mycelium leather and engineered spider silk have struggled to establish themselves as objects of desire. We persist in biological co-creation for the creation of human value.</p><p>Biomaterials are not merely sustainable alternatives to petrochemical incumbents. By engineering living systems to grow color on whole cloth, we embed biology into the depths of design. The programmed gene expression of microorganisms becomes the selfsame expression of aesthetic intent. The design of our textile is evidence and imprint of biological lifeforms.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc40d350a014ad79c7200_microscopy_cool-5_small.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc40d350a014ad79c7200_microscopy_cool-5_small-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc40d350a014ad79c7200_microscopy_cool-5_small-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc40d350a014ad79c7200_microscopy_cool-5_small-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc40d350a014ad79c7200_microscopy_cool-5_small.jpg 1335w\" class=\"full-img\"/></div><div class=\"h-x-small\">Indigo producing Engineered E. coli colony on agar</div></div><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dcc93aae800d7cace3dc_Biopigmented%20textile%20post%20incubation.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dcc93aae800d7cace3dc_Biopigmented%20textile%20post%20incubation-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dcc93aae800d7cace3dc_Biopigmented%20textile%20post%20incubation-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dcc93aae800d7cace3dc_Biopigmented%20textile%20post%20incubation-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dcc93aae800d7cace3dc_Biopigmented%20textile%20post%20incubation-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dcc93aae800d7cace3dc_Biopigmented%20textile%20post%20incubation-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dcc93aae800d7cace3dc_Biopigmented%20textile%20post%20incubation-p-2600.jpg 2600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dcc93aae800d7cace3dc_Biopigmented%20textile%20post%20incubation.jpg 3000w\" class=\"full-img\"/></div><div class=\"h-x-small\">Biopigmented textile post incubation</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Platform</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Hybrid Living Textiles. The platform is a sister and successor to Hybrid Living Materials, a framework embodied by Vespers I, II, &amp; III, wherein UV-curable resin acts as substrate for engineered microorganisms to produce pigment spatially. Vespers, mask. Vigils, shroud.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Where Hybrid Living Materials brought biology to the printed object, rendered hard and rigid, Hybrid Living Textiles renders biology soft, with drape. Both relics bear the insignia of the lifeforms that produced them.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Co-authorship with nature, across substrate and scale.</div></div></div></section><section data-wf--cards-section--variant=\"no-top-padding\" class=\"section w-variant-61c9a84b-9920-ca2b-82d7-90e825b716ef\"><div class=\"container is-slot\"></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45ded4a03c339f8b57a9ce_Bacterial%20application%20in%20the%20wet%20lab%20copy.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45ded4a03c339f8b57a9ce_Bacterial%20application%20in%20the%20wet%20lab%20copy-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45ded4a03c339f8b57a9ce_Bacterial%20application%20in%20the%20wet%20lab%20copy-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45ded4a03c339f8b57a9ce_Bacterial%20application%20in%20the%20wet%20lab%20copy-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45ded4a03c339f8b57a9ce_Bacterial%20application%20in%20the%20wet%20lab%20copy-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45ded4a03c339f8b57a9ce_Bacterial%20application%20in%20the%20wet%20lab%20copy-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45ded4a03c339f8b57a9ce_Bacterial%20application%20in%20the%20wet%20lab%20copy-p-2600.jpg 2600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45ded4a03c339f8b57a9ce_Bacterial%20application%20in%20the%20wet%20lab%20copy.jpg 3000w\" class=\"full-img\"/></div><div class=\"h-x-small\">Bacterial application in the wet lab</div></div><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd059aaac9f7a5533d23_Textile%20fabrication%20in%20the%20robotic%20cell.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd059aaac9f7a5533d23_Textile%20fabrication%20in%20the%20robotic%20cell-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd059aaac9f7a5533d23_Textile%20fabrication%20in%20the%20robotic%20cell-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd059aaac9f7a5533d23_Textile%20fabrication%20in%20the%20robotic%20cell-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd059aaac9f7a5533d23_Textile%20fabrication%20in%20the%20robotic%20cell-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd059aaac9f7a5533d23_Textile%20fabrication%20in%20the%20robotic%20cell-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd059aaac9f7a5533d23_Textile%20fabrication%20in%20the%20robotic%20cell-p-2600.jpg 2600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd059aaac9f7a5533d23_Textile%20fabrication%20in%20the%20robotic%20cell.jpg 3000w\" class=\"full-img\"/></div><div class=\"h-x-small\">Textile fabrication in the robotic cell</div></div></div></section><section data-wf--stat-section--variant=\"xl-top-padding\" class=\"section w-variant-41dda5da-37cf-7651-637f-35312d595621\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">bacterial cells per ml of media</div></div><div class=\"display-h is-data\">1x10<sup>9</sup></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5b005e607536c5d056a_Collage_small.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5b005e607536c5d056a_Collage_small-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5b005e607536c5d056a_Collage_small-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5b005e607536c5d056a_Collage_small-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5b005e607536c5d056a_Collage_small-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5b005e607536c5d056a_Collage_small.jpg 2000w\" class=\"full-img\"/></div><div class=\"h-x-small\">Chemical inducer compatibility surveyed across fiber type</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>‍</p><p>‍</p><p>‍</p><p>‍</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>A 3D-knitted construct provides an architecture of fibers onto which cells can grow, sense their environment, and deposit material locally and globally. By growing bacteria directly on the surface of textile as scaffold, we empower design to leverage synthetic biology and textile fabrication in the creation of expressions only possible through living systems.</p></div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Textile as bioreactor</div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd36a03c339f8b575289_Spray%20application%20of%20bacterial%20culture.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd36a03c339f8b575289_Spray%20application%20of%20bacterial%20culture-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd36a03c339f8b575289_Spray%20application%20of%20bacterial%20culture-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd36a03c339f8b575289_Spray%20application%20of%20bacterial%20culture-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd36a03c339f8b575289_Spray%20application%20of%20bacterial%20culture-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd36a03c339f8b575289_Spray%20application%20of%20bacterial%20culture-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd36a03c339f8b575289_Spray%20application%20of%20bacterial%20culture-p-2600.jpg 2600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45dd36a03c339f8b575289_Spray%20application%20of%20bacterial%20culture.jpg 3000w\" class=\"full-img\"/></div><div class=\"h-x-small\">Spray application of bacterial culture</div></div><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5a12009d0aba389e671_2026-06-24_small.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5a12009d0aba389e671_2026-06-24_small-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5a12009d0aba389e671_2026-06-24_small-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5a12009d0aba389e671_2026-06-24_small-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5a12009d0aba389e671_2026-06-24_small-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a3cc5a12009d0aba389e671_2026-06-24_small.jpg 1988w\" class=\"full-img\"/></div><div class=\"h-x-small\">Stabilized armature for spray application</div></div></div></section><section data-wf--accordion-section--variant=\"xl-top-padding\" class=\"section w-variant-37804a64-5844-0f60-d16f-de83fce15a8f\"><div class=\"container\"><h2 class=\"h-medium\">Platform Details</h2><div class=\"accordion-wrap\"><div class=\"accordion-list\"><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">I.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Synthetic Biology</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>All living organisms share a common vernacular of DNA, RNA, and proteins; a finite set of elements whose conversion and interaction produce infinite variation. We, as humans, attempt to learn and apply this common vernacular toward our own outcomes, often within, and simultaneously to, a living organism carrying out their own.</p><p>‍</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df4820a4a794c9d42e0d_syn_bio_V5_small.png\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df4820a4a794c9d42e0d_syn_bio_V5_small-p-500.png 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df4820a4a794c9d42e0d_syn_bio_V5_small-p-800.png 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df4820a4a794c9d42e0d_syn_bio_V5_small-p-1080.png 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df4820a4a794c9d42e0d_syn_bio_V5_small-p-1600.png 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df4820a4a794c9d42e0d_syn_bio_V5_small-p-2000.png 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df4820a4a794c9d42e0d_syn_bio_V5_small.png 2388w\" class=\"full-img\"/></div><div class=\"h-x-small\">Synthetic biology overview</div></div><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Can the tools of synthetic biology create and reveal Beauty?</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Synthetic biology, our application of engineering principles to biological systems, is a field directed to nearly every domain of material life. From customized therapeutics, where drugs and vaccines are biosynthesized, and tissues and organs are grown in the lab, to agriculture, where organisms fix carbon or remediate degraded soil.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>We start with <em>Escherichia coli</em>, the workhorse of synthetic biology. The protein-based sensor is a common motif in biology, wherein the cell produces a protein tuned to a specific chemical signal. When that signal binds, it triggers a cascade; genes switch on, enzymes emerge, and the cell builds pigment molecules from basic building blocks like amino acids. DNA itself becomes a storage medium for computation, for biological logic gates and living sensors.</p></div></div></div></div></section><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5ea70b02e3a3eaf349_syn_bio_V5_-02.png\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5ea70b02e3a3eaf349_syn_bio_V5_-02-p-500.png 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5ea70b02e3a3eaf349_syn_bio_V5_-02-p-800.png 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5ea70b02e3a3eaf349_syn_bio_V5_-02-p-1080.png 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5ea70b02e3a3eaf349_syn_bio_V5_-02.png 1146w\" class=\"full-img\"/></div><div class=\"h-x-small\">Pigment deposition trends with starting cell density</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5e5d8ce4cde022bc5f_syn_bio_V5_-03.png\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5e5d8ce4cde022bc5f_syn_bio_V5_-03-p-500.png 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5e5d8ce4cde022bc5f_syn_bio_V5_-03-p-800.png 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5e5d8ce4cde022bc5f_syn_bio_V5_-03-p-1080.png 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5e5d8ce4cde022bc5f_syn_bio_V5_-03.png 1146w\" class=\"full-img\"/></div><div class=\"h-x-small\">Band size trends with log of fiber concentration</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5fd769ae7cb44f5109_syn_bio_V5_-04.png\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5fd769ae7cb44f5109_syn_bio_V5_-04-p-500.png 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5fd769ae7cb44f5109_syn_bio_V5_-04-p-800.png 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5fd769ae7cb44f5109_syn_bio_V5_-04-p-1080.png 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a45df5fd769ae7cb44f5109_syn_bio_V5_-04.png 1146w\" class=\"full-img\"/></div><div class=\"h-x-small\">Expression of multiple pigments simultaneously</div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">II.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">3D Knit Textile</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Textile is the architecture of fibers onto which cells can grow, sense, and deposit material. We use silk threads, whose individual silkworm-spun filaments measure a mere 10 to 20 µm, the scale of microorganisms. They are bound into bundles, the fascia of thread or yarn, to be knitted into the tissue and musculature of garment.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p><p>‍</p><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a36d98b765419e58a703_Knitting%20full%20page%20OX.jpg\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a36d98b765419e58a703_Knitting%20full%20page%20OX-p-500.jpg 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a36d98b765419e58a703_Knitting%20full%20page%20OX-p-800.jpg 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a36d98b765419e58a703_Knitting%20full%20page%20OX-p-1080.jpg 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a36d98b765419e58a703_Knitting%20full%20page%20OX-p-1600.jpg 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a36d98b765419e58a703_Knitting%20full%20page%20OX-p-2000.jpg 2000w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a36d98b765419e58a703_Knitting%20full%20page%20OX-p-2600.jpg 2600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a36d98b765419e58a703_Knitting%20full%20page%20OX-p-3200.jpg 3200w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6a39a36d98b765419e58a703_Knitting%20full%20page%20OX.jpg 6666w\" class=\"full-img\"/></div><div class=\"h-x-small\">Knitted textile before biopigmentation</div></div><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>At each scale, structure determines behavior. The continuous strands of silk fibroin proteins align along the fiber axis for tensile strength. The high twist of silk crepe confers dynamic contraction upon contact with the moisture of biological systems. The looped topology of knit structure interlaces for stretch and recovery, for hand and drape.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>3D knit creates a monolithic artifact. In CNC knit technology every stitch is individually programmable, giving the design process higher fidelity of control. A variety of fiber properties are brought together in one material though independently controlled yarn feed, and whose shape and assembly are performed by the selfsame machine. A knitted shoe upper, a prosthetic sleeve, a medical stent— formed whole, not assembled. The object is its own construction.</p></div></div></div></div></section></div><div class=\"_4-rem-pad\"></div></div></div></div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Product</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>At the body scale, Vigils is a second skin, grown rather than cut and sewn. The ridges catch light and gesture, the sinuous lines flow with the body, the fabric weight shrouds shoulder and spine. The same biological tools that shape the iridescence of a butterfly wing, or the patterning of a jaguar&#x27;s coat, we express in the design of garment and cloth. Over the course of the day, a billion bacterial cells per cubic centimeter of media labor. The brief and luminous lifetime of a culture embedding color into cloth.</p></div></div></div></div></section><section data-wf--stat-section--variant=\"xl-top-padding\" class=\"section w-variant-41dda5da-37cf-7651-637f-35312d595621\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">hours that the cape is alive</div></div><div class=\"display-h is-data\">24</div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"></div></section><section data-wf--cards-section--variant=\"no-top-padding\" class=\"section w-variant-61c9a84b-9920-ca2b-82d7-90e825b716ef\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/VIGILS/cape%201_timed_red.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\"> Velum I Timelapse</div></div><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/VIGILS/Cape%202.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">\_Velum II Timelapse</div></div><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://