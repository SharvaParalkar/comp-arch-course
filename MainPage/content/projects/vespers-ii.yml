  class="source"/></video></div></div></div><div class="h-x-small">Mask 04 Surface colors transformed into internal
  vasculature. Photo: Yoram Reshef</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding"
  class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>To create the Vespers masks, we developed a data-driven approach for the creation of
  high-resolution, geometrically complex, and materially heterogeneous 3D printed objects at product scale. Titled
  Data-driven Material Modeling (DdMM), this approach utilizes external and user-generated data-sets for the evaluation
  of heterogeneous material distributions during slice generation for 3D printing, thereby enabling the production of
  voxel-matrices describing material distributions for bitmap-printing at the printer’s native
  resolution.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The series utilizes our
  bitmap-slicing framework to inform material property distribution in concert with slice generation, in real time. In
  contrast to existing approaches occupying the intersection of computational design and additive manufacturing, this
  framework emphasizes the ability to integrate multiple geometry-based data sources to achieve high levels of control
  for applications in a wide variety of design scenarios.</p></div></div></div></div></section><section
  data-wf--stat-section--variant="xl-top-padding" class="section w-variant-41dda5da-37cf-7651-637f-35312d595621"><div
