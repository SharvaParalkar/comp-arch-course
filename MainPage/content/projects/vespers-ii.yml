  <div><header data-wf--hero-section-project--variant="black-on-white" class="section is-hero"><div class="container
  is-hero-60"><div class="d"><div class="d100"><div class="display-eyebrow-div"><div
  class="eyebrow-txt">Project<br/></div></div><h1 class="display-h">Vespers II</h1></div></div></div></header><section
  data-wf--img-section--variant="no-top-padding" class="full-media-section"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69738dd03c88995cbc2610ae_imgi_15_67d4adc39a7088c922c6e824_vespersii-web-00.avif"
  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">3D printed death masks,
  series 2. Photo: Yoram Reshef</div></div></section><section data-wf--section-1-2--variant="xl-top-padding"
  class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Hybrid living mask prototypes</h2></div></div><div class="d"><div class="d
  is-tab-half"><div class="txt-small w-richtext"><p><strong>Research team: </strong>Christoph Bader, Dominik Kolb, James
  C. Weaver. Prof. Neri Oxman.</p></div></div><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p><strong>Year</strong>: 2017</p><p><strong>Location</strong>: Design Museum, 2016, London, United
  Kingdom. National Gallery of Victoria, 2018, Melbourne, Australia</p><p><strong>Platform</strong>: <a
  href="https://oxman.com/projects/data-driven-material-modeling">Data Driven Material
  Modeling</a></p></div></div></div></div></section><section data-wf--section-1--variant="xl-top-padding" class="section
  w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div class="h-x-large">The
  internal structures reference the distribution of the martyr’s last breath.</div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Position</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>The custom of the death mask in the ancient
  world was believed to strengthen the spirit of the deceased and guard their soul from evil spirits on their way to the
  afterword. In this view, death is a conduit to a form of rebirth. The mythical notion that the soul can be guided from
  a state of death to a new state of life inspired the design of the masks in the second series.</p></div></div><div
  class="d is-tab-half"><div class="txt-small w-richtext"><p>In Vespers II, it is the interplay of light that reveals
  these internal structures. Like spirits (from Latinspiritus, meaning “breath”), the internal structures reference the
  distribution of the martyr’s last breath.</p></div></div></div></div></section><section
  data-wf--cards-section--variant="xl-top-padding" class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div
