  class="cursor-line is-90"></div></div></div></div><div class="h-x-small">Demonstration of post processing on exterior
  and section cut</div></button></div></div></section><section data-wf--section-1-2--variant="xl-top-padding"
  class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium"></h2></div></div><div class="d"><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>The inner structures of the Vespers masks are entirely data driven and are designed to
  match the resolution of structures found in nature. Expressed through changes in formal and material
  heterogeneity—from discontinuous to smooth, from surface to volume, from discrete to continuous —this series conveys
  the notion of metamorphosis.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Using
  spatial mapping algorithms, the culturally coded surface colorations and truncated geometries in the first series are
  transformed into colored, internal strands within transparent, smoothly curved volumes in the second. For example, the
  distribution of colors across the ‘crown of thorns’ mask in the first series becomes internal nerve axons in its
  martyr’s mask in the second series.</p></div></div></div></div></section><section
  data-wf--cards-section--variant="xl-top-padding" class="section w-variant-bc4f764a-f844-3120-91fa-99f566fd2f5a"><div
