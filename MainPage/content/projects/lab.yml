bs.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/lab/lab_dancerswingin_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Dancer swings from minimalist staircase</div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">IV.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Landscaping</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>The garden has been designed to create niches for respite and conversation while the programming serves to maximize biodiversity in a minimal footprint. Featuring 25 different species of plants covering 65% of the total area, it is designed around native pollinators and species to serve as a thriving habitat.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-