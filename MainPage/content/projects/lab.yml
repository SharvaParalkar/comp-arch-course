g-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/lab/lab_spinning_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Stretching and spooling</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif\" loading=\"lazy\" sizes=\"(max-width: 1299px) 100vw, 1299px\" srcset=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-500.avif 500w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-800.avif 800w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1080.avif 1080w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder-p-1600.avif 1600w, https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69149cd188717c8c650432cd_img-placeholder.avif 2000w\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/o0/o0_knittingmachine_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">3D Knitting</div></div></div></section><section data-wf--accordion-section--variant=\"xl-top-padding\" class=\"section w-variant-37804a64-5844-0f60-d16f-de83fce15a8f\"><div class=\"container\"><h2 class=\"h-medium\">Wet Lab Details</h2><div class=\"accordion-wrap\"><div class=\"accordion-list\"><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">I.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Connectors</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Floor plug-in points enable quick swapping of superchargers, tables, and machinery, providing flexibility for changing lab setups. These connection points offer access to power, data, and gases, facilitating transitions between different configurations.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e4440487a884873f2044c_690bb03ea18d086c19c62b88_floor-port.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Supercharger floor plug-in point</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https: