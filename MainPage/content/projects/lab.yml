main_html: "<div><header data-wf--hero-section-project--variant=\"black-on-white\" class=\"section is-hero\"><div class=\"container is-hero-60\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><div class=\"eyebrow-txt\">Project<br/></div></div><h1 class=\"display-h\">Lab</h1></div></div></div></header><section data-wf--video-section--variant=\"no-top-padding\" class=\"full-media-section\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/lab/lab_pan_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">OXMAN Lab</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Core Team</strong>: Ashley Fidel, Anran Li, Ben Light, Xavier Lopez, Brian Mirenda, Neri Oxman, Ryan Rodriguez, Alex Saffari, Tyler Schiavo, Kevin Shook, Bridget Small, Olivia Tai, Andrew Tom, Khoa Vu, Glen Wolland</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Year</strong>: 2020-2025</p><p><strong>Location</strong>: 787 Eleventh Ave, Fl 9, NYC, New York</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">OXMAN Lab is a workplace of the future that connects humans, machines, and Nature.</div></div></div></section><section data-wf--img-section--variant=\"s-top-padding\" class=\"full-media-section w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443df64af2769ce7f664_690bb03ea18d086c19c62a53_lab-img-01.avif\" loading=\"lazy\" alt=\"\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">Cross-section showcasing the integration of research, design, and fabrication</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">The Interconnected Studio</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>OXMAN&#x27;s hybrid studio consists of three interconnected spaces: a Design Studio, a Wet Lab, and a Production Workshop. These environments were created to foster the dynamic interplay of design, biology, and engineering, each tailored to its function while allowing ideas and processes to move fluidly between them.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Designed in collaboration with Foster + Partners, the space integrates cutting-edge architectural technologies. Custom furniture and advanced lab equipment redefine the possibilities for a multifunctional studio, lab, and workshop.</p></div></div></div></div></section><section data-wf--quote-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container xl-top-padding-8\"><div class=\"d xl-top-padding-9\"><div class=\"h-x-large xl-top-padding-10\">Collaboration is key in approaching this interdependence—and it grows increasingly important in today&#x27;s accelerated, interconnected world.</div></div></div><div class=\"container xl-top-padding-8\"><div class=\"d\"><div class=\"pad-top is-1-rem\"><div class=\"h-x-small\">— Lord Norman Foster</div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443dfdb2b9d8a3de2729_690bb03ea18d086c19c62a55_production-across-scales.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443dfdb2b9d8a3de2729_690bb03ea18d086c19c62a55_production-across-scales.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">PRODUCTION ACROSS SCALES</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443d4f015f38f74fe03a_690bb03ea18d086c19c62a56_technology-across-disciplines.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443d4f015f38f74fe03a_690bb03ea18d086c19c62a56_technology-across-disciplines.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">TECHNOLOGY ACROSS DISCIPLINES</div></button></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lens-card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443e531ae4993b253060_690bb03ea18d086c19c62b6c_ox-07087-hires-v4-1.avif\" loading=\"lazy\" class=\"full-img\"/><div data-w-id=\"b133eb1b-eda9-2cd2-db98-e04db18b7024\" class=\"lens-div\"><div class=\"lens-frame\"><div class=\"plus-div is-lens\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div><div class=\"plus-circle\"></div></div><div style=\"clip-path:circle(50% at 50% 50%)\" class=\"lens\"><img alt=\"\" loading=\"lazy\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e48d8828a897db837ba56_67f3a1c19bd46303b165b064_studio-construction.avif\" class=\"lens-img\"/></div></div></div></div><div class=\"h-x-small\">DESIGN STUDIO</div></div><div data-wf--lens-card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443d0dbdf2cd591c7d70_690bb03ea18d086c19c62a58_wet-lab-render.avif\" loading=\"lazy\" class=\"full-img\"/><div data-w-id=\"b133eb1b-eda9-2cd2-db98-e04db18b7024\" class=\"lens-div\"><div class=\"lens-frame\"><div class=\"plus-div is-lens\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div><div class=\"plus-circle\"></div></div><div style=\"clip-path:circle(50% at 50% 50%)\" class=\"lens\"><img alt=\"\" loading=\"lazy\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e48d810128581f754474d_67f3a4a780e987c289b1410a_wet-lab-construction.avif\" class=\"lens-img\"/></div></div></div></div><div class=\"h-x-small\">WET LAB</div></div><div data-wf--lens-card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6915eb4efa0474911b2ab964_67bc1646d6875b48e506ecf2_workshop-render.avif\" loading=\"lazy\" class=\"full-img\"/><div data-w-id=\"b133eb1b-eda9-2cd2-db98-e04db18b7024\" class=\"lens-div\"><div class=\"lens-frame\"><div class=\"plus-div is-lens\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div><div class=\"plus-circle\"></div></div><div style=\"clip-path:circle(50% at 50% 50%)\" class=\"lens\"><img alt=\"\" loading=\"lazy\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6915eb4e2a2f1c7938a8745e_67f3a4a5c4dc24e5ee0580e6_workshop-construction.avif\" class=\"lens-img\"/></div></div></div></div><div class=\"h-x-small\">PRODUCTION WORKSHOP</div></div></div></section><section data-wf--stat-section--variant=\"xl-top-padding\" class=\"section w-variant-41dda5da-37cf-7651-637f-35312d595621\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">TOTAL SQUARE FOOTAGE OF OXMAN LAB</div></div><div class=\"display-h is-data\">36,000</div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">The Design Studio, Wet Lab, and Production Workshop form the three wings of OXMAN Lab, creating an interconnected space where design, biology, and fabrication coalesce.</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>A tightly integrated and compact infrastructure supports all three programs. Over 25 specialized services, comprising different types of data, power, gasses, and liquids, are embedded within the ceiling and floors.</p><p>‍</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Designed for upgradability and flexibility, this hidden network ensures the studio, lab, and workshop function as a cohesive unit well into the future.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div class=\"d is-card is-xl\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443d57af513e0d9b5586_690bb03ea18d086c19c62a7a_space-combined.avif\" loading=\"lazy\" class=\"full-img\"/><div data-w-id=\"28cc1a32-3aac-0908-704e-fb1fd65977bc\" class=\"lens-div\"><div class=\"lens-frame\"><div class=\"plus-div is-lens\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div><div class=\"plus-circle\"></div></div><div style=\"clip-path:circle(50% at 50% 50%)\" class=\"lens is-xl\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e49c613e8c9f73f616ed8_67f3cdfe469ee6eecabdb2b1_mep-combined.avif\" loading=\"lazy\" class=\"lens-img is-xl\"/></div></div></div></div><div class=\"h-x-small\">A floor plan with an &quot;X-ray&quot; overlay revealing the intricate network of services</div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e4440f486d802aed39666_690bb03ea18d086c19c62c0b_cable-snakes.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Embedded conduits for future upgrades weave in between vibration dampening pads</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443d9ba10bf9e4400c17_690bb03ea18d086c19c62a7b_electrical.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">This is the 100 miles of color-coded cabling enable high throughput and reliable data</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443c772126523b047bcc_690bb03ea18d086c19c62a7c_plumbing.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Plumbed lines deliver a variety of specialized gases and liquids to the rooftop handling units.</div></div></div></section><section data-wf--stat-section--variant=\"xl-top-padding\" class=\"section w-variant-41dda5da-37cf-7651-637f-35312d595621\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">Unique services provided by the building</div></div><div class=\"display-h is-data\">25+</div></div></div></div></section><section data-wf--stat-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">feet of data pathway</div></div><div class=\"display-h is-data\">358,000</div></div></div></div></section><section data-wf--accordion-section--variant=\"xl-top-padding\" class=\"section w-variant-37804a64-5844-0f60-d16f-de83fce15a8f\"><div class=\"container\"><h2 class=\"h-medium\">Site Details</h2><div class=\"accordion-wrap\"><div class=\"accordion-list\"><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">I.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Day One</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Five years ago, the Lab project began as a bold vision, now coming to life through the efforts of a global team of specialized experts. With input from architects, engineers, and creators from across the world, each step has been a testament to the fusion of craft, technology, and design. From the first 3D printed model sent by Foster + Partners to the space&#x27;s inauguration with movement and energy, this journey represents a collaborative effort unlike any other.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"50-minimum\" class=\"d is-card w-variant-c0fc0d54-074c-a5a8-01ff-075c212c3e4f\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443f96bfc78b35577c1f_690bb03ea18d086c19c62b68_cat05725-al-gray.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">3D printed model meets the untouched construction site</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://cdn.oxman.com/video/work/lab/lab_dayonedance_1080.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">A Gaga dance, marking the beginning, infused the space with movement and intention</div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">II.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Site History</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Once a car manufacturing facility, 787 Eleventh Avenue has been transformed into a cutting-edge research center through the vision of Rafael Viñoly Architects. With the building&#x27;s capacity for heavy infrastructure, the building has now become a hub for biomedical research.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443f13e8c9f73f5fd1a9_690bb03ea18d086c19c62b69_787eleventh-sb.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Close-up of the top floors—now home to OXMAN Labs</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443e61c6679c3cc69cd6_690bb03ea18d086c19c62b6a_787eleventh-3-1778x1000.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Street view of 787 showing its transformation into a research facility</div></div></div><div class=\"_4-rem-pad\"></div></div></div></div></div></div></section><section data-wf--video-section--variant=\"s-top-padding\" class=\"full-media-section w-variant-3644f578-175a-5ab7-b4d3-c98607483c63\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/lab/lab_atriumdancers_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Design Studio</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The design studio on the 9th floor offers a dynamic and adaptable space that balances focus and energy. An open workspace connects private offices, meeting rooms, a library, and a gallery system displaying rotating selections from the physical archive. The heart of the studio is a 912 square-foot double-height prototyping and exhibition area, designed to accommodate structures up to 25 feet tall, emphasizing the studio’s commitment to hands-on experimentation and large-scale design.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The space is crafted to be both minimal and dense, offering an ergonomic environment that feels sharp yet quiet. Each element is carefully considered, creating a setting that feels timeless and monastic, yet remains mobile and responsive to shifting needs. This balance of intensity and calm, combined with flexibility, shapes a studio that supports both obsessive focus and dynamic creation.</p></div></div></div></div></section><section data-wf--cards-