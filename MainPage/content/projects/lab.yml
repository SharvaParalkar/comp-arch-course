ea18d086c19c62b7b_pentagram-page-6-result.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Physical Print Guidelines</div></div></div><div class=\"_4-rem-pad\"></div></div></div></div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/lab/lab_dancersswan_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Wet Lab</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The 10th-floor Wet Lab is a modular research zone designed for studies across all kingdoms of life, from single-celled organisms to complex ecologies and hybrid living systems. This Biosafety Level 2+ (BSL-2+) capable lab includes specialized spaces such as a tissue culture room, imaging room, and four advanced environmental grow rooms, each tailored for controlled experimentation. A robotics theater on the same floor supports large-scale robotic collaborations, extending the lab&#x27;s capabilities into the realm of automated, precision-driven research.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The lab features modular, removable benches and storage units are made with details such as stain-resistant seamless surfaces, hidden magnetic fasteners, and integrated plumbed services, that enable a functional and adaptable workbench. A circadian rhythm lighting system enhances the research environment, aligning biological work with natural cycles. The Wet Lab’s combination of cutting-edge equipment and flexible infrastructure fosters a forward-thinking space for experimental research at all scales.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443d819b394e8657c301_690bb03ea18d086c19c62a85_lab.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443d819b394e8657c301_690bb03ea18d086c19c62a85_lab.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">The wet lab is a modular space for biological experimentation across kingdoms of life</div></button></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443d9c02895ce370be54_690bb03ea18d086