 corporate identity. This comprehensive identity spans all touchpoints, from stationery and branding to large-scale exhibitions.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443e2a27f9d80a7c54e3_690bb03ea18d086c19c62b7d_schematics-page-2-result.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Lab Grid Plan</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e4440a136414d7b59dfcf_690bb03ea18d086c19c62b81_pentagram-page-9-result.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Typography Guidlines</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443fa58417c50302d88b_690bb03ea18d086c19c62b80_pentagram-page-7-result.avif\"