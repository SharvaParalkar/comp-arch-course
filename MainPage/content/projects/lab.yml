\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"lab.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">At night, the garden is subtly lit by indirect lighting</div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">V.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Markers</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Mindfulness instead of distraction: A series of architectural glass stickers designed to prevent collision while embodying foundational principles. One set highlights company values and principles, such as &quot;Wisdom x Wonder&quot; and &quot;Growth over Assembly.&quot; Another set draws on the 5S organizational method, emphasizing order and efficiency. A final set invokes Asimov’s Four Laws of Robotics, connecting ethical technology and intelligent design.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e443eed81ae3a1f