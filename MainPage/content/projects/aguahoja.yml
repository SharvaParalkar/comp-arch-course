  class="source"/></video></div></div></div><div class="h-x-small">3D printed chitosan over pectin, a plant
  derivative</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>In Aguahoja I we focused on the development of a robotic platform for 3D printing biomaterials. We
  showed that shape and material composition can be directly informed by physical properties (stiffness and opacity),
  environmental conditions (load, temperature, and relative humidity), and fabrication constraints (degrees-of-freedom,
  arm speed, and nozzle pressure). Each structure in the collection contains a unique combination of organic materials
  whose allocation, texture and distribution within the final object are computationally driven and additively
  manufactured in high resolution. This enables control over specific physical properties and environmental adaptation
  to changing weather conditions.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>In
  contrast to most synthetic materials, structures included in this collection will react to their environment over
  their lifespan, adapting their geometry, mechanical behavior and color in response to fluctuations in heat, humidity,
  and sunlight. Such time-based ‘temporal’ behavior is utilized as a design feature, one that is able to sense, inform
  the user of, and adapt to changing environmental conditions. The robotic fabrication platform is engineered to convert
  cellulose, chitosan, pectin, and other abundant biopolymers, into high-performance sustainable hydrogels that can be
  3D printed into objects for applications spanning scales from millimeters to
  meters.</p></div></div></div></div></section><section data-wf--section-1--variant="s-top-padding" class="section"><div
