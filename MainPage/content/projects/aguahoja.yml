  w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/6972423854491f7eb95bffc1_imgi_24_67bda8c9a855a538b7caa1b3_aguahoja-i-group-photo-jw-img-1526.avif"
  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">Internal view of
  architectural pavilion</div></div></section><section data-wf--section-1--variant="xl-top-padding" class="section
  w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div class="container"><div class="d"><div class="h-x-large">Through
  growth and programmed decomposition, organism-becomes-shelter and shelter-becomes-organism—a bona fide Material
  Ecology.</div></div></div></section><section data-wf--stat-section--variant="xl-top-padding" class="section
  w-variant-41dda5da-37cf-7651-637f-35312d595621"><div class="container"><div class="d"><div class="vert-div"><div
  class="display-eyebrow-div"><div class="h-x-small">Ratio of annual cellulose to plastic production</div></div><div
  class="display-h is-data">200</div></div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding"
  class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Policy</h2></div></div><div class="d"><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>Derived from shrimp shells and fallen leaves, 3D printed by a robot, shaped by water
  and augmented with synthetically engineered organisms or natural pigments, Aguahoja’s biocompatible architectural
  skin-and-shell composites point toward a possible future where the grown and the manufactured unite. Surface features,
  patterns and colors are computationally &#x27;grown&#x27; and additively manufactured with varied mechanical, optical,
  olfactory and gustatory properties, utilizing organic waste streams while preserving ecological
  niches.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>When the biopolymer skins are
  submerged in water, pectin-based elements rapidly dissolve, allowing cellulose- and chitosan-based elements to deform
  and degrade in a controlled ‘programmed’ fashion. The structure’s basic material components are readily decomposed and
  reused by living organisms in order to fuel new growth. Through life and programmed decomposition,
  shelter-becomes-organism as it holds the potential to promote the health of natural resource cycles by such means as
  promoting soil microorganisms and providing nutrients for ‘growing’ buildings—a bona fide Material
  Ecology.</p></div></div></div></div></section><section data-wf--img-section--variant="s-top-padding"
  class="full-media-section w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195"><div class="full-img-frame"><img
