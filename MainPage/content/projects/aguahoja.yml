  (for) Decay: Parametric Material Distribution for Hierarchical Dissociation of Water-based Biopolymer Composites
  (2018)</a></p><p><a
  href="https://cdn.prod.website-files.com/67a0e71b585471299b7a71e9/67e47be4ef5bb1c2ef4c96b9_Designing-the-Ocean-Pavilion.pdf">Designing
