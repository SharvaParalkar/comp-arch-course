  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Biopolymer
  pavilion</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p><strong>Research Team</strong>: Jorge Duro-Royo, Laia Mogas-Soldevilla, Joshua Van Zak, Yen-Ju (Tim)
  Tai, Andrea Ling, Nic Lee, Barrak Darweesh, Daniel Lizardo, Christoph Bader, João Costa, Sunanda Sharma, James C.
  Weaver. Undergraduate Researchers: Joseph Faraguna, Matthew Bradford, Loewen Cavill, Emily Ryeom, Aury Hay, Yi Gong,
  Brian Huang. Prof. Neri Oxman (Aguahoja I). Nic Lee, Joshua Van Zak, Ramon Elias Weber, Joseph Henry Kennedy, Jorge
  Duro-Royo, Christoph Bader, João Costa, Sunanda Sharma, James Weaver. Undergraduate Researchers: Joseph Faraguna,
  Danielle Grey-Stewart, Amelia Wong, Ava Iranmanesh. Prof. Neri Oxman (Aguahoja II)</p></div></div><div class="d
  is-tab-half"><div class="txt-small w-richtext"><p><strong>Year:</strong> 2014-2020</p><p><strong>Location:</strong>
  SFMOMA. 2020. SF, California (Aguahoja I). Cooper Hewitt Smithsonian Design Museum. 2019. NYC, New York (Aguahoja
  II)</p><p><strong>Platform:</strong> Water-Based Digital Fabrication</p></div></div></div></div></section><section
  data-wf--section-1--variant="xl-top-padding" class="section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1"><div
  class="container"><div class="d"><div class="h-x-large">Derived from the sea and returned to the soil, we utilize
  decay as a design feature.</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding"
  class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Position</h2></div></div><div class="d"><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>According to the United Nations Environmental Program (UNEP), over 300 million tons of
  plastic are produced globally each year, leaving harmful imprints on the environment. Less than 10% of this material
  is recycled, while the rest becomes waste, dumped into landfills and oceans; all the while, plastic-based materials
  utilize raw ingredients that are extracted from the earth faster than they can be replenished, and are processed
  through environmentally destructive means. There is another way. Organic structures embody more efficient and
  adaptable material properties compared with human-made ones, and leave no environmental marks. From a limited palette
  of molecular components, including cellulose, chitin, and pectin―the very same materials found in trees, crustaceans
  and apple skins―natural systems construct an extensive array of functional materials with no synthetic
  parallels.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Chitin, for instance,
  manifests in the form of thin, transparent dragonfly wings, as well as in the soft tissue of fungi. Cellulose makes up
  more than half of plant matter planet-wide. These materials, and the living systems they inhabit, outperform human
  engineering not only through their diversity of functions but also through their resilience, sustainability, and
  adaptability. The Aguahoja collection (pronounced: agua-hocha) offers a material alternative to plastic subverting the
  toxic waste cycle through the creation of biopolymer composites that exhibit tunable properties with varied
  mechanical, optical, olfactory and even gustatory properties. These renewable and biocompatible polymers leverage the
  power of natural resource cycles and can be materially ‘programed’ to decay as they return to the earth, for purposes
  of fueling new growth.</p></div></div></div></div></section><section data-wf--stat-section--variant="xl-top-padding"
