  data-wf--img-section--variant="s-top-padding" class="full-media-section
  w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/697242379c85b6cce7f9a3b5_imgi_19_67bda811174abb58ece7ac10_aguahoja-web-18.avif"
  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">A 5-meter long
  structural ‘structural skin’ prototype</div></div></section><section data-wf--section-1-2--variant="xl-top-padding"
  class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div
  class="h-medium-div"><h2 class="h-medium">Product</h2></div></div><div class="d"><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>Standing five meters tall, Aguahoja I is an architectural pavilion composed of the
  most abundant biopolymers on our planet. Its layered structure, known as a bio-composite, is designed as a
  hierarchical network of patterns optimized for structural stability, flexibility and visual connectivity. Combining
  shell-like and skin-like elements, the pavilion’s overall stiffness and strength are designed to withstand changing
  environmental conditions such as heat and humidity while retaining its flexibility.</p></div></div><div class="d
  is-tab-half"><div class="txt-small w-richtext"><p>Over time, with the evaporation of water, the pavilion’s
  skin-and-shell composite transitions from a flexible and relatively weak system to a rigid one that can respond to
  heat and humidity. Upon exposure to rain water, the pavilion’s skin and shell will degrade programmatically, restoring
  their constituent building blocks to the existing ecosystem, augmenting the natural resource cycles that enabled their
  synthesis.</p></div></div></div></div></section><section data-wf--section-1--variant="s-top-padding"
  class="section"><div class="container"><div class="d"><div class="h-x-large">The pavilion is made of 5,740 fallen
  leaves, 6,500 apple skins and 3,135 shrimp shells.</div></div></div></section><section
  data-wf--img-section--variant="s-top-padding" class="full-media-section
  w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195"><div class="full-img-frame"><img
  src="https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/69724237954bd062b79e8a3a_imgi_20_67bda86b3cdb248a8ea76064_aguahoja-2018-pavilion-horizontally-positioned-ocn-process-1.avif"
  loading="lazy" alt="" class="full-img"/></div><div class="caption-div"><div class="h-x-small">The pavilion
  horizontally positioned</div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium"></h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>In
  order to address the destructive impact of climate change and pandemics on a global scale, we must eliminate
  methane-rich production methods and their associated construction technologies. In their place, we must develop and
  deploy robotic manufacturing platforms able to utilize renewable and biodegradable polymers for the design and
  manufacturing of multi-scale structures with complex geometries.</p></div></div><div class="d is-tab-half"><div
  class="txt-small w-richtext"><p>Replacing plastic goods with their bio-polymeric counterparts will enable
  biodegradation or decay for temporary products, and long-lasting properties for structures designed to stand the test
  of time and climate change.</p></div></div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Publications</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p><a
  href="https://oxman.com/files/85c33ef4-ca38-4a13-919a-4ca1df71bf25/Designing-the-Ocean-Pavilion.-Biomaterial-Templating-of-Structural,-Manufacturing,-and-Environmental-Performance-(2015).pdf">Designing
  the Ocean Pavilion: Biomaterial Templating of Structural, Manufacturing, and Environmental Performance
  (2015)</a></p><p><a href="https://dspace.mit.edu/handle/1721.1/123792" target="_blank">Parametric chemistry reverse
  engineering biomaterial composites for additive manufacturing of bio-cement structures across scales
  (2017)</a></p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p><a
  href="https://cdn.prod.website-files.com/67a0e71b585471299b7a71e9/67e47bf20264ecbee5c01671_Parametric-Chemistry.pdf">Parametric
  Chemistry: Reverse-engineering Biomaterial Composite Structures for Robotic Manufacturing (2018)</a></p><p><a
