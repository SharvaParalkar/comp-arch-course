  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium"></h2></div></div><div class="d"><div
  class="d is-tab-half"><div class="txt-small w-richtext"><p>This project points towards a future where we subvert the
  industrial cycle of overproduction and obsolescence through the use of abundant natural materials. Through this
  project we envision the ability to temporarily divert materials from healthy ecosystems, to integrate them in human
  designs, and to enable natural decomposition back into the environment for purposes of fueling new
  growth.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>By enabling digital design and
  fabrication with biopolymers, we aim to devise systems that incentivize the protection and strengthening of ecosystems
  while also providing humans with a new frontier of design and
  production.</p></div></div></div></div></section><section data-wf--cards-section--variant="s-top-padding"
