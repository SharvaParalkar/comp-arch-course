      <p>Mostafa Akbari, Farzaneh Oghazian, Ji Yoon Bae, Felecia Davis, Laia Mogas-Soldevila, Masoud Akbarzadeh</p>

      <p>Bio-Based Composite Spatial Shell Structures</p>

      <p>This research investigates the possibility of fabricating shell-based cellular structures using knitting
      techniques. Shellular Funicular Structures are two-manifold single-layer structures that can be designed in the
      context of graphic statics. These are efficient compression/tension-only structures that have been designed for a
      certain boundary condition. Although the shellular funicular structures are efficient geometries in transferring
      the forces, the fabrication process is challenging due to the geometric complexity of the structure. Since
      Shellular structures comprise a single surface, they are suitable candidates to be fabricated using knitting
      technique, a method by which yarn is manipulated to create a textile or fabric. Using knitting approach, one can
      fabricate shellular structures with minimum production waste in which the knit can work as a formwork for actual
      structure or act as a composite structure combined with bio-based resin. This research proposes a workflow to
      fabricate shellular structures using knitting that can be scaled up for industrial purposes.</p>

      <p>This research was partially funded by University Research Foundation (URF) to Dr. Laia Mogas- Soldevila. This
      research was also funded by the National Science Foundation CAREER Award (NSF CAREER-1944691 CMMI) and the
      National Science Foundation Future Eco Manufacturing Research Grant (NSF, FMRG-CMMI 2037097) to Dr. Masoud
      Akbarzadeh.</p>
