  class="display-h is-data">9000</div></div></div></div></section><section
  data-wf--section-1-2--variant="xl-top-padding" class="section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div
  class="container"><div class="d"><div class="h-medium-div"><h2 class="h-medium">Policy</h2></div></div><div
  class="d"><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Our architectural experiment incorporates
  several technological and biological investigations, and provides a setup for behavioral experiments regarding both
  bee fabrication capabilities and health.</p></div></div><div class="d is-tab-half"><div class="txt-small
