  environment</div></div></div></section><section data-wf--section-1-2--variant="xl-top-padding" class="section
  w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959"><div class="container"><div class="d"><div class="h-medium-div"><h2
  class="h-medium">Process</h2></div></div><div class="d"><div class="d is-tab-half"><div class="txt-small
  w-richtext"><p>The Synthetic Apiary explores the possibility of a controlled space in which seasonal honeybees can
  thrive year-round. Light, humidity, and temperature are engineered to simulate a perpetual spring
  environment.</p></div></div><div class="d is-tab-half"><div class="txt-small w-richtext"><p>Bees are provided with
  synthetic pollen and sugared water, and evaluated regularly for health and well-being. In this initial experiment,
  humans and honeybees co-habitate, enabling natural cultivation in an artificial space across scales, from organism- to
  building-scale.</p></div></div></div></div></section><section data-wf--masonry-section--variant="s-top-padding"
