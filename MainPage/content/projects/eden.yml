main_html: "<div><header data-wf--hero-section-project--variant=\"black-on-white\" class=\"section is-hero\"><div class=\"container is-hero-60\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><div class=\"eyebrow-txt\">Project<br/></div></div><h1 class=\"display-h\">EDEN</h1></div></div></div></header><section data-wf--video-section--variant=\"no-top-padding\" class=\"full-media-section\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_animationecosystems_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">Buildings as ecosystems</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Terraforming with, for, and by Nature</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Can buildings rewild ecosystems? Can we promote the biodiversity, resilience, and productivity of ecosystems for the mutual empowerment of humans and Nature? We present a data-driven design approach to uniting human-centric cultural typologies with Nature-centric needs to maximize ecological thriving.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Research team:</strong> Christoph Bader, Nic Lee, Neri Oxman, Khoa Vu, Tim Tai, Nitzan Zilberman</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/o0/o0_diagram_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">oxman work across scales</div></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e8c978865f902945b50de_67bc26053802d64c26482790_group-1211.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696e8c978865f902945b50de_67bc26053802d64c26482790_group-1211.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">EDEN IN RELATION TO OTHER SCALES</div></button></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>While the five kingdoms of life thrive in the full spectrum of environmental conditions, buildings are designed for the comfort of human inhabitants: controlled environments that reject bacteria, fungi, and all but a few plant species. The result is a narrative of displacing non-humans to create human spaces. Recognizing that humans could not survive without non-humans—plants produce 100% of the oxygen we breathe—EDEN reverses the narrative, instead moving us toward a future of direct collaboration and cohabitation with Nature.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The EDEN research and design platform considers buildings as ecosystems rather than objects in space. In this view, any decision associated with the building’s design and its incorporation on site has a direct impact on the local ecosystem. In contrast to ‘net-zero’ construction, which aims to minimize negative impact on an architectural site, we seek to maximize ecological well-being through new forms of ecosystem construction with value to the natural world, across kingdoms.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5fd0a76529a9f1b7a_imgi_2_67bc317c8d8e1b551edb4918_group-1266.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5fd0a76529a9f1b7a_imgi_2_67bc317c8d8e1b551edb4918_group-1266.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">NON-HUMANS OCCUPY TEMPERATE ENVIRONMENTS</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd4382cb7ecab7d8db2_imgi_3_67bc317ccd6eba7021fd9e1a_group-1267.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd4382cb7ecab7d8db2_imgi_3_67bc317ccd6eba7021fd9e1a_group-1267.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">HUMANS CONSTRUCT Controlled ENVIRONMENTS</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5d2d677b11765e1e7_imgi_4_67bc317c202fa4e1769ac525_group-1268.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5d2d677b11765e1e7_imgi_4_67bc317c202fa4e1769ac525_group-1268.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">WE HAVE THE ABILITY TO BUILD SHARED ENVIRONMENTS</div></button></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>In this approach, the combination of building and site should elevate and even augment the ecological impact of the building on the site, compared with the ecological contributions of the site on its own.\LEDEN aims to create a new paradigm in architectural design, entitled “Ecological Programming”. An ecological program is like an architectural program in that it determines space and adjacency needs, yet it focuses on these requirements through the common denominators that enable all life on Earth to thrive.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Working across scales and harnessing recent developments across disciplines—from generative artificial intelligence (AI) and reinforcement learning to architectural design, landscape urbanism, and applied ecology—we can address the complex challenges of designing architectural structures that not only meet the needs of human occupants but also promote biodiversity, ecosystem resilience, and the performance of critical ecosystem services.</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">One building. An endless ecosystem.</div></div></div></section><section data-wf--video-section--variant=\"s-top-padding\" class=\"full-media-section w-variant-3644f578-175a-5ab7-b4d3-c98607483c63\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_generativeoptimization_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">GENERATIVE OPTIMIZATION MODELS THE MOST BIODIVERSE LAYOUT OF A SITE</div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Position</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Architecture and ecology have since biblical times experienced an inverse relationship: the art of space and place-making comes at the price of environmental well-being. As the fields of architecture and urban design prioritize human users and inhabitants, we seek instead to maximize ecological resilience and propose that human-made spatial environments can and should augment—perhaps even reincarnate—natural ones as ecosystems thriving across eras, meridians, and species. By neglecting non-human agents and ecosystems, modern-day building and planning practices contribute to habitat loss, environmental pollution, and biodiversity loss.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>As urban populations expand and climate shifts, preserving and promoting thriving ecosystems holds the secret to flourishing civilizations. When integrated, landform and biota elevate the net positive ecological impact of the site, tackling both the biodiversity and climate crises while increasing ecosystem resilience, and thereby promoting socio-ecological sustainability.</p></div></div></div></div></section><section data-wf--stat-section--variant=\"xl-top-padding\" class=\"section w-variant-41dda5da-37cf-7651-637f-35312d595621\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">EST. NUMBER OF HECTARES OF DEGRADED LAND WORLDWIDE</div></div><div class=\"display-h is-data\">3B</div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">OXMAN presents a generative design process that unites human-centric cultural typologies with Nature-centric needs to maximize ecological thriving.</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>In contrast to &#x27;net-zero&#x27; construction, which aims to minimize negative impact, we seek to maximize ecological well-being through new forms of ecological construction with value across kingdoms.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>When integrated, landform and biota elevate the net positive ecological impact of the site more than the landform on its own, tackling both the biodiversity and climate crises while increasing ecosystem resilience thereby promoting socio-ecological sustainability.</p></div></div></div></div></section><section data-wf--img-section--variant=\"s-top-padding\" class=\"full-media-section w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5b9ca5f6ffd0698d6_imgi_5_67bc32569ce022158510e601_architectural-model.avif\" loading=\"lazy\" alt=\"\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">Ecological Programming leverages architectural design, generative AI, landscape urbanism, reinforced learning, and APPLIED ecology</div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Platform</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The EDEN platform is a computational framework for data-driven cross-scale generative design guided by rapid environmental simulation and generative optimization. State-of-the-art AI tools employ site-specific data to analyze and produce a vast array of architectural designs.</p></div></div></div></div></section><section data-wf--stat-section--variant=\"xl-top-padding\" class=\"section w-variant-41dda5da-37cf-7651-637f-35312d595621\"><div class=\"container\"><div class=\"d\"><div class=\"vert-div\"><div class=\"display-eyebrow-div\"><div class=\"h-x-small\">AVERAGE NUMBER OF SITE CONFIGURATIONS EXPLORED</div></div><div class=\"display-h is-data\">60,000</div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Generative optimization and rapid environmental simulation enable the generation and optimization of structures, landscapes, and urban layouts designed for ecological well-being.</div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_generativeoptimizationvertical_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Generative optimization applied on a vertical structure</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_generativeoptimizationhorizontal_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">Generative optimization applied on a horizontal structure</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>In contrast to the typical top-down process of architectural and urban design, our platform offers a bottom-up computational design approach whereby policies are established to guide the form generation process to achieve specific, measurable design objectives along three axes of environmental impact: biodiversity, resilience, and ecosystem services.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The platform enables the generation of complete 3D structures as a direct output to the process of simultaneously computing a vast array of parameters, thereby promoting a single solution that addresses a wide range of requirements and challenges. In this way, products, or buildings—including their shapes and behaviors—can be “learned” from their environmental context and corresponding interactions.</p></div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">We present three approaches to implementing generative optimization: distribution based, neural-field based, and diversity-search based generative optimization.</div></div></div></section><section data-wf--accordion-section--variant=\"xl-top-padding\" class=\"section w-variant-37804a64-5844-0f60-d16f-de83fce15a8f\"><div class=\"container\"><h2 class=\"h-medium\">Platform Details</h2><div class=\"accordion-wrap\"><div class=\"accordion-list\"><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">I.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Distribution-based Generative Optimization</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Distribution-based generative optimization can be applied to discrete data sets like mesh objects, point clouds, and vector fields, creating configurations that are iteratively optimized toward specific goals. In the animation, a vector field directs the flow of objects toward target points along an arbitrary surface.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_distributionbased_1_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_distributionbased_2_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">II.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Neural-Field Based Generative Optimization</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Neural-field based generative optimization uses implicit representations to translate arbitrary inputs into outputs, enabling optimization across entire contour fields rather than just specific points. In the animation, a neural-field defines three-dimensional objects, evaluates their curvature, and optimizes them for maximal curvature.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_neural-fieldbased_1_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_neural-fieldbased_2_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">III.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Diversity-searched based General Optimization</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>The third application of generative optimization focuses on exploring a complex design space rather than producing a single optimal design. In the animation, a generative optimization system maps the relationships between low- and high-frequency features of objects while optimizing them for maximal area and curvature.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd59184f155cac724bd_imgi_6_67d1d48478907a8f3fef1684_part-01.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_diversity-searchedbased_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">IV.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Rapid Environmental Simulation</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Rapid environmental simulations are a novel class of tools that enable designers to assess the impact of design decisions on environmental processes in real time, adapting to various contexts from residential homes to urban centers. By integrating with optimization frameworks, these tools support data-driven approaches that enhance airflow management, runoff drainage, and sunlight exposure for local plant species.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_rapidenvironmentalsimulation_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">V.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Capsules</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>The Capsule provides a controlled environment that simulates designed ecologies, allowing researchers to determine the effects of biotic and abiotic factors on plant growth across different ecosystems, regardless of location or climate. Integrated AI and bio-sensing platforms enable real-time measurement and autonomous adjustment of growing conditions, informing rapid environmental simulations and generative optimization workflows to enhance the design process.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5d8751aacacda2c00_imgi_7_67d1d4c2ad9dfaa20db86f37_2024-014-07-0016.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691b4f738558a789790369f5_67d1deee4160d66143d74561_2024-014-05-0566.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div></div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Project</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Pushing the boundaries of conventional architectural and urban design, we present studies for ecologically programmed environments, from small-scale pavilions to large-scale towers. \L\LIn these studies, we explore a vast array of spatial and species distributions that prioritize a site’s biodiversity, resilience, and ecosystem services, aiming for positive environmental occupancy impacts.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The goals of each distribution strategy are based on the needs of the site, such as the remediation of polluted landscapes or the creation of protective habitats for keystone species.\L\L Once deployed in the wild, on-site data related to species count and abundance, soil composition, climate, and atmosphere are continuously gathered in order to inform additional design decisions that will further improve the site’s health and overall performance.</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Nature-centric structures across scales.</div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_towerpan_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">THE EDEN TOWER IS A CASE STUDY IN VERTICAL ECOLOGIES</div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5d6f2d60545c4614e_imgi_9_67bc33962f10541f21e20924_2024-027-0243.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div><div class=\"h-x-small\">A DESIGN HARMONIZING HUMAN AND ECOLOGICAL PROGRAM</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The EDEN studies unfold in two phases: data collection and design generation. In the first phase, we gather large quantities of data associated with the biology, behavior, and ecological requirements of various plant and animal species, as well as data associated with environmental conditions and ecosystem interactions of a chosen site. This information provides the foundation for the computational design framework—a “computational rulebook”—revealing insights and increasing our understanding of the unique requirements and characteristics of the targeted ecosystems.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>In the second phase, we apply generative optimization to the gathered data to explore the vast solution space of architectural configurations. Generative algorithms then iteratively refine the potential solutions to maximize ecological well-being while ensuring that human needs are met and minimizing resource use. Factors considered as part of the optimization process include environmental conditions, habitat connectivity, resource availability, ecosystem stability, and the provision of specific ecosystem services such as carbon sequestration or air purification.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5af99ed1e0536f83e_imgi_10_67bc341c8e1e9279323ff785_group-1327.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5af99ed1e0536f83e_imgi_10_67bc341c8e1e9279323ff785_group-1327.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">INITIAL SKETCHES FOR the EDEN TOWER</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5b16a084af2a4cd3b_imgi_11_67bc341ccafa2b39e20c4c1f_group-1339.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5b16a084af2a4cd3b_imgi_11_67bc341ccafa2b39e20c4c1f_group-1339.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">INITIAL SKETCHES FOR THE EDEN PAVILION</div></button></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">A tower that is computationally grown and ecologically programmed.</div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Tower Scale</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Can a tower act as the infrastructure for the delivery of regulating and provisioning of cultural ecosystem services to the city it resides in? With more than half of the entire human population residing in tall and dense urban environments, we ask how space and place-making in high-rise typologies can augment rather than degrade ecological services.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The EDEN Tower proposes a novel vertical typology whose urban footprint is minimized while ecological surface area is maximized. Structural, programmatic, and ecological elements are integrated as part of a single organizational system. The system centers on a primary truss level that functions as both a stabilizing structure and a suspension mechanism, supporting the four lighter lower levels while anchoring the heavier ecosystems positioned above.</p></div></div></div></div></section><section data-wf--img-section--variant=\"s-top-padding\" class=\"full-media-section w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691c9a84ea9a003145c89ff3_67d1d553e60777f9c60b1f13_eden-exterior-view-01-fn-2.avif\" loading=\"lazy\" alt=\"\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">THE CENTRAL LEVELS OF THE EDEN TOWER</div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd50a51cdaedf00304b_imgi_13_67d1d57ec11682ffc0093659_group-1326.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd50a51cdaedf00304b_imgi_13_67d1d57ec11682ffc0093659_group-1326.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">INITIAL SKETCHES FOR the EDEN TOWER</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5b0d17d641dd68be2_imgi_14_67d1d57e62b07647668e1f95_group-1330.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5b0d17d641dd68be2_imgi_14_67d1d57e62b07647668e1f95_group-1330.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div></button></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Tower Scale</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Grassland and forest ecosystems growing on the tower’s exterior manage regulating services for natural processes such as thermal buffering and carbon sequestration. Natural water reservoirs emerge in the sloped and curved surfaces, enhancing the biodiversity of the ecosystem.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Transparent interior spaces facilitate human-centered cultural services such as recreation and education. Interstitial zones host services for provisioning material resources such as timber from a young forest, fibrous materials from open fields, and foraging and pollination processes in flower meadows.</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">We seek to create human-centric structures that enable Nature-centric abundance.</div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd52e7a9d35eb55d6d4_imgi_15_67bc3506cd0d596b850e3b33_group-1351.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd52e7a9d35eb55d6d4_imgi_15_67bc3506cd0d596b850e3b33_group-1351.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">Structural &amp; Programmatic Logic</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5efff76ba30e6df58_imgi_16_67bc35064307addd1f7a51ac_eden-tower-site-model.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5efff76ba30e6df58_imgi_16_67bc35064307addd1f7a51ac_eden-tower-site-model.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">tower in context</div></button></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The deliberate design of functional space creates a co-dependency between human and non-human systems. While the tower provides an infrastructure for ecosystems to flourish, the ecologies, in turn, generate essential ecosystem services that support human life, fostering a symbiotic relationship between the natural and the constructed, the human and the non-human.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The EDEN Tower showcases the ability of ecological programming to maximize a site’s biodiversity, resilience, and ecosystem services, while also acting as a public gathering space. Insights generated from this initial structure will inform future design interventions at the architectural scale.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5d6f2d60545c46166_imgi_17_67d1d5eef0c31c928c65ed72_group-1364.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd5d6f2d60545c46166_imgi_17_67d1d5eef0c31c928c65ed72_group-1364.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">RAPID ENVIRONMENTAL SIMULATION INFORMED ECOLOGY DISTRIBUTION</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd56b1e6da1eb44b140_imgi_18_67d1d5eeb1c9f27a33ebafd1_group-1363.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd56b1e6da1eb44b140_imgi_18_67d1d5eeb1c9f27a33ebafd1_group-1363.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">principal stress guided STRUCTURAL ELEMENTS distribution</div></button></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd66037d05de9bc1440_imgi_19_67bc357c748e99585a953d56_group-1360.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd66037d05de9bc1440_imgi_19_67bc357c748e99585a953d56_group-1360.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">FLOOR PLAN IN A CONSTRUCTED grotto</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd631c0abc3113ce2c7_imgi_20_67bc357ccd09af04ab82b087_group-1359.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd631c0abc3113ce2c7_imgi_20_67bc357ccd09af04ab82b087_group-1359.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">FLOOR PLAN IN A CONSTRUCTED meadow</div></button></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">Computational decision-making algorithms applied to ecosystem engineering.</div></div></div></section><section data-wf--img-section--variant=\"s-top-padding\" class=\"full-media-section w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd7cbba4d60b2e3f045_imgi_21_67bc35bcfee50c99c2d133bf_eden-tower-combine.avif\" loading=\"lazy\" alt=\"\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">IMAGES OF PHYSICAL MODEL</div></div></section><section data-wf--accordion-section--variant=\"xl-top-padding\" class=\"section w-variant-37804a64-5844-0f60-d16f-de83fce15a8f\"><div class=\"container\"><h2 class=\"h-medium\">Generative Optimization for the EDEN Tower</h2><div class=\"accordion-wrap\"><div class=\"accordion-list\"><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">I.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Environmental Analysis</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Generative optimization for the EDEN Tower proceeds in two steps. First, the global geometry of the structure is transformed to create zones of direct sunlight, partial shade, and shade in specified quantities.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_environmentalanalysis_1_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_environmentalanalysis_2_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">II.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Species Distribution</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Next, these ecological niches are populated with local species according to specific ecosystem services to be provided by each floor. Neural-field based generative optimization specifies the location of every species on the tower according to its needs for sunlight and water, all while optimizing towards increased biodiversity and the provision of the specified ecosystem services.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_speciesdistribution_1_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div><div data-wf--card--variant=\"33-minimum\" class=\"d is-card\"><div class=\"card-img-frame\"><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_speciesdistribution_2_720p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div></div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Pavilion Scale</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Beneath a pastoral English landscape of manicured gardens, we discover an origin story of spatial control and species manipulation, where the sumptuous art of monoculture has overtaken the dignified practice of biodiversity. The earliest records of the native ecosystem comprising this site are documented in the Celtic Ogham alphabet, where each ancient letter corresponds to a sacred plant.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>In this design proposal for a small-scale architectural pavilion, we seek to resurrect a landscape that has been lost to a millennium of human-centric design. The EDEN Pavilion begins its life in a state of carbon negativity. It continues to sequester more and more carbon dioxide as it grows and stabilizes, over its lifetime and into its afterlife. In doing so, it nourishes an ecosystem where landscape augments architecture, architecture renews landscape, and human and ecological programs intertwine through nutrient cycles and energy flows.</p></div></div></div></div></section><section data-wf--img-section--variant=\"s-top-padding\" class=\"full-media-section w-variant-e7fc8910-70b6-9897-b6b4-c56fc297e195\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd6d0b661dac8a264fa_imgi_22_67bc364d4061d279c78121a7_group-1365.avif\" loading=\"lazy\" alt=\"\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">Plan view of pavilion</div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Rooted in permaculture principles and the art of Hügelkultur, the material system—deployed across material, structural, spatial, and environmental modalities—involves the construction of elevated mounds using decomposing wood. This technique emulates the forest nutrient cycling processes, whereby fallen trees become ‘nurse logs’ that support other plants by providing a platform for root attachment and nutrient release as they gradually degrade.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>One tree in the Ogham, Ash, now faces catastrophic decline due to the spread of invasive fungi. The tree’s death threatens to release stored carbon, accelerating the destabilization of ecosystems. By burying a sub-structure of infected ash trees, we not only provide a physical structure for the pavilion’s architecture but also trap stored carbon, providing a carbon-negative foundation for the structure that is augmented by the sequestration of atmospheric carbon by the plants it supports.</p></div></div></div></div></section><section data-wf--cards-section--variant=\"s-top-padding\" class=\"section\"><div class=\"container is-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd61e8d0a85c9849db7_imgi_23_67bc36a8736549bb52f1d8aa_group-1355.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd61e8d0a85c9849db7_imgi_23_67bc36a8736549bb52f1d8aa_group-1355.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">ELEVATED DECOMPOSED WOOD MOUNDS ACT AS FOUNDATION</div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd64eac29ed2de5764a_imgi_24_67bc36b08f477966acdfaa3a_group-1358.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd64eac29ed2de5764a_imgi_24_67bc36b08f477966acdfaa3a_group-1358.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div><div class=\"h-x-small\">THE HUGELKUTUR TEHCNIQUE IS DEPLOYED TO INCREASE CARBON SEQUESTRATION</div></button></div></div></section><section data-wf--img-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd6dd803024251094ba_imgi_25_67bc36cade97ed14828611ca_eden-0125.avif\" loading=\"lazy\" alt=\"\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">INTERIOR VIEW OF THE EDEN PAVILION</div></div></section><section data-wf--accordion-section--variant=\"xl-top-padding\" class=\"section w-variant-37804a64-5844-0f60-d16f-de83fce15a8f\"><div class=\"container\"><h2 class=\"h-medium\">Generative Optimization for the EDEN Pavilion</h2><div class=\"accordion-wrap\"><div class=\"accordion-list\"><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">I.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Environmental Analysis and Distribution</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>Sunlight and rainfall are simulated for a typical year at the site of the EDEN Pavilion. Ecological niches or “zones” are then constructed based on simulated environmental factors and local soil conditions.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd616a3ad8f44bbf010_imgi_26_67d1db4039251077699fd939_frame-10.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd616a3ad8f44bbf010_imgi_26_67d1db4039251077699fd939_frame-10.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd676ddacb525a984e1_imgi_27_67d1db405baf3fb5522f656e_frame-9.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd676ddacb525a984e1_imgi_27_67d1db405baf3fb5522f656e_frame-9.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div></button></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-item\"><div data-w-id=\"172e6590-7a8e-0388-bfcd-a75630fd8d18\" class=\"accordion-h-div\"><div class=\"d\"><div class=\"accordion-nb-txt\">II.</div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-h-txt\">Species Distribution</div></div><div class=\"d is-tab-half\"><div class=\"plus-div\"><div class=\"plus-line\"><div class=\"plus-line is-90\"></div></div></div></div></div></div><div class=\"accordion-body-div is-txt\"><div class=\"container\"><div class=\"d is-pad-only\"></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>To determine the species layout, density, and distribution of plants throughout the site, we created a computational &#x27;rulebook&#x27; that integrates both extrinsic and intrinsic parameters influenced by the spatial environment. This design system optimizes for three objectives: enhancing biodiversity, maximizing carbon storage, and promoting long-term growth and resilience by considering energy distribution and soil chemistry.</p></div></div></div><div class=\"d is-tab-half\"><div class=\"accordion-content-d\"><div class=\"txt-small w-richtext\"><p>‍</p></div></div></div></div><div class=\"_4-rem-pad\"></div></div></div><div class=\"accordion-body-div\"><div class=\"nested-slot\"><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd655a368ae1c808059_imgi_28_67d1db6bfd69d8792eae45c3_frame-13.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd655a368ae1c808059_imgi_28_67d1db6bfd69d8792eae45c3_frame-13.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div></button></div><div data-wf--lightbox-card--variant=\"33-minimum\" class=\"d is-card\"><button class=\"lightbox-button\"><div class=\"card-img-frame\"><div class=\"lightbox\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd61e8d0a85c9849dcf_imgi_29_67d1db6be82603715b4c6d85_frame-12.avif\" loading=\"lazy\" alt=\"\" class=\"lightbox-img\"/></div><img alt=\"\" src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd61e8d0a85c9849dcf_imgi_29_67d1db6be82603715b4c6d85_frame-12.avif\" loading=\"lazy\" class=\"full-img\"/><div class=\"bg-video-wrap\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></div><div class=\"cursor-plus is-mobile\"><div class=\"cursor-line\"><div class=\"cursor-line is-90\"></div></div></div></div></button></div></div><div class=\"_4-rem-pad\"></div></div></div></div></div></div></section><section data-wf--section-1-2--variant=\"xl-top-padding\" class=\"section w-variant-4090b5ce-0c1f-9c1e-4a64-5d7858e37959\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\">Praxis</h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Terrestrial and marine environments sequester over half of our greenhouse gas emissions each year—the single most effective mitigation of climate change on Earth (Friedlingstein 2020). As climate change intensifies, applying ecological programming to design and restoring biodiverse ecosystems with multiple layers of resilience can promote their reliable provision of ecosystem services over time, ensuring the long-term health of both humans and the natural world.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The ideal ecosystem cultivates relationships between organisms and their environment sustaining the system’s long-term health, as marked by its biodiversity, resilience, and productivity. Fungal networks decompose fallen leaves in deciduous forests; ground cover shrubs reach for sunlight that filters through a canopy.\LThe effective provision of services is closely linked to an ecosystem’s overall biodiversity and resilience. Diverse ecosystems are more effective at leveraging the energy available to them, which in turn, reinforces their productivity.</p></div></div></div></div></section><section data-wf--section-1--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">We seek a future where buildings and cities are designed as ecosystems.</div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_solarpanels_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">3D SOLAR PANEL ORIENTATION AND DISTRIBUTION OPTIMIZATION</div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Shown above is an example of generative optimization on a field of 2,000 solar panels. Over several hundred iterations, the position and orientation of every solar panel is optimized to maximize annual solar exposure and energy production.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Neural-field based generative optimization is implemented to train a continuous function that outputs the optimal orientation at every position on the terrain.</p></div></div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_biodiversitymaximization_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">CASE II.A: LANDSCAPE BIODIVERSITY MAXIMIZATION</div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>An application of neural-field based generative optimization in conjunction with rapid environmental simulation to maximize biodiversity on a one-hectare site, while ensuring that plants receive adequate sunlight and water.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Structural elements and large trees are designated as fixed elements which are optimized around. Over time, the system increases biodiversity while decreasing the number of plants receiving inadequate sunlight and water.</p></div></div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_carbonnegativity_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">CASE III: DIVERSITY SEARCH FOR CARBON NEGATIVITY</div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>An example of diversity-search-based generative optimization exploring the relationship between greenspace, structural layout, and operational carbon emissions for a simplified master plan.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>A procedural system creates simplified massing structures and layouts of greenspace. Rapid environmental simulations of sunlight, wind, and rain are then used to model building surface temperatures and estimate daily operational energy budgets. The system outputs a data set exploring the relationships between design parameters.</p></div></div></div></div></section><section data-wf--video-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-2aab7fab-4744-70b4-a25c-97b8c77335f4\"><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"https://oxman.b-cdn.net/video/work/eden/eden_reinforcementlearning_1080p.mp4\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div><div class=\"caption-div\"><div class=\"h-x-small\">MULTI AGENT REINFORCEMENT LEARNING</div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>The fourth method of generative optimization operates on the behavior of agents and policies. Reinforcement learning based generative optimization tunes the behaviors of semi-autonomous systems over time, directing them towards designed objectives.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>In the animation above, a system optimizes a simulated phytoremediation strategy to maximize ecosystem stability during the remediation process.</p></div></div></div></div></section><section data-wf--section-1--variant=\"xl-top-padding\" class=\"section w-variant-6a1ea14f-8362-e228-ff29-de9328c3d4e1\"><div class=\"container\"><div class=\"d\"><div class=\"h-x-large\">It would take just one 1.5 acres of productive forest to offset the operational carbon emissions of an average residential home every year, forever</div></div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>While much of architectural innovation today focuses on improving operational energy costs to achieve sustainability, we see the solution in the forest.</p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>By shifting the focus from purely human-centric approaches to ones that recognize the interconnectedness of all living beings, we seek to promote a sustainable and flourishing future for our planet across all kingdoms of life.</p></div></div></div></div></section><section data-wf--img-section--variant=\"xl-top-padding\" class=\"full-media-section w-variant-448bce46-13b7-b53b-661f-9b1e61ff4ebc\"><div class=\"full-img-frame\"><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/696fcfd6cfa587dcd29d7b80_imgi_30_67bc37fe96226133340b2fa0_eden-exterior-view-02-fn-3.avif\" loading=\"lazy\" alt=\"\" class=\"full-img\"/></div><div class=\"caption-div\"><div class=\"h-x-small\">interior view of eden tower</div></div></section><section data-wf--section-1-2--variant=\"s-top-padding\" class=\"section\"><div class=\"container\"><div class=\"d\"><div class=\"h-medium-div\"><h2 class=\"h-medium\"></h2></div></div><div class=\"d\"><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p><strong>Credits:</strong></p></div></div><div class=\"d is-tab-half\"><div class=\"txt-small w-richtext\"><p>Consultants: Voxeljet, VA-Arts, Salehi / Kushi Studio</p><p>Acknowledgments: Photography: Nicholas Calcott, Phillip Le; Technical Advisor: Jun Sato; Tobias Wallisser</p></div></div></div></div></section><footer class=\"next-project-section\"><div class=\"section is-next-project-heading\"><div class=\"container\"><div class=\"d\"><div class=\"d100\"><div class=\"display-eyebrow-div\"><h2 class=\"eyebrow-txt\">Next Project<br/></h2></div><div class=\"display-h\">0°</div></div></div></div></div><a data-w-id=\"e1127ab3-d257-ec54-b547-677dcc014cb2\" href=\"o0.html\" class=\"next-project-link w-inline-block\"><div class=\"cursor-arrow is-mobile\"><div class=\"arrow-icon w-embed\"><svg width=\"100%\" height=\"100%\" viewBox=\"0 0 48 48\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n<path d=\"M4.70703 1L46.707 1L46.707 43\" stroke=\"white\" stroke-width=\"2\"/>\n<path d=\"M0.707031 47.2498L46.707 1.24977\" stroke=\"white\" stroke-width=\"2\"/>\n</svg></div></div><img src=\"https://cdn.prod.website-files.com/690e0b6e2e2a0cbc45ab116e/691c9a84e635ba088b31ae6f_67ab8adf146f79e5cde52ec9_hell-print.avif\" loading=\"lazy\" alt=\"0°\" class=\"abs-img\"/><div class=\"video-aspect-box\"><video loading=\"eager\" preload=\"metadata\" title=\"\" loop=\"\" playsinline=\"true\" muted=\"\" autoplay=\"true\" class=\"video-element\"><source src=\"eden.html\" type=\"video/mp4\" data-resolution=\"720p\" data-format=\"mp4\" class=\"source\"/></video></div></a></footer></div>"
