backend:
  name: github
  repo: SharvaParalkar/comp-arch-course
  branch: main
  base_url: https://cms-auth.sharvaparalkar.workers.dev
  auth_endpoint: /auth

site_url: https://calab.net/structure
display_url: https://calab.net/structure

media_folder: "course-structure/static/img"
public_folder: "/structure/img/"
publish_mode: simple

media_library:
  name: cloudinary
  config:
    cloud_name: dbf3aqsxu
    api_key: 251365553116344
    default_transformations:
      - - fetch_format: auto
          quality: auto

collections:
  # ── Welcome ────────────────────────────────────────────────────────
  - name: welcome
    label: Welcome
    files:
      - label: Welcome Page
        name: welcome_page
        file: course-structure/docs/welcome/index.mdx
        fields:
          - { label: "Title", name: title, widget: string }
          - { label: "Body", name: body, widget: markdown }

  # ── Lectures ─────────────────────────────────────────────────────
  - name: lectures
    label: Lectures
    label_singular: Lecture
    folder: course-structure/docs/lectures
    preview_path: "docs/lectures/{{slug}}"
    identifier_field: title
    extension: md
    create: true
    slug: "{{slug}}"
    summary: title
    sortable_fields: ["sidebar_position", "title", "date"]
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Lecture Number", name: sidebar_position, widget: number, default: 1 }
      - label: "Week"
        name: week
        widget: select
        required: false
        options:
          - { label: "Week 1", value: "week-1" }
          - { label: "Week 2", value: "week-2" }
          - { label: "Week 3", value: "week-3" }
          - { label: "Week 4", value: "week-4" }
          - { label: "Week 5", value: "week-5" }
          - { label: "Week 6", value: "week-6" }
          - { label: "Week 7", value: "week-7" }
          - { label: "Week 8", value: "week-8" }
          - { label: "Week 9", value: "week-9" }
          - { label: "Week 10", value: "week-10" }
          - { label: "Week 11", value: "week-11" }
          - { label: "Week 12", value: "week-12" }
          - { label: "Week 13", value: "week-13" }
          - { label: "Week 14", value: "week-14" }
          - { label: "Week 15", value: "week-15" }
      - label: "Date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false
        required: false
      - label: "Topic"
        name: topic
        widget: select
        required: false
        options:
          - { label: "Graphic Statics", value: "graphic-statics" }
          - { label: "Shellular Optimization", value: "shellular" }
          - { label: "Biological Growth", value: "biological-growth" }
          - { label: "Granular Jamming", value: "granular-jamming" }
          - { label: "Guest Lecture", value: "guest" }
          - { label: "Workshop", value: "workshop" }
          - { label: "Review", value: "review" }
          - { label: "Critique", value: "critique" }
      - label: "YouTube Video ID"
        name: youtube_id
        widget: string
        required: false
        hint: "Paste just the video ID from the YouTube URL (e.g. dQw4w9WgXcQ)"
      - label: "Slides"
        name: slides_url
        widget: string
        required: false
        hint: "Link to slides (Google Slides, PDF, etc.)"
      - label: "Related Course Notes"
        name: related_docs
        widget: relation
        collection: course_notes
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false
        multiple: true
      - label: "Downloads"
        name: downloads
        widget: list
        required: false
        hint: "Attach files for students to download"
        fields:
          - { label: "Label", name: label, widget: string }
          - { label: "File", name: file, widget: file }
      - { label: "Body", name: body, widget: markdown }
      - label: "Code Example"
        name: code_example
        widget: object
        required: false
        collapsed: true
        fields:
          - label: "Language"
            name: language
            widget: select
            required: false
            options:
              - { label: "Python", value: "python" }
              - { label: "GHPython", value: "python" }
              - { label: "JavaScript", value: "javascript" }
              - { label: "C#", value: "csharp" }
              - { label: "Bash", value: "bash" }
          - label: "Code"
            name: code
            widget: code
            required: false
            default_language: python
            allow_language_selection: true

  # ── Assignments ──────────────────────────────────────────────────
  - name: assignments
    label: Assignments
    label_singular: Assignment
    folder: course-structure/docs/assignments
    preview_path: "docs/assignments/{{slug}}"
    identifier_field: title
    extension: md
    create: true
    slug: "{{slug}}"
    summary: title
    sortable_fields: ["sidebar_position", "title", "due_date"]
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Assignment Number", name: sidebar_position, widget: number, default: 1 }
      - label: "Due Date"
        name: due_date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false
        required: false
      - label: "Status"
        name: status
        widget: select
        options:
          - { label: "Upcoming", value: "upcoming" }
          - { label: "Active", value: "active" }
          - { label: "Past Due", value: "past-due" }
        default: "upcoming"
      - label: "Related Lecture"
        name: related_lecture
        widget: relation
        collection: lectures
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false
      - label: "Submission Link"
        name: submission_url
        widget: string
        required: false
        hint: "Link to submission form or portal"
      - label: "Downloads"
        name: downloads
        widget: list
        required: false
        fields:
          - { label: "Label", name: label, widget: string }
          - { label: "File", name: file, widget: file }
      - { label: "Body", name: body, widget: markdown }

  # ── Course Notes ─────────────────────────────────────────────────
  - name: course_notes
    label: Course Notes
    label_singular: Course Note
    folder: course-structure/docs/course-notes
    preview_path: "docs/course-notes/{{slug}}"
    identifier_field: title
    extension: md
    create: true
    slug: "{{slug}}"
    summary: title
    sortable_fields: ["sidebar_position", "title", "topic"]
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Sidebar Position", name: sidebar_position, widget: number, default: 2 }
      - label: "Description"
        name: description
        widget: string
        required: false
        hint: "Short description shown in meta tags"
      - label: "Topic"
        name: topic
        widget: select
        required: false
        hint: "Groups this note by course subject area"
        options:
          - { label: "Foundations", value: "foundations" }
          - { label: "Graphic Statics", value: "graphic-statics" }
          - { label: "Shellular Optimization", value: "shellular" }
          - { label: "Biological Growth", value: "biological-growth" }
          - { label: "Granular Jamming", value: "granular-jamming" }
          - { label: "Tools & Software", value: "tools" }
          - { label: "Resources", value: "resources" }
      - label: "Tags"
        name: tags
        widget: list
        required: false
        hint: "e.g. grasshopper, rhino, structures"
      - label: "Related Notes"
        name: related
        widget: relation
        collection: course_notes
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
        required: false
        multiple: true
      - { label: "Body", name: body, widget: markdown }
      - label: "Code Snippet"
        name: code_snippet
        widget: object
        required: false
        collapsed: true
        fields:
          - label: "Language"
            name: language
            widget: select
            required: false
            options:
              - { label: "Python", value: "python" }
              - { label: "GHPython", value: "python" }
              - { label: "JavaScript", value: "javascript" }
              - { label: "C#", value: "csharp" }
              - { label: "Bash", value: "bash" }
          - label: "Code"
            name: code
            widget: code
            required: false
            default_language: python
            allow_language_selection: true

  # ── Site Settings ────────────────────────────────────────────────
  - name: settings
    label: Site Settings
    files:
      - label: Course Info
        name: course_info
        file: course-structure/course-info.md
        fields:
          - { label: "Course Name", name: title, widget: string }
          - { label: "Instructor", name: instructor, widget: string }
          - { label: "Semester", name: semester, widget: string }
          - label: "Office Hours"
            name: office_hours
            widget: list
            fields:
              - { label: "Day", name: day, widget: string }
              - { label: "Time", name: time, widget: string }
              - { label: "Location", name: location, widget: string }
          - label: "Syllabus"
            name: syllabus
            widget: file
            required: false
            hint: "Upload the course syllabus PDF"
          - { label: "Notes", name: body, widget: markdown }
