<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computational Structural Design &amp; Analysis</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: #ffffff;
      color: #1a1a1a;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .cover {
      width: 100%;
      max-width: 960px;
      padding: 4.5rem 2.5rem 3.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-family: "Libre Baskerville", Georgia, "Times New Roman", Times, serif;
      font-size: clamp(1.75rem, 3.6vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1a1a1a;
    }

    figure {
      width: 100%;
      margin: 2.5rem 0 0;
    }

    figure img {
      display: block;
      width: 100%;
      height: auto;
    }

    .oer {
      margin-top: 0.85rem;
      font-size: 0.8125rem;
      line-height: 1.6;
      font-weight: 300;
      font-style: italic;
      color: #1a1a1a;
    }

    .topics {
      margin-top: 0.75rem;
      font-size: 0.9375rem;
      line-height: 1.7;
      font-weight: 300;
      color: #555550;
    }

    .led-by {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      line-height: 1.5;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #999990;
    }

    .author {
      margin-top: 0.25rem;
      font-size: 0.8rem;
      line-height: 1.5;
      color: #1a1a1a;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet" />
</head>
<body>
  <main class="cover">
    <h1>Computational Structural Design &amp; Analysis</h1>

    <figure>
      <img
        src="static/img/shellular-transition.jpg"
        alt="Progression of shellular structures from lattice to optimized topology under applied loads"
      />
      <figcaption class="oer">
        Supported by Open Educational Resources (OER) Grant, Texas A&amp;M University
      </figcaption>
    </figure>

    <p class="topics">
      Computational Design · Structural Form-Finding<br />
      Digital Fabrication · Material Computation
    </p>

    <p class="led-by">Course Led By</p>
    <p class="author">
      Dr. Mostafa Akbari · Assistant Professor of Architecture
    </p>
    <p class="author">
      Sharva Paralkar · Course Assistant
    </p>
  </main>
</body>
</html>
